name: "Force-Reset Branch"
description: "Force-reset a target branch to a source ref via `git push --force-with-lease`. Used by v4's local-next-reset.yml and local-hotfixes-reset.yml (§6.3 / §7) to bring next/hotfixes back to master HEAD after a release lands. Retries once on lease failure (re-fetches then retries) so a concurrent push from the bot itself doesn't race the reset."

inputs:
  target-branch:
    description: "Branch to reset (e.g., 'next', 'hotfixes'). The local tip of source-ref will be force-pushed to this branch on origin."
    required: true
  source-ref:
    description: "Ref to reset from. Defaults to 'master' — the typical v4 case is bringing next/hotfixes back to master HEAD."
    required: false
    default: "master"
  remote:
    description: "Git remote name."
    required: false
    default: "origin"
  max-retries:
    description: "Number of times to retry on lease failure (re-fetch + push). 0 disables retry."
    required: false
    default: "1"
  github-token:
    description: "When set, push via an x-access-token URL so the push is attributed to the token's identity (the CLDMV bot) — required to force-push a protected branch whose ruleset only bypasses the bot. When empty, pushes to the plain `remote` using the ambient git credentials."
    required: false
  repository:
    description: "owner/repo for the authenticated push URL. Defaults to the current repository."
    required: false
    default: ${{ github.repository }}

outputs:
  reset-sha:
    description: "SHA the target branch now points to on the remote."
  retries-used:
    description: "How many retries were needed (0 on first-try success)."

runs:
  using: "node24"
  main: "action.mjs"
