name: "Compute Highest Commit Type"
description: "Parse a JSON array of commits in Conventional Commits format and return the highest-priority type plus the implied semver bump. Used by normalize-pr-title and check-release-commit to pick the dominant type across a range."

inputs:
  commits-file:
    description: "Path to a JSON file containing an array of commit objects with at least { subject, body } fields. Mutually exclusive with commits-json."
    required: false
  commits-json:
    description: "Inline JSON array of commit objects with at least { subject, body } fields. Mutually exclusive with commits-file."
    required: false

outputs:
  highest-type:
    description: "Highest-priority conventional type found (e.g. 'feat', 'fix', 'chore'). Empty string when no commit parses as conventional."
  is-breaking:
    description: "'true' when any commit declares a breaking change (via '!' marker or 'BREAKING CHANGE:' footer)."
  bump:
    description: "Implied semver bump: 'major' / 'minor' / 'patch' / 'none'."

runs:
  using: "node24"
  main: "action.mjs"
