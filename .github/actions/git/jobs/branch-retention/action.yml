name: "Branch Retention (allowlist + keep-last-N)"
description: "On PR merge, prune the just-merged head branch unless it matches a retention rule. For rule matches: keep this branch, then enumerate other matching merged branches and delete anything beyond keep_last (sorted by merged_at descending). Batch 1.3."

inputs:
  retention_rules:
    description: 'JSON array of {pattern, keep_last}. Branches matching `pattern` are kept; only the N most recent merged branches survive.'
    required: false
    default: '[{"pattern":"release/*","keep_last":5},{"pattern":"hotfix/*","keep_last":3}]'
  exempt_patterns:
    description: "JSON array of fnmatch patterns that are never touched."
    required: false
    default: '["master","main","badges","gh-pages"]'
  github_token:
    description: "App token (contents:write + pull-requests:read)"
    required: true

runs:
  using: node24
  main: action.mjs
