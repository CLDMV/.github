name: "Audit Commit Subject (post-merge)"
description: "Check a commit's subject against a list of allowed patterns. On miss, auto-file a GitHub Issue (deduped by SHA) so non-conforming commits don't die silently in the Actions tab."

inputs:
  commit_sha:
    description: "Full commit SHA to audit"
    required: true
  allowed_patterns:
    description: "Multi-line list of JS-regex patterns. Match-any semantics: if ANY pattern matches the subject, the audit passes. Omit to use the canonical release-flow default below (release commits with an optional ` - <subject>` suffix and `(#N)`, `chore:` maintenance commits, and standard merge commits). Override only if your repo's conventions differ — but prefer the default so pattern fixes propagate via the pinned action ref instead of drifting in per-repo copies."
    required: false
    default: |
      ^release: v\d+\.\d+\.\d+( - .+?)?( \(#\d+\))?$
      ^chore(\([^)]+\))?: .+
      ^Merge pull request #\d+ from .+
  issue_labels:
    description: "Comma-sep labels to apply to auto-filed issues. Must match canonical names in your org's label catalog (this default uses CLDMV/.github's data/github-labels.json conventions: `type: ci`, `priority: high` — note the space after each colon)."
    required: false
    default: "type: ci,priority: high"
  issue_assignee:
    description: "Optional GitHub login to assign to auto-filed issues. Empty = unassigned."
    required: false
    default: ""
  github_token:
    description: "Token with `issues: write`. Defaults to GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}

runs:
  using: node24
  main: action.mjs
