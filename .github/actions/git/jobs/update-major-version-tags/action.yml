name: "🔄 Git Tag Operations"
description: "Composite action for updating major/minor version tags and fixing orphans"

inputs:
  debug:
    description: "Enable debug logging"
    required: false
    default: "false"
  gpg_enabled:
    description: "Whether GPG signing should be used (auto-detected from workflow)"
    required: false
    default: "false"
  create-documentation:
    description: "Whether to create/update VERSION_TAGS.md documentation"
    required: false
    default: "true"
  repo:
    description: "owner/repo (defaults to the caller repository). Passed through to orphan fixer."
    required: false
  tagger_name:
    description: "Tagger name"
    required: false
  tagger_email:
    description: "Tagger email"
    required: false
  gpg_private_key:
    description: "ASCII-armored private key for signing"
    required: false
  gpg_passphrase:
    description: "Passphrase for the private key (if protected)"
    required: false

outputs:
  major-version:
    description: "The major version tag that was updated"
    value: ${{ steps.update-tags.outputs.major-version }}
  minor-version:
    description: "The minor version tag that was updated"
    value: ${{ steps.update-tags.outputs.minor-version }}
  updated:
    description: "Whether tags were successfully updated"
    value: ${{ steps.update-tags.outputs.updated }}
  has-version-tags:
    description: "Whether version tags were found"
    value: ${{ steps.check-tags.outputs.has_version_tags }}
  should-run:
    description: "Whether the tag update should run"
    value: ${{ steps.should-run.outputs.result }}
  fixed-orphans:
    description: "Multiline list of orphaned tags that were fixed"
    value: ${{ steps.fix-orphans.outputs.fixed-tags }}
  orphans-found:
    description: "Whether any orphaned tags were found (and fixed if run_mode=fix)"
    value: ${{ steps.fix-orphans.outputs.orphans-found }}
  fixed-bot-signatures:
    description: "Multiline list of tags that were recreated with bot signatures"
    value: ${{ steps.fix-bot-signatures.outputs.fixed-tags }}
  non-bot-tags-found:
    description: "Whether any non-bot-signed tags were found and fixed"
    value: ${{ steps.fix-bot-signatures.outputs.non-bot-tags-found }}

runs:
  using: composite
  steps:
    - name: Checkout code (full history for tags)
      uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v1
      with:
        fetch-depth: 0

    # - name: Sanity - create/move a temp tag in this repo
    #   env:
    #     GH_TOKEN: ${{ github.token }}
    #   shell: bash
    #   run: |
    #     set -euo pipefail
    #     REPO="${{ github.repository }}"
    #     sha="$(git ls-remote https://github.com/$REPO HEAD | awk '{print $1}')"
    #     curl -fsS -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
    #       "https://api.github.com/repos/$REPO/git/refs" \
    #       -d "{\"ref\":\"refs/tags/_actions_temp\",\"sha\":\"$sha\"}" || true
    #     curl -fsS -X PATCH -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
    #       "https://api.github.com/repos/$REPO/git/refs/tags/_actions_temp" \
    #       -d "{\"sha\":\"$sha\",\"force\":true}"

    - name: Check for version tags
      id: check-tags
      uses: CLDMV/.github/.github/actions/git/steps/check-version-tags@v1

    - name: Fix orphaned major/minor version tags (detect+fix via reusable job)
      id: fix-orphans
      uses: CLDMV/.github/.github/actions/github/jobs/fix-orphaned-version-tags@v1
      with:
        debug: ${{ inputs.debug }}
        repo: ${{ inputs.repo || github.repository }}
        github_token: ${{ env.GITHUB_TOKEN }}
        gpg_enabled: ${{ inputs.gpg_enabled }}
        tagger_name: ${{ inputs.tagger_name }}
        tagger_email: ${{ inputs.tagger_email }}
        gpg_private_key: ${{ inputs.gpg_private_key }}
        gpg_passphrase: ${{ inputs.gpg_passphrase }}

    - name: Fix non-bot-signed version tags
      id: fix-bot-signatures
      uses: CLDMV/.github/.github/actions/git/jobs/fix-non-bot-tags@v1
      with:
        debug: ${{ inputs.debug }}
        github_token: ${{ env.GITHUB_TOKEN }}
        gpg_enabled: ${{ inputs.gpg_enabled }}
        tagger_name: ${{ inputs.tagger_name }}
        tagger_email: ${{ inputs.tagger_email }}
        gpg_private_key: ${{ inputs.gpg_private_key }}
        gpg_passphrase: ${{ inputs.gpg_passphrase }}
        exclude_tags: ${{ steps.fix-orphans.outputs.fixed-tags }}

    - name: Determine if should run
      id: should-run
      shell: bash
      run: |
        # Check if we're in workflow_call mode OR we have version tags OR bot signatures were fixed
        # Also check package.json as a fallback — it is the source of truth for the current version
        # even when the corresponding vX.Y.Z tag has not been created yet.
        PKG_SHOULD_RUN=false
        if [ -f package.json ]; then
          PKG_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "")
          if [ -n "$PKG_VERSION" ]; then
            echo "📦 package.json version: $PKG_VERSION"
            PKG_SHOULD_RUN=true
          fi
        fi

        if [ "${{ github.event_name }}" = "workflow_call" ] || [ "${{ steps.check-tags.outputs.has_version_tags }}" = "true" ] || [ "${{ steps.fix-bot-signatures.outputs.non-bot-tags-found }}" = "true" ] || [ "$PKG_SHOULD_RUN" = "true" ]; then
          echo "result=true" >> "$GITHUB_OUTPUT"
          echo "✅ Should run tag updates (event: ${{ github.event_name }}, has_tags: ${{ steps.check-tags.outputs.has_version_tags }}, fixed_signatures: ${{ steps.fix-bot-signatures.outputs.non-bot-tags-found }}, pkg_version: $PKG_SHOULD_RUN)"
        else
          echo "result=false" >> "$GITHUB_OUTPUT"
          echo "❌ Skipping tag updates - no version tags found and no signatures fixed"
        fi

    - name: Get tag name
      id: get-tag
      if: steps.should-run.outputs.result == 'true'
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          TAG_NAME="${{ github.event.release.tag_name }}"
          echo "Using release tag: $TAG_NAME"
          echo "needs-create=false" >> "$GITHUB_OUTPUT"
        else
          git fetch --tags --force

          # --- Source-of-truth: package.json ---
          # Read the current version from package.json and derive the expected semver tag.
          # This is more reliable than searching existing git tags because the full vX.Y.Z
          # tag may not have been created yet (e.g. the release workflow hadn't run yet when
          # this push-triggered workflow started).
          PKG_TAG=""
          if [ -f package.json ]; then
            PKG_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "")
            if [ -n "$PKG_VERSION" ]; then
              PKG_TAG="v${PKG_VERSION}"
              echo "📦 Derived tag from package.json: $PKG_TAG"
            fi
          fi

          if [ -n "$PKG_TAG" ]; then
            # Check whether the full semver tag already exists
            if git tag -l | grep -qxF "$PKG_TAG"; then
              TAG_NAME="$PKG_TAG"
              echo "✅ Tag $PKG_TAG exists — using it"
              echo "needs-create=false" >> "$GITHUB_OUTPUT"
            else
              # The tag is missing: we will create it in the next step pointing to HEAD
              TAG_NAME="$PKG_TAG"
              echo "⚠️  Tag $PKG_TAG does not exist yet — will create it before updating major/minor aliases"
              echo "needs-create=true" >> "$GITHUB_OUTPUT"
              echo "tag-sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            fi
          else
            # No package.json — fall back to latest existing semver tag
            echo "⚠️  No package.json found, falling back to latest tag search"
            LATEST_TAG=$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)
            if [ -n "$LATEST_TAG" ]; then
              TAG_NAME="$LATEST_TAG"
              echo "Found latest semantic version tag: $TAG_NAME"
            else
              TAG_NAME="${{ github.ref_name }}"
              echo "No semantic version tags found, using ref: $TAG_NAME"
            fi
            echo "needs-create=false" >> "$GITHUB_OUTPUT"
          fi
        fi
        echo "tag-name=$TAG_NAME" >> "$GITHUB_OUTPUT"
        echo "Processing tag: $TAG_NAME"

    - name: Create missing semver tag
      id: create-semver-tag
      if: steps.should-run.outputs.result == 'true' && steps.get-tag.outputs.needs-create == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      run: |
        TAG_NAME="${{ steps.get-tag.outputs.tag-name }}"
        TAG_SHA="${{ steps.get-tag.outputs.tag-sha }}"
        REPO="${{ github.repository }}"

        echo "🏷️  Creating missing semver tag $TAG_NAME → $TAG_SHA"

        # Create a lightweight tag via the GitHub refs API
        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$REPO/git/refs" \
          -d "{\"ref\":\"refs/tags/$TAG_NAME\",\"sha\":\"$TAG_SHA\"}")

        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        BODY=$(echo "$RESPONSE" | head -n-1)

        if [ "$HTTP_CODE" = "201" ]; then
          echo "✅ Created tag $TAG_NAME"
        elif [ "$HTTP_CODE" = "422" ]; then
          # Tag already exists (race condition) — safe to continue
          echo "ℹ️  Tag $TAG_NAME already exists (created concurrently) — continuing"
        else
          echo "❌ Failed to create tag $TAG_NAME (HTTP $HTTP_CODE)"
          echo "Response: $BODY"
          exit 1
        fi

        # Refresh local tag cache so update-major-version-tags sees the new tag
        git fetch --tags --force

    - name: Update major/minor version tags to this release
      id: update-tags
      if: steps.should-run.outputs.result == 'true'
      uses: CLDMV/.github/.github/actions/git/steps/update-major-version-tags@v1
      with:
        debug: ${{ inputs.debug }}
        github_token: ${{ env.GITHUB_TOKEN }}
        gpg_enabled: ${{ inputs.gpg_enabled }}
        tag-name: ${{ steps.get-tag.outputs.tag-name }}

    - name: Generate version documentation
      if: inputs.create-documentation == 'true' && steps.update-tags.outputs.updated == 'true'
      uses: CLDMV/.github/.github/actions/git/steps/generate-version-documentation@v1
      with:
        create-documentation: ${{ inputs.create-documentation }}

    - name: Create summary
      shell: bash
      run: |
        {
          echo "## 🏷️ Version Tag Operations"
          echo
          
          if [ "${{ steps.fix-orphans.outputs.orphans-found }}" = "true" ]; then
            echo "### 🔧 Fixed Orphaned Tags"
            echo "The following version tags were corrected:"
            echo
            # fixed-orphans is multiline; print as-is
            while IFS= read -r line; do
              [ -n "$line" ] && echo "- $line"
            done <<< "${{ steps.fix-orphans.outputs.fixed-tags }}"
            echo
          fi

          if [ "${{ steps.fix-bot-signatures.outputs.non-bot-tags-found }}" = "true" ]; then
            echo "### 🤖 Fixed Bot Signatures"
            echo "The following version tags were recreated with proper bot signatures:"
            echo
            # fixed-bot-signatures is multiline; print as-is
            while IFS= read -r line; do
              [ -n "$line" ] && echo "- $line"
            done <<< "${{ steps.fix-bot-signatures.outputs.fixed-tags }}"
            echo
          fi

          if [ "${{ steps.update-tags.outputs.updated }}" = "true" ]; then
            echo "### 📌 Version Tags Updated"
            echo "The following major/minor version tags have been updated:"
            echo
            echo "- \`${{ steps.update-tags.outputs.major-version }}\` → \`${{ steps.get-tag.outputs.tag-name }}\`"
            echo "- \`${{ steps.update-tags.outputs.minor-version }}\` → \`${{ steps.get-tag.outputs.tag-name }}\`"
            echo
          fi

          if [ "${{ steps.fix-orphans.outputs.orphans-found }}" = "false" ] && [ "${{ steps.fix-bot-signatures.outputs.non-bot-tags-found }}" = "false" ] && [ "${{ steps.update-tags.outputs.updated }}" != "true" ]; then
            echo "✅ All version tags are up to date - no changes needed"
          fi

          echo
          echo "Workflows can reference major version tags (e.g., \`@v1\`) for automatic updates."
        } >> "$GITHUB_STEP_SUMMARY"
