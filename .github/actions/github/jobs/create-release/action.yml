name: "Create GitHub Release"
description: "Composite action for creating GitHub releases"

inputs:
  version:
    description: "Version number for the release (auto-detected from package.json if not provided)"
    required: false
    default: ""
  package-name:
    description: "Name of the package being released"
    required: true
  is-prerelease:
    description: "Whether this is a prerelease"
    required: false
    default: "false"
  is-draft:
    description: "Whether this release should remain a draft"
    required: false
    default: "false"
  package-manager:
    description: "Package manager (npm or yarn)"
    required: false
    default: "npm"
  github-token:
    description: "GitHub token for API operations"
    required: true
  release-notes:
    description: "Release notes content in markdown (optional, will be auto-generated if not provided)"
    required: false
    default: ""
  assets:
    description: "Comma-separated list of file paths to upload as release assets"
    required: false
    default: ""
  release-source-only:
    description: "Whether to create source-only release (no package assets)"
    required: false
    default: "false"
  node-version:
    description: "Node.js version used for build (affects artifact name)"
    required: false
    default: "lts/*"
  build-command:
    description: "Command to build package (used if no artifacts available)"
    required: false
    default: "npm run build:ci"
  dry-run:
    description: "Dry run mode - validate everything but don't create release"
    required: false
    default: "false"

  # GPG signing parameters
  gpg_enabled:
    description: "Whether GPG signing should be used (auto-detected)"
    required: false
    default: "false"
  tagger_name:
    description: "Tagger name for GPG signing"
    required: false
  tagger_email:
    description: "Tagger email for GPG signing"
    required: false
  gpg_private_key:
    description: "ASCII-armored private key for signing"
    required: false
  gpg_passphrase:
    description: "Passphrase for the private key (if protected)"
    required: false

outputs:
  release-id:
    description: "ID of the created GitHub release"
    value: ${{ (inputs.dry-run == 'true' && steps.dry-run.outputs.release-id) || steps.create-release.outputs.release_id }}
  commit-sha:
    description: "Commit SHA used for the release tag"
    value: ${{ steps.prepare.outputs.commit-sha }}
  tag-sha:
    description: "SHA of the created tag"
    value: ${{ (inputs.dry-run == 'true' && steps.dry-run.outputs.tag-sha) || steps.create-tag.outputs.tag-sha }}
  tag-verified:
    description: "Whether the tag is GPG verified"
    value: ${{ (inputs.dry-run == 'true' && steps.dry-run.outputs.verified) || steps.verify-tag.outputs.verified }}
  tag-verification-reason:
    description: "Reason for tag verification result"
    value: ${{ (inputs.dry-run == 'true' && steps.dry-run.outputs.reason) || steps.verify-tag.outputs.reason }}

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v2
      with:
        fetch-depth: 0

    - name: Prepare release metadata
      id: prepare
      shell: bash
      run: node "${{ github.action_path }}/prepare.mjs"
      env:
        DRY_RUN: ${{ inputs.dry-run }}
        PACKAGE_NAME: ${{ inputs.package-name }}
        INPUT_VERSION: ${{ inputs.version }}

    - name: Get commits for changelog
      id: get-commits
      uses: CLDMV/.github/.github/actions/git/steps/check-release-commit@v2
      with:
        exclude-version: v${{ steps.prepare.outputs.version }}

    - name: Generate comprehensive changelog for release notes
      id: release-notes
      uses: CLDMV/.github/.github/actions/git/steps/generate-comprehensive-changelog@v2
      with:
        # Use file path to avoid "Argument list too long" when passing large commit JSON as env var
        commits-file: ${{ steps.get-commits.outputs.commits-file }}
        use-single-commit-message: "true"

    - name: Calculate artifact and release names
      id: names
      uses: CLDMV/.github/.github/actions/common/steps/calculate-names@v2
      with:
        node-version: ${{ inputs.node-version }}
        package-name: ${{ inputs.package-name }}
        version: ${{ steps.prepare.outputs.version }}

    - name: Create tag if needed
      if: inputs.dry-run != 'true'
      id: create-tag
      uses: CLDMV/.github/.github/actions/github/api/tag/create@v2
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      with:
        tag: v${{ steps.prepare.outputs.version }}
        sha: ${{ steps.prepare.outputs.commit-sha }}
        message: ${{ inputs.release-notes || steps.release-notes.outputs.changelog-content }}
        gpg_enabled: ${{ inputs.gpg_enabled }}
        tagger_name: ${{ inputs.tagger_name }}
        tagger_email: ${{ inputs.tagger_email }}
        gpg_private_key: ${{ inputs.gpg_private_key }}
        gpg_passphrase: ${{ inputs.gpg_passphrase }}

    - name: Setup Node.js (if no artifacts available)
      if: inputs.release-source-only == 'false'
      uses: CLDMV/.github/.github/actions/common/steps/setup-node@v2
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies (if no artifacts available)
      if: inputs.release-source-only == 'false'
      uses: CLDMV/.github/.github/actions/npm/steps/install-dependencies@v2
      with:
        package-manager: ${{ inputs.package-manager }}

    - name: Build package (if no artifacts available)
      if: inputs.release-source-only == 'false'
      uses: CLDMV/.github/.github/actions/common/steps/build-project@v2
      with:
        build-command: ${{ inputs.build-command || 'npm run build:ci' }}
        environment: production

    - name: Create npm package (if no artifacts available)
      if: inputs.release-source-only == 'false'
      id: create-package
      uses: CLDMV/.github/.github/actions/npm/steps/create-package@v2
      with:
        package-manager: ${{ inputs.package-manager }}
        package-name: ${{ inputs.package-name }}

    - name: Create package files for release
      if: inputs.release-source-only == 'false'
      id: package-files
      uses: CLDMV/.github/.github/actions/npm/steps/create-package-files@v2
      with:
        package-path: ${{ steps.create-package.outputs.package-path }}

    - name: Create GitHub release
      if: inputs.dry-run != 'true'
      id: create-release
      uses: CLDMV/.github/.github/actions/github/api/release/create@v2
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      with:
        tag_name: v${{ steps.prepare.outputs.version }}
        name: ${{ steps.names.outputs.release-name }}
        body: ${{ inputs.release-notes || steps.release-notes.outputs.changelog-content }}
        is_prerelease: ${{ inputs.is-prerelease }}
        is_draft: ${{ inputs.is-draft }}
        assets: ${{ inputs.release-source-only == 'false' && format('{0},{1}', steps.package-files.outputs.tar-gz-path, steps.package-files.outputs.zip-path) || inputs.assets }}

    - name: Enforce published release state
      if: inputs.dry-run != 'true' && inputs.is-draft != 'true'
      shell: bash
      run: node "${{ github.action_path }}/enforce-published.mjs"
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        RELEASE_ID: ${{ steps.create-release.outputs.release_id }}
        VERSION: v${{ steps.prepare.outputs.version }}

    - name: Verify tag signature
      if: inputs.dry-run != 'true'
      id: verify-tag
      uses: CLDMV/.github/.github/actions/github/api/tag/verify@v2
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      with:
        tag: v${{ steps.prepare.outputs.version }}

    - name: Dry run validation
      if: inputs.dry-run == 'true'
      id: dry-run
      shell: bash
      run: node "${{ github.action_path }}/dry-run.mjs"
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        VERSION: ${{ steps.prepare.outputs.version }}
        COMMIT_SHA: ${{ steps.prepare.outputs.commit-sha }}
        RELEASE_NAME: ${{ steps.names.outputs.release-name }}
        IS_PRERELEASE: ${{ inputs.is-prerelease }}
        GPG_ENABLED: ${{ inputs.gpg_enabled }}
        RELEASE_SOURCE_ONLY: ${{ inputs.release-source-only }}
        SERVER_URL: ${{ github.server_url }}
        REPOSITORY: ${{ github.repository }}

    - name: Release summary
      shell: bash
      run: node "${{ github.action_path }}/summary.mjs"
      env:
        DRY_RUN: ${{ inputs.dry-run }}
        VERSION: ${{ steps.prepare.outputs.version }}
        RELEASE_SOURCE_ONLY: ${{ inputs.release-source-only }}
        RELEASE_ID: ${{ steps.create-release.outputs.release_id }}
        SERVER_URL: ${{ github.server_url }}
        REPOSITORY: ${{ github.repository }}
