name: "Create Release PR"
description: "Composite action for creating release pull requests"

inputs:
  package-name:
    description: "NPM package name"
    required: true
  node-version:
    description: "Node.js version to use"
    required: false
    default: "lts/*"
  package-manager:
    description: "Package manager (npm or yarn)"
    required: false
    default: "npm"
  build-command:
    description: "Command to build package"
    required: false
    default: "npm run build:ci"
  version-bump:
    description: "Type of version bump (major, minor, patch). Leave empty for auto-detection from commit message."
    required: false
    default: ""
  dry-run:
    description: "Dry run mode - validate everything but don't create PR or make changes"
    required: false
    default: "false"
  github-token:
    description: "GitHub token for API operations"
    required: true

outputs:
  pr-created:
    description: "Whether a release PR was created"
    value: ${{ (inputs.dry-run == 'true' && steps.create-pr-dry.outputs.pr-created) || steps.create-pr.outputs.pr-created }}
  pr-number:
    description: "The release PR number if created"
    value: ${{ (inputs.dry-run == 'true' && steps.create-pr-dry.outputs.pr-number) || steps.create-pr.outputs.pr-number }}
  new-version:
    description: "The new version that was set"
    value: ${{ steps.version.outputs.new-version }}

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: CLDMV/.github/.github/actions/common/steps/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      uses: CLDMV/.github/.github/actions/npm/steps/install-dependencies@v4
      with:
        package-manager: ${{ inputs.package-manager }}

    - name: Get branch divergence point
      id: divergence
      shell: bash
      run: node "${{ github.action_path }}/divergence.mjs"
      env:
        DRY_RUN: ${{ inputs.dry-run }}
        PACKAGE_NAME: ${{ inputs.package-name }}

    - name: Check release commit for auto-detection
      id: commit-check
      uses: CLDMV/.github/.github/actions/git/steps/check-release-commit@v4
      with:
        base-ref: ${{ steps.divergence.outputs.merge-base }}
        base-version: ${{ steps.divergence.outputs.base-version }}

    - name: Calculate new version
      id: version
      uses: CLDMV/.github/.github/actions/npm/steps/calculate-version@v4
      with:
        version-bump: ${{ inputs.version-bump != '' && inputs.version-bump || steps.commit-check.outputs.version-bump }}
        explicit-version: ${{ steps.commit-check.outputs.explicit-version }}
        base-version: ${{ steps.divergence.outputs.base-version }}

    - name: Build package
      uses: CLDMV/.github/.github/actions/common/steps/build-project@v4
      with:
        build-command: ${{ inputs.build-command }}
        environment: production

    - name: Update package version
      if: inputs.dry-run != 'true'
      uses: CLDMV/.github/.github/actions/npm/steps/update-package-version@v4
      with:
        new-version: ${{ steps.version.outputs.new-version }}
        package-manager: ${{ inputs.package-manager }}

    - name: Generate comprehensive changelog
      id: changelog
      uses: CLDMV/.github/.github/actions/git/steps/generate-comprehensive-changelog@v4
      with:
        # Use file path to avoid "Argument list too long" when passing large commit JSON as env var
        commits-file: ${{ steps.commit-check.outputs.commits-file }}
        # Pass the base..head range so the generator's structural merge-commit
        # filter + patch-id dedup can run — both no-op without a `..` range,
        # which left the PR-title-named merge commits (next's merge-commit flow
        # produces `feat: … (#N)` merge commits, not `Merge pull request …`)
        # duplicated alongside their originals in freshly-created release PRs.
        # Same range update-release-pr passes; same one used at "commit types".
        commit-range: ${{ steps.divergence.outputs.merge-base }}..HEAD
        # Bot App token — drives the PR-ref augmentation (looks up the
        # source PR for each commit so the grouped output can fold the
        # original branch commits under their squashed parent). Without
        # this, commits that lack `(#N)` in their subject (i.e. anything
        # the augmentation step would have annotated) fall to the bottom
        # of the section as ungrouped flat bullets.
        github-token: ${{ inputs.github-token }}
        # next/hotfixes → master release PR body groups each section by the
        # source PR (e.g. `- #48 (7d06c21)` with the contributor commits
        # indented underneath). Every commit in the range was reviewed in its
        # own PR; grouping by PR carries more signal than a flat list and
        # collapses stacked-PR duplicates visually.
        group-by-pr: "true"

    - name: Detect default branch
      id: default-branch
      uses: CLDMV/.github/.github/actions/git/utilities/detect-default-branch@v4

    - name: Restore src/ deleted by build
      if: inputs.dry-run != 'true'
      uses: CLDMV/.github/.github/actions/git/steps/restore-deleted-src@v4

    - name: Create signed commit
      if: inputs.dry-run != 'true'
      id: commit
      uses: CLDMV/.github/.github/actions/github/api/commit@v4
      with:
        commit-message: "chore: bump version to ${{ steps.version.outputs.new-version }}"
        github-token: ${{ inputs.github-token }}

    # Extract the set of conventional-commit types present in the range so a
    # mixed PR (e.g. feat: + fix:) gets BOTH type: feature request + type: bug
    # — not just the label corresponding to the bump-type (the highest).
    # Filters bot/merge/release commits + the auto chore-bump (loop noise).
    - name: Compute commit types in range
      id: pr-types
      shell: bash
      env:
        RANGE: ${{ steps.divergence.outputs.merge-base }}..HEAD
      run: |
        types=$(git log --no-merges --format='%s' "$RANGE" \
            | grep -vE '^(release|chore: bump version)' \
            | grep -oiE '^[a-z]+(\([^)]+\))?!?:' \
            | sed -E 's/[(!:].*//' \
            | tr '[:upper:]' '[:lower:]' \
            | sort -u | paste -sd,)
        echo "types=${types:-}" >> "$GITHUB_OUTPUT"
        echo "📊 commit types in range: ${types:-<none>}"

    - name: Compute raw label aliases
      id: raw-labels
      uses: CLDMV/.github/.github/actions/github/steps/compute-label-aliases@v4
      with:
        bump-type: ${{ inputs.version-bump != '' && inputs.version-bump || steps.commit-check.outputs.version-bump }}
        types-present: ${{ steps.pr-types.outputs.types }}

    - name: Resolve PR label aliases
      id: pr-labels
      uses: CLDMV/.github/.github/actions/github/steps/resolve-labels@v4
      with:
        aliases: ${{ steps.raw-labels.outputs.labels }}

    # Append the v4 flow label so the PR shows its lane (`! release → master`
    # for next → master, `! hotfix release → master` for hotfixes → master).
    # The label name's leading `!` sorts it first in GitHub's alphabetical
    # label display, making the PR's lane visible at a glance from any list.
    - name: Append flow label
      id: final-labels
      shell: bash
      run: |
        case "${{ github.ref_name }}" in
            next)      flow_label="! release → master" ;;
            hotfixes)  flow_label="! hotfix release → master" ;;
            *)         flow_label="" ;;
        esac
        labels='${{ steps.pr-labels.outputs.labels }}'
        if [ -n "$flow_label" ]; then
            if [ -n "$labels" ]; then
                labels="${labels},${flow_label}"
            else
                labels="$flow_label"
            fi
        fi
        echo "labels=$labels" >> "$GITHUB_OUTPUT"

    # managed-labels scopes the update path's label diff: only labels in this
    # allowlist may be removed. Path-based labels owned by the PR labeler
    # workflow (type: ci / type: documentation / area: *) stay untouched —
    # avoids the remove-then-re-add churn the unscoped delta produced.
    # The two `! …` flow labels are in the allowlist so a hotfix → release
    # head-ref change (rare but possible) doesn't strand the wrong label.
    - name: Create pull request
      if: inputs.dry-run != 'true'
      id: create-pr
      uses: CLDMV/.github/.github/actions/github/api/pull-requests@v4
      with:
        # Suffix differentiates PRs that share the same target version (e.g.
        # two open patch PRs both bumping to vX.Y.Z). Empty suffix falls back
        # to the plain "release: vX.Y.Z" form.
        title: "release: v${{ steps.version.outputs.new-version }}${{ steps.commit-check.outputs.title-suffix && format(' - {0}', steps.commit-check.outputs.title-suffix) || '' }}"
        base-branch: ${{ steps.default-branch.outputs.default-branch }}
        head-branch: ${{ github.ref_name }}
        body-content: ${{ steps.changelog.outputs.changelog-content }}
        labels: ${{ steps.final-labels.outputs.labels }}
        managed-labels: "release,semver: patch,semver: minor,semver: major,semver: explicit,type: bug,type: feature request,! release → master,! hotfix release → master"
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Dry run PR outputs
      if: inputs.dry-run == 'true'
      id: create-pr-dry
      shell: bash
      run: node "${{ github.action_path }}/dry-outputs.mjs"

    - name: Release PR summary
      shell: bash
      run: node "${{ github.action_path }}/summary.mjs"
      env:
        DRY_RUN: ${{ inputs.dry-run }}
        NEW_VERSION: ${{ steps.version.outputs.new-version }}
        DEFAULT_BRANCH: ${{ steps.default-branch.outputs.default-branch }}
        HEAD_BRANCH: ${{ github.ref_name }}
        PR_LABELS: ${{ steps.pr-labels.outputs.labels }}
        PR_CREATED: ${{ steps.create-pr.outputs.pr-created }}
        PR_NUMBER: ${{ steps.create-pr.outputs.pr-number }}
        REPOSITORY: ${{ github.repository }}
        SERVER_URL: ${{ github.server_url }}
        CHANGELOG_CONTENT: ${{ steps.changelog.outputs.changelog-content }}
