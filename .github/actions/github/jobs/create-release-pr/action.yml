name: "Create Release PR"
description: "Composite action for creating release pull requests"

inputs:
  package-name:
    description: "NPM package name"
    required: true
  node-version:
    description: "Node.js version to use"
    required: false
    default: "lts/*"
  package-manager:
    description: "Package manager (npm or yarn)"
    required: false
    default: "npm"
  build-command:
    description: "Command to build package"
    required: false
    default: "npm run build:ci"
  version-bump:
    description: "Type of version bump (major, minor, patch). Leave empty for auto-detection from commit message."
    required: false
    default: ""
  dry-run:
    description: "Dry run mode - validate everything but don't create PR or make changes"
    required: false
    default: "false"
  github-token:
    description: "GitHub token for API operations"
    required: true

outputs:
  pr-created:
    description: "Whether a release PR was created"
    value: ${{ (inputs.dry-run == 'true' && steps.create-pr-dry.outputs.pr-created) || steps.create-pr.outputs.pr-created }}
  pr-number:
    description: "The release PR number if created"
    value: ${{ (inputs.dry-run == 'true' && steps.create-pr-dry.outputs.pr-number) || steps.create-pr.outputs.pr-number }}
  new-version:
    description: "The new version that was set"
    value: ${{ steps.version.outputs.new-version }}

runs:
  using: composite
  steps:
    - name: Update Summary - Release PR Start
      shell: bash
      run: |
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          echo "## 🧪 Dry Run - Release PR Validation" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 Validating release PR creation for ${{ inputs.package-name }} (NO CHANGES WILL BE MADE)" >> $GITHUB_STEP_SUMMARY
        else
          echo "## 📋 Release PR Progress" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 Starting release PR creation for ${{ inputs.package-name }}" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY

    - name: Checkout code
      uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v2
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: CLDMV/.github/.github/actions/common/steps/setup-node@v2
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      uses: CLDMV/.github/.github/actions/npm/steps/install-dependencies@v2
      with:
        package-manager: ${{ inputs.package-manager }}

    - name: Get branch divergence point
      id: divergence
      shell: bash
      run: |
        # Find where this branch diverged from master/main. Used as both the commit-range
        # base (so we analyse exactly the right commits) and the version base (so we compute
        # the bump against the correct pre-branch version, not a bump commit on the branch).
        MERGE_BASE=$(git merge-base HEAD origin/master 2>/dev/null || \
                     git merge-base HEAD origin/main 2>/dev/null || echo "")
        if [ -n "$MERGE_BASE" ]; then
          echo "🔍 Branch divergence point: $(echo "$MERGE_BASE" | cut -c1-7)"
          echo "merge-base=$MERGE_BASE" >> $GITHUB_OUTPUT
        else
          echo "⚠️ Could not determine branch divergence point — falling back to tag-based range"
          echo "merge-base=" >> $GITHUB_OUTPUT
        fi

    - name: Check release commit for auto-detection
      id: commit-check
      uses: CLDMV/.github/.github/actions/git/steps/check-release-commit@v2
      with:
        base-ref: ${{ steps.divergence.outputs.merge-base }}

    - name: Get base version from branch divergence point
      id: base-version
      shell: bash
      run: |
        MERGE_BASE="${{ steps.divergence.outputs.merge-base }}"

        if [ -n "$MERGE_BASE" ]; then
          mkdir -p tmp
          git show "$MERGE_BASE:package.json" > tmp/base-package.json 2>/dev/null || true
          if [ -f tmp/base-package.json ]; then
            BASE_VERSION=$(node -p "require('./tmp/base-package.json').version" 2>/dev/null || echo "")
            rm -f tmp/base-package.json
          fi
        fi

        if [ -n "$BASE_VERSION" ]; then
          echo "📦 Base version at divergence point: $BASE_VERSION"
          echo "base-version=$BASE_VERSION" >> $GITHUB_OUTPUT
        else
          echo "⚠️ Could not determine base version from divergence point — falling back to package.json"
          echo "base-version=" >> $GITHUB_OUTPUT
        fi

    - name: Calculate new version
      id: version
      uses: CLDMV/.github/.github/actions/npm/steps/calculate-version@v2
      with:
        version-bump: ${{ inputs.version-bump != '' && inputs.version-bump || steps.commit-check.outputs.version-bump }}
        explicit-version: ${{ steps.commit-check.outputs.explicit-version }}
        base-version: ${{ steps.base-version.outputs.base-version }}

    - name: Update Summary - Version Calculated
      shell: bash
      run: |
        echo "- ✅ New version calculated: v${{ steps.version.outputs.new-version }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          echo "- 🧪 **DRY RUN**: Version would be bumped to v${{ steps.version.outputs.new-version }}" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Build package
      uses: CLDMV/.github/.github/actions/common/steps/build-project@v2
      with:
        build-command: ${{ inputs.build-command }}
        environment: production

    - name: Update package version
      if: inputs.dry-run != 'true'
      uses: CLDMV/.github/.github/actions/npm/steps/update-package-version@v2
      with:
        new-version: ${{ steps.version.outputs.new-version }}
        package-manager: ${{ inputs.package-manager }}

    - name: Dry Run - Package Version Update
      if: inputs.dry-run == 'true'
      shell: bash
      run: |
        echo "- 🧪 **DRY RUN**: Would update package.json version to ${{ steps.version.outputs.new-version }}" >> $GITHUB_STEP_SUMMARY

    - name: Generate comprehensive changelog
      id: changelog
      uses: CLDMV/.github/.github/actions/git/steps/generate-comprehensive-changelog@v2
      with:
        # Use file path to avoid "Argument list too long" when passing large commit JSON as env var
        commits-file: ${{ steps.commit-check.outputs.commits-file }}

    - name: Update Summary - Changelog Generated
      shell: bash
      env:
        CHANGELOG_CONTENT: ${{ steps.changelog.outputs.changelog-content }}
      run: |
        echo "- ✅ Changelog generated successfully" >> $GITHUB_STEP_SUMMARY
        if [ "${{ inputs.dry-run }}" = "true" ]; then
          echo "- 🧪 **DRY RUN**: Changelog content preview:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          mkdir -p tmp
          printf "%s\n" "$CHANGELOG_CONTENT" > tmp/changelog-preview.md
          head -20 tmp/changelog-preview.md >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Detect default branch
      id: default-branch
      uses: CLDMV/.github/.github/actions/git/utilities/detect-default-branch@v2

    - name: Restore src/ deleted by build
      if: inputs.dry-run != 'true'
      shell: bash
      run: |
        # The build command (e.g. npm run build:ci) may delete src/ as part of a
        # post-build cleanup step so that downstream tests validate dist/ in isolation.
        # That deletion must NOT be included in the version-bump commit, so we restore
        # src/ from HEAD before git add . captures it.
        if git ls-files --deleted -- src/ | grep -q .; then
          echo "🔄 Restoring src/ deleted by build step..."
          git checkout HEAD -- src/
          echo "✅ src/ restored — only dist/, types/, and package files will be committed"
        else
          echo "ℹ️ No src/ deletions detected — skipping restore"
        fi

    - name: Create signed commit
      if: inputs.dry-run != 'true'
      id: commit
      uses: CLDMV/.github/.github/actions/github/api/commit@v2
      with:
        commit-message: "chore: bump version to ${{ steps.version.outputs.new-version }}"
        github-token: ${{ inputs.github-token }}

    - name: Dry Run - Commit Creation
      if: inputs.dry-run == 'true'
      shell: bash
      run: |
        echo "- 🧪 **DRY RUN**: Would create commit with message: 'chore: bump version to ${{ steps.version.outputs.new-version }}'" >> $GITHUB_STEP_SUMMARY

    - name: Compute raw label aliases
      id: raw-labels
      shell: bash
      run: |
        BUMP_TYPE="${{ inputs.version-bump != '' && inputs.version-bump || steps.commit-check.outputs.version-bump }}"
        ALIASES="release,${BUMP_TYPE}"
        [ "$BUMP_TYPE" = "patch" ] && ALIASES="${ALIASES},bug"
        echo "labels=${ALIASES}" >> $GITHUB_OUTPUT

    - name: Resolve PR label aliases
      id: pr-labels
      uses: CLDMV/.github/.github/actions/github/steps/resolve-labels@v2
      with:
        aliases: ${{ steps.raw-labels.outputs.labels }}

    - name: Create pull request
      if: inputs.dry-run != 'true'
      id: create-pr
      uses: CLDMV/.github/.github/actions/github/api/pull-requests@v2
      with:
        title: "release: v${{ steps.version.outputs.new-version }}"
        base-branch: ${{ steps.default-branch.outputs.default-branch }}
        head-branch: ${{ github.ref_name }}
        body-content: ${{ steps.changelog.outputs.changelog-content }}
        labels: ${{ steps.pr-labels.outputs.labels }}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Dry Run - PR Creation
      if: inputs.dry-run == 'true'
      id: create-pr-dry
      shell: bash
      run: |
        echo "- 🧪 **DRY RUN**: Would create PR with:" >> $GITHUB_STEP_SUMMARY
        echo "  - **Title**: release: v${{ steps.version.outputs.new-version }}" >> $GITHUB_STEP_SUMMARY
        echo "  - **Base Branch**: ${{ steps.default-branch.outputs.default-branch }}" >> $GITHUB_STEP_SUMMARY
        echo "  - **Head Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "  - **Labels**: ${{ steps.pr-labels.outputs.labels }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        # Set outputs for dry run (simulate PR creation success)
        echo "pr-created=true" >> $GITHUB_OUTPUT
        echo "pr-number=DRY-RUN" >> $GITHUB_OUTPUT

    - name: Update Summary - PR Created
      if: steps.create-pr.outputs.pr-created == 'true' && inputs.dry-run != 'true'
      shell: bash
      run: |
        echo "- ✅ Release PR created: [#${{ steps.create-pr.outputs.pr-number }}](${{ github.server_url }}/${{ github.repository }}/pull/${{ steps.create-pr.outputs.pr-number }})" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🎉 **Release PR Complete** - [Ready for review and merge →](${{ github.server_url }}/${{ github.repository }}/pull/${{ steps.create-pr.outputs.pr-number }})" >> $GITHUB_STEP_SUMMARY

    - name: Update Summary - Dry Run Complete
      if: inputs.dry-run == 'true'
      shell: bash
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🧪 **DRY RUN COMPLETE** - All validations passed!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### What would happen in a real run:" >> $GITHUB_STEP_SUMMARY
        echo "1. ✅ Version would be bumped to **v${{ steps.version.outputs.new-version }}**" >> $GITHUB_STEP_SUMMARY
        echo "2. ✅ Package.json would be updated" >> $GITHUB_STEP_SUMMARY
        echo "3. ✅ Changelog would be generated" >> $GITHUB_STEP_SUMMARY
        echo "4. ✅ Release commit would be created" >> $GITHUB_STEP_SUMMARY
        echo "5. ✅ Release PR would be opened" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "💡 **To proceed**: Run this workflow again with \`dry_run: false\`" >> $GITHUB_STEP_SUMMARY

    - name: Update Summary - No PR Created
      if: steps.create-pr.outputs.pr-created != 'true' && inputs.dry-run != 'true'
      shell: bash
      run: |
        echo "- ℹ️ No release PR created (not a release commit)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "💡 **Tip**: Use \`release:\` or \`release!:\` prefix to trigger releases" >> $GITHUB_STEP_SUMMARY
