name: "Welcome First-Time Contributor"
description: "Post a friendly auto-comment on a contributor's first issue or PR. Detects whether CONTRIBUTING.md / CLA.md / CODE_OF_CONDUCT.md exist and conditionally includes links. Batch 5.3."

inputs:
  pr_message_path:
    description: "Per-repo override for PR welcome template (relative to consumer repo)"
    required: false
    default: ""
  issue_message_path:
    description: "Per-repo override for issue welcome template"
    required: false
    default: ""
  default_template_repo:
    required: false
    default: "CLDMV/.github"
  default_template_ref:
    required: false
    default: "v2"
  default_pr_template_path:
    required: false
    default: ".github/templates/welcome-pr.md"
  default_issue_template_path:
    required: false
    default: ".github/templates/welcome-issue.md"
  exempt_logins:
    description: "Comma-sep bot logins to ignore"
    required: false
    default: "dependabot[bot],renovate[bot],github-actions[bot],cldmv-bot[bot]"
  github_token:
    required: true

runs:
  using: node24
  main: action.mjs
