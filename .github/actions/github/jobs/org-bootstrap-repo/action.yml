name: "Org Bootstrap (single repo)"
description: "Apply the v4 org-wide baseline to one repo: create next/hotfixes branches, flip repo settings, enable security toggles, replace the three rulesets. Idempotent — re-running is safe. Overwrites diverged settings/rulesets and surfaces every divergence as a warning so the audit trail captures what changed. Used by both v4-bootstrap.yml (per-repo dispatch) and local-org-onboarding.yml (org-wide fanout)."

inputs:
  target_repo:
    description: "Target repo in `owner/name` form. Defaults to GITHUB_REPOSITORY (the workflow's own repo) when unset, so the per-repo v4-bootstrap dispatch call doesn't have to pass it."
    required: false
    default: ""
  github_token:
    description: "App token with administration:write on the target repo. Mint with the App scoped to a single repo for org-fanout matrix jobs; for the per-repo dispatch case the same token the rest of the bootstrap uses is fine."
    required: true
  dry_run:
    description: "Dry-run: when `true`, GET state and log every mutation (PUT/POST/PATCH/DELETE) that *would* be applied without firing it. Default `true` — set to `false` to actually apply changes."
    required: false
    default: "true"
  steps:
    description: "Comma-separated subset of phases to run. Default `branches,settings,security,rulesets` runs everything; pass a subset for partial reapply (e.g. `rulesets` to re-import after editing builders.mjs)."
    required: false
    default: "branches,settings,security,rulesets"
  next_branch:
    description: "Integration branch name for features/fixes."
    required: false
    default: "next"
  hotfixes_branch:
    description: "Integration branch name for hotfixes."
    required: false
    default: "hotfixes"
  bot_app_id:
    description: "Numeric GitHub App ID to pre-add to next/hotfixes ruleset bypass_actors. Defaults to CLDMV's bot App."
    required: false
    default: "1910694"
  code_security:
    description: "GitHub Code Security policy (the paid product that gates CodeQL alerts on private repos; free on public). One of `off` | `public-only` | `all`. `off` = ensure DISABLED on every repo. `public-only` = ensure ENABLED on public repos (free), DISABLED on private/internal (paid). `all` = ensure ENABLED everywhere (paid for private). Overwrite-with-warn either direction. Default `off`. Internally drives the `security_and_analysis.advanced_security` API field — the field name didn't get renamed when GitHub unbundled GHAS into Code Security + Secret Protection."
    required: false
    default: "off"
  secret_protection:
    description: "GitHub Secret Protection policy (the paid product that gates secret scanning + push protection on private repos; free on public). Same `off` | `public-only` | `all` shape as `code_security`. Drives the `secret_scanning` + `secret_scanning_push_protection` API fields together."
    required: false
    default: "off"

outputs:
  # Node actions don't use the composite `value: ${{ steps.<id>.outputs.<name> }}`
  # syntax — the script writes via $GITHUB_OUTPUT directly and the runner
  # picks the values up by name. Declarations below are for documentation +
  # consumer discoverability only.
  status:
    description: "`succeeded`, `skipped`, or `failed`. Drives the org-fanout's summary table."
  skip_reason:
    description: "Reason when status=skipped (e.g. `archived`, `no-master`)."
  applied:
    description: "Comma-separated list of step ids that actually mutated state (vs. were already correct)."
  warnings:
    description: "Newline-separated divergence warnings — settings or rulesets that were overwritten because they didn't match the org baseline."

runs:
  using: node24
  main: action.mjs
