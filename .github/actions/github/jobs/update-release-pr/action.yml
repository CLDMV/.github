name: "Update Release PR"
description: "Refresh an open release PR: re-evaluate version against current default branch, regenerate changelog, force-push the version-bump commit, update PR title and labels. Used by both workflow-release.yml (when push to release branch lands) and workflow-sync-open-release-prs.yml (when a sibling PR merges to master)."

inputs:
  head-ref:
    description: "The release branch to refresh (must have an open release PR)"
    required: true
  pr-number:
    description: "The PR number to update"
    required: true
  package-name:
    description: "NPM package name"
    required: true
  package-manager:
    description: "Package manager (npm or yarn)"
    required: false
    default: "npm"
  build-command:
    description: "Build command"
    required: false
    default: "npm run build:ci"
  node-version:
    description: "Node.js version to use"
    required: false
    default: "lts/*"
  github-token:
    description: "App-token bearer (contents:write + pull-requests:write required)"
    required: true
  debug:
    description: "Enable debug logging"
    required: false
    default: "false"

outputs:
  new-version:
    description: "The recalculated version that the PR now targets (empty if no release-worthy commit was found)"
    value: ${{ steps.version.outputs.new-version }}
  should-update:
    description: "'true' if a release-worthy commit was found and the PR was updated; 'false' otherwise"
    value: ${{ steps.release-check.outputs.should-create-pr }}

runs:
  using: composite
  steps:
    - name: Checkout PR branch
      uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v4
      with:
        ref: ${{ inputs.head-ref }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: CLDMV/.github/.github/actions/common/steps/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Get branch divergence point
      id: divergence
      uses: CLDMV/.github/.github/actions/git/steps/find-divergence@v4

    - name: Check release commit type
      id: release-check
      uses: CLDMV/.github/.github/actions/git/steps/check-release-commit@v4
      with:
        base-ref: ${{ steps.divergence.outputs.merge-base }}
        base-version: ${{ steps.divergence.outputs.base-version }}
        # Opt-in: when the target version's bot bump is already on the branch,
        # still emit should-create-pr=true (with bump-already-applied=true) so
        # we can refresh the changelog/body/labels for the new commit without
        # re-pushing a duplicate version-bump commit.
        allow-already-bumped: "true"
      env:
        DEBUG: ${{ inputs.debug }}

    # Steps gated only on should-create-pr run regardless of whether the bump
    # has already been applied — they only read state. Version-mutating steps
    # below ALSO gate on bump-already-applied != 'true'.

    - name: Calculate new version
      id: version
      if: steps.release-check.outputs.should-create-pr == 'true'
      uses: CLDMV/.github/.github/actions/npm/steps/calculate-version@v4
      with:
        version-bump: ${{ steps.release-check.outputs.version-bump }}
        explicit-version: ${{ steps.release-check.outputs.explicit-version }}
        base-version: ${{ steps.divergence.outputs.base-version }}

    - name: Install dependencies
      if: steps.release-check.outputs.should-create-pr == 'true' && steps.release-check.outputs.bump-already-applied != 'true'
      uses: CLDMV/.github/.github/actions/npm/steps/install-dependencies@v4
      with:
        package-manager: ${{ inputs.package-manager }}

    - name: Build package
      if: steps.release-check.outputs.should-create-pr == 'true' && steps.release-check.outputs.bump-already-applied != 'true'
      uses: CLDMV/.github/.github/actions/common/steps/build-project@v4
      with:
        build-command: ${{ inputs.build-command }}
        environment: production

    - name: Update package version
      if: steps.release-check.outputs.should-create-pr == 'true' && steps.release-check.outputs.bump-already-applied != 'true'
      uses: CLDMV/.github/.github/actions/npm/steps/update-package-version@v4
      with:
        new-version: ${{ steps.version.outputs.new-version }}
        package-manager: ${{ inputs.package-manager }}

    - name: Restore src/ deleted by build
      if: steps.release-check.outputs.should-create-pr == 'true' && steps.release-check.outputs.bump-already-applied != 'true'
      uses: CLDMV/.github/.github/actions/git/steps/restore-deleted-src@v4

    - name: Create signed commit
      if: steps.release-check.outputs.should-create-pr == 'true' && steps.release-check.outputs.bump-already-applied != 'true'
      uses: CLDMV/.github/.github/actions/github/api/commit@v4
      with:
        commit-message: "chore: bump version to ${{ steps.version.outputs.new-version }}"
        github-token: ${{ inputs.github-token }}

    - name: Determine display version
      id: display-version
      if: steps.release-check.outputs.should-create-pr == 'true'
      uses: CLDMV/.github/.github/actions/npm/steps/resolve-version@v4
      with:
        new-version: ${{ steps.version.outputs.new-version }}

    - name: Get PR commit range
      id: get-pr-range
      if: steps.release-check.outputs.should-create-pr == 'true'
      uses: CLDMV/.github/.github/actions/github/steps/get-pr-commit-range@v4
      with:
        github-token: ${{ inputs.github-token }}
        pr-number: ${{ inputs.pr-number }}

    - name: Generate updated changelog
      id: changelog
      if: steps.release-check.outputs.should-create-pr == 'true'
      uses: CLDMV/.github/.github/actions/git/steps/generate-comprehensive-changelog@v4
      with:
        commit-range: ${{ steps.get-pr-range.outputs.commit-range }}
        # next/hotfixes → master release PR body groups each section by the
        # source PR. See create-release-pr/action.yml for the rationale.
        group-by-pr: "true"

    - name: Update PR title and description
      if: steps.release-check.outputs.should-create-pr == 'true'
      uses: CLDMV/.github/.github/actions/github/steps/update-pr-changelog@v4
      with:
        github-token: ${{ inputs.github-token }}
        pr-number: ${{ inputs.pr-number }}
        new-version: ${{ steps.display-version.outputs.version }}
        title-suffix: ${{ steps.release-check.outputs.title-suffix }}
        changelog-content: ${{ steps.changelog.outputs.changelog-content }}

    # Extract the set of conventional-commit types present in the PR range so a
    # mixed PR (e.g. feat: + fix:) gets BOTH type: feature request + type: bug
    # — not just the label corresponding to the bump-type (the highest).
    # Filters bot/merge/release commits + the auto chore-bump (loop noise).
    - name: Compute commit types in PR range
      id: pr-types
      if: steps.release-check.outputs.should-create-pr == 'true'
      shell: bash
      env:
        RANGE: ${{ steps.get-pr-range.outputs.commit-range }}
      run: |
        types=$(git log --no-merges --format='%s' "$RANGE" \
            | grep -vE '^(release|chore: bump version)' \
            | grep -oiE '^[a-z]+(\([^)]+\))?!?:' \
            | sed -E 's/[(!:].*//' \
            | tr '[:upper:]' '[:lower:]' \
            | sort -u | paste -sd,)
        echo "types=${types:-}" >> "$GITHUB_OUTPUT"
        echo "📊 commit types in range: ${types:-<none>}"

    - name: Compute raw label aliases
      id: raw-labels
      if: steps.release-check.outputs.should-create-pr == 'true'
      uses: CLDMV/.github/.github/actions/github/steps/compute-label-aliases@v4
      with:
        bump-type: ${{ steps.release-check.outputs.version-bump }}
        types-present: ${{ steps.pr-types.outputs.types }}

    - name: Resolve PR label aliases
      id: resolved-labels
      if: steps.release-check.outputs.should-create-pr == 'true'
      uses: CLDMV/.github/.github/actions/github/steps/resolve-labels@v4
      with:
        aliases: ${{ steps.raw-labels.outputs.labels }}

    # Append the v4 flow label based on the head-ref lane:
    #   head=next     → `! release → master`
    #   head=hotfixes → `! hotfix release → master`
    # The leading `!` sorts the label first in GitHub's alphabetical display
    # so a glance at the PR list shows which lane each release PR is on.
    - name: Append flow label
      id: final-labels
      if: steps.release-check.outputs.should-create-pr == 'true'
      shell: bash
      run: |
        case "${{ inputs.head-ref }}" in
            next)      flow_label="! release → master" ;;
            hotfixes)  flow_label="! hotfix release → master" ;;
            *)         flow_label="" ;;
        esac
        labels='${{ steps.resolved-labels.outputs.labels }}'
        if [ -n "$flow_label" ]; then
            if [ -n "$labels" ]; then
                labels="${labels},${flow_label}"
            else
                labels="$flow_label"
            fi
        fi
        echo "labels=$labels" >> "$GITHUB_OUTPUT"

    # managed-labels scopes the replace: only labels in this allowlist are
    # removed when not in `labels`. Path-based labels owned by the PR labeler
    # workflow (type: ci / type: documentation / type: config / area: *) are
    # OUTSIDE the allowlist and stay untouched — preventing the remove-then-
    # re-add churn that bit the v4.0.1 refresh.
    # Flow labels are IN the allowlist so the right lane indicator wins if
    # the head-ref ever changes between refreshes.
    - name: Sync PR labels
      if: steps.release-check.outputs.should-create-pr == 'true'
      uses: CLDMV/.github/.github/actions/github/steps/sync-pr-labels@v4
      with:
        github-token: ${{ inputs.github-token }}
        pr-number: ${{ inputs.pr-number }}
        labels: ${{ steps.final-labels.outputs.labels }}
        managed-labels: "release,semver: patch,semver: minor,semver: major,semver: explicit,type: bug,type: feature request,! release → master,! hotfix release → master"
