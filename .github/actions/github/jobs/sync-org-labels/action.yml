name: "Sync Org Labels"
description: "Syncs labels across all repos in an org using data/github-labels.json as the source of truth. Repos with a .labelignore file at the root are skipped."

inputs:
  github-token:
    description: "GitHub App token with org-level repo/issues write access"
    required: true
  org:
    description: "GitHub organisation to sync (defaults to current repo owner)"
    required: false
    default: ${{ github.repository_owner }}
  dry-run:
    description: "Dry run — report changes without applying them"
    required: false
    default: "false"
  debug:
    description: "Enable verbose debug logging"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Sync labels
      id: sync
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ORG: ${{ inputs.org }}
        DRY_RUN: ${{ inputs.dry-run }}
        DEBUG: ${{ inputs.debug }}
        # github.action_path is the action's own directory inside the runner's _actions cache,
        # regardless of which repo triggered the workflow.  The labels JSON lives at
        # data/github-labels.json relative to the root of the CLDMV/.github repo, which is
        # four directories above this action's path:
        #   _actions/CLDMV/.github/v2/.github/actions/github/jobs/sync-org-labels  ← action_path
        #   _actions/CLDMV/.github/v2/.github/actions/github/jobs               ← ../
        #   _actions/CLDMV/.github/v2/.github/actions/github                    ← ../../
        #   _actions/CLDMV/.github/v2/.github/actions                           ← ../../../
        #   _actions/CLDMV/.github/v2/.github                                   ← ../../../../
        #   _actions/CLDMV/.github/v2                                           ← ../../../../../  (repo root)
        LABELS_JSON_PATH: ${{ github.action_path }}/../../../../../data/github-labels.json
      run: node "${{ github.action_path }}/sync.mjs"
