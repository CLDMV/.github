name: "Sync Closing Issue References"
description: "Walk the PR's commit range for `Fixes/Closes/Resolves #N` keywords and for each merged source PR's own closingIssuesReferences, then call the GraphQL addClosingIssueReference mutation so the target PR's Development sidebar (and the master squash's auto-close behavior) covers every issue any contributor PR claimed to close. Additive only — never removes an existing link, so a maintainer's manual link via the UI stays put."

inputs:
  pr-number:
    description: "PR number whose closing-issue references should be synced (the release PR for next→master / hotfixes→master)."
    required: true
  commit-range:
    description: "Git-style range `base..head` to walk for source commits and merged PR refs. Typically `master..HEAD` or `master..next` as produced by get-pr-commit-range."
    required: true
  github-token:
    description: "App installation token with pull-requests: write."
    required: true

outputs:
  added:
    description: "Comma-sep list of newly-linked issue numbers (empty when nothing changed)."
  total:
    description: "Total count of closing issue references on the PR after sync."

runs:
  using: node24
  main: action.mjs
