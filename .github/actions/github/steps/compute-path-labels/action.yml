name: "Compute Path-Based Label Aliases"
description: "For a given PR, fetch the changed-files list and match each path against a labeler config. Emits comma-sep alias names that feed into the existing resolve-labels → sync-pr-labels pipeline. Batch 5.2."

inputs:
  pr-number:
    description: "Pull request number"
    required: true
  github-token:
    description: "Token with pull-requests:read + contents:read"
    required: true
  config-path:
    description: "Path to per-repo labeler config (relative to consumer repo)"
    required: false
    default: ".github/labeler.yml"
  default-config-repo:
    description: "Org repo to fetch default config from if per-repo config is missing"
    required: false
    default: "CLDMV/.github"
  default-config-ref:
    description: "Ref / tag to fetch the default config at"
    required: false
    default: "v2"
  default-config-path:
    description: "Path to the default config in default-config-repo"
    required: false
    default: ".github/labeler.default.yml"

outputs:
  labels:
    description: "Comma-sep alias list (feed into resolve-labels)"

runs:
  using: node24
  main: action.mjs
