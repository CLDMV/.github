name: "Normalize PR Title"
description: "Rewrite a contributor PR's title to conform to Conventional Commits format, derived from the highest-priority commit in the PR. Skips bot-authored PRs (except cldmv-bot, which opens our own auto-PRs), the long-running release PRs (next/hotfixes → master), and titles starting with 'release:'."

inputs:
  pr-number:
    description: "PR number to inspect / rewrite"
    required: true
  github-token:
    description: "GitHub token with PR write access (App installation token preferred)"
    required: false
    default: ${{ github.token }}
  base-ref:
    description: "PR base branch (e.g., 'next', 'master'). When empty, fetched from API."
    required: false
  head-ref:
    description: "PR head branch. When empty, fetched from API."
    required: false
  user-type:
    description: "PR author's `user.type` from the event payload ('User' or 'Bot'). When empty, fetched from API."
    required: false
  user-login:
    description: "PR author's `user.login` from the event payload (e.g., 'cldmv-bot[bot]'). Used to allowlist specific bot accounts past the generic Bot-skip rule. When empty, fetched from API."
    required: false
  dry-run:
    description: "When 'true', compute and log the would-be title but do not PATCH the PR or post any comment."
    required: false
    default: "false"

outputs:
  rewritten:
    description: "'true' when the PR title was actually rewritten"
  new-title:
    description: "The title after normalization (or the unchanged current title)"
  skipped:
    description: "'true' when the action exited early due to a skip condition"
  skip-reason:
    description: "Human-readable reason when skipped is 'true'"

runs:
  using: "node24"
  main: "action.mjs"
