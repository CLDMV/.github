name: "🔑 Create App Token (Auto-detect)"
description: "Creates GitHub App installation token if secrets are available, otherwise falls back to default token"

inputs:
  client_id:
    description: "GitHub App Client ID (leave empty to auto-detect from BOT_APP_CLIENT_ID)"
    required: false
  private_key:
    description: "GitHub App private key (leave empty to auto-detect from BOT_APP_PRIVATE_KEY)"
    required: false
  owner:
    description: "Repository owner (defaults to current repository owner)"
    required: false
    default: ${{ github.repository_owner }}
  permission_contents:
    description: "Request contents write permission"
    required: false
    default: "false"
  permission_workflows:
    description: "Request workflows write permission (needed when pushing tags that touch .github/workflows/)"
    required: false
    default: "false"
  permission_issues:
    description: "Request issues write permission (needed for creating/updating/deleting labels)"
    required: false
    default: "false"

outputs:
  token:
    description: "The App token if available, otherwise the default GITHUB_TOKEN"
    value: ${{ steps.app-token-full.outputs.token || steps.app-token-scoped.outputs.token || github.token }}
  using_app_token:
    description: "Whether an App token was created (true/false)"
    value: ${{ steps.check-app.outputs.use_app_token }}
  installation-id:
    description: "GitHub App installation ID"
    value: ${{ steps.app-token-full.outputs.installation-id || steps.app-token-scoped.outputs.installation-id }}
  app-slug:
    description: "GitHub App slug"
    value: ${{ steps.app-token-full.outputs.app-slug || steps.app-token-scoped.outputs.app-slug }}

runs:
  using: composite
  steps:
    - name: Check if App token should be used
      id: check-app
      shell: bash
      run: |
        CLIENT_ID="${{ inputs.client_id || env.BOT_APP_CLIENT_ID }}"
        PRIVATE_KEY="${{ inputs.private_key || env.BOT_APP_PRIVATE_KEY }}"

        if [ -n "$CLIENT_ID" ] && [ -n "$PRIVATE_KEY" ]; then
          echo "use_app_token=true" >> "$GITHUB_OUTPUT"
          echo "✅ App secrets available - will use App token"
        else
          echo "use_app_token=false" >> "$GITHUB_OUTPUT"
          echo "⚠️  App secrets not available - will use default GITHUB_TOKEN"
        fi

    - name: Determine permissions mode
      id: perms-mode
      shell: bash
      run: |
        # When ANY permission flag is set to "true", enter fine-grained mode.
        # Otherwise the token inherits ALL permissions the App has.
        if [[ "${{ inputs.permission_contents }}" == "true" ]] || \
           [[ "${{ inputs.permission_workflows }}" == "true" ]] || \
           [[ "${{ inputs.permission_issues }}" == "true" ]]; then
          echo "fine_grained=true" >> "$GITHUB_OUTPUT"
          echo "🔒 Fine-grained permissions mode"
        else
          echo "fine_grained=false" >> "$GITHUB_OUTPUT"
          echo "🔓 Full app permissions mode (no fine-grained scoping)"
        fi

    - name: Create installation access token (all app permissions)
      id: app-token-full
      if: ${{ steps.check-app.outputs.use_app_token == 'true' && steps.perms-mode.outputs.fine_grained == 'false' }}
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.client_id || env.BOT_APP_CLIENT_ID }}
        private-key: ${{ inputs.private_key || env.BOT_APP_PRIVATE_KEY }}
        owner: ${{ inputs.owner }}
        skip-token-revoke: true

    - name: Create installation access token (fine-grained permissions)
      id: app-token-scoped
      if: ${{ steps.check-app.outputs.use_app_token == 'true' && steps.perms-mode.outputs.fine_grained == 'true' }}
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.client_id || env.BOT_APP_CLIENT_ID }}
        private-key: ${{ inputs.private_key || env.BOT_APP_PRIVATE_KEY }}
        owner: ${{ inputs.owner }}
        skip-token-revoke: true
        permission-contents: ${{ inputs.permission_contents == 'true' && 'write' || '' }}
        permission-workflows: ${{ inputs.permission_workflows == 'true' && 'write' || '' }}
        permission-issues: ${{ inputs.permission_issues == 'true' && 'write' || '' }}
