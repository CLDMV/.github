name: "📦 Fetch Embedded Private Repos"
description: "Detect anonymous gitlinks in the parent's HEAD and clone each into its expected directory using the CLDMV bot App. See docs/conventions/embedded-tests-ci.md for the design."

inputs:
  client_id:
    description: "GitHub App Client ID (typically `secrets.BOT_APP_CLIENT_ID`). If empty, the create-app-token sub-action falls back to `env.BOT_APP_CLIENT_ID`."
    required: false
  private_key:
    description: "GitHub App private key (typically `secrets.BOT_APP_PRIVATE_KEY`). If empty, falls back to `env.BOT_APP_PRIVATE_KEY`."
    required: false
  debug:
    description: "Enable verbose logging for the detection and fetch steps"
    required: false
    default: "false"

# NO CONFIG FILE INPUT.
# The URL mapping is convention-only by design — a tracked config file
# would publish the mapping between gitlink paths and private repo names,
# which is exactly the leak anonymous gitlinks are meant to avoid.
# See docs/conventions/embedded-tests-ci.md for the two conventions
# (per-path and consolidated `<repo>-embedded`).

outputs:
  fetched_paths:
    description: "Newline-separated list of gitlink paths that were successfully fetched"
    value: ${{ steps.fetch.outputs.fetched_paths }}
  skipped_reason:
    description: "If the action skipped without fetching, the reason ('no-secrets', 'no-gitlinks', or empty)"
    value: ${{ steps.check.outputs.skipped_reason || steps.detect.outputs.skipped_reason }}
  convention:
    description: "Which convention was used: 'per-path', 'consolidated', or empty if skipped"
    value: ${{ steps.convention.outputs.convention }}

runs:
  using: composite
  steps:
    # ──────────────────────────────────────────────────────────────────
    # Step 1 — short-circuit on missing secrets (the fork-PR case).
    # ──────────────────────────────────────────────────────────────────
    - name: Check secret availability
      id: check
      shell: bash
      run: |
        # Resolve inputs with env-var fallback (matches create-app-token convention).
        private_key="${{ inputs.private_key }}"
        if [ -z "$private_key" ]; then
          private_key="${BOT_APP_PRIVATE_KEY:-}"
        fi
        if [ -z "$private_key" ]; then
          echo "skipped_reason=no-secrets" >> "$GITHUB_OUTPUT"
          echo "should_continue=false" >> "$GITHUB_OUTPUT"
          echo "::notice::No bot App credentials available; skipping embedded-repo fetch (typical for fork-PR runs without secrets)"
        else
          echo "should_continue=true" >> "$GITHUB_OUTPUT"
        fi

    # ──────────────────────────────────────────────────────────────────
    # Step 2 — detect gitlinks in the parent's HEAD.
    # ──────────────────────────────────────────────────────────────────
    - name: Detect embedded gitlinks
      id: detect
      if: steps.check.outputs.should_continue == 'true'
      shell: bash
      run: |
        # `git ls-tree -r HEAD` enumerates every tree entry.
        # Type 'commit' marks gitlinks (mode 160000).
        gitlinks=$(git ls-tree -r HEAD | awk '$2 == "commit" { printf "%s\t%s\n", $3, $4 }')
        if [ -z "$gitlinks" ]; then
          echo "skipped_reason=no-gitlinks" >> "$GITHUB_OUTPUT"
          echo "should_continue=false" >> "$GITHUB_OUTPUT"
          echo "::notice::No embedded gitlinks found in HEAD; nothing to fetch"
        else
          count=$(printf '%s\n' "$gitlinks" | wc -l)
          echo "::notice::Found ${count} embedded gitlink(s) to fetch"
          if [ "${{ inputs.debug }}" = "true" ]; then
            printf '  %s\n' "$gitlinks" | sed 's/\t/ → /'
          fi
          echo "should_continue=true" >> "$GITHUB_OUTPUT"
          {
            echo "gitlinks<<EMBEDDED_EOF"
            printf '%s\n' "$gitlinks"
            echo "EMBEDDED_EOF"
          } >> "$GITHUB_OUTPUT"
        fi

    # ──────────────────────────────────────────────────────────────────
    # Step 3 — mint the App token (read-only contents).
    # ──────────────────────────────────────────────────────────────────
    # Reuses the existing create-app-token composite. If client_id/private_key
    # inputs are empty, it falls back to BOT_APP_CLIENT_ID/BOT_APP_PRIVATE_KEY env vars.
    - name: Create App token
      id: app-token
      if: steps.detect.outputs.should_continue == 'true'
      uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
      with:
        client_id: ${{ inputs.client_id }}
        private_key: ${{ inputs.private_key }}

    # ──────────────────────────────────────────────────────────────────
    # Step 4 — determine which convention is in use.
    # ──────────────────────────────────────────────────────────────────
    # Two conventions (see docs/conventions/embedded-tests-ci.md):
    #   1. per-path:      each gitlink path → <org>/<repo>-<dashed-path>
    #   2. consolidated:  all gitlinks → subdirs of <org>/<repo>-embedded
    # Selection: probe for <org>/<repo>-embedded; if accessible, use consolidated.
    - name: Determine convention
      id: convention
      if: steps.detect.outputs.should_continue == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        owner="${GITHUB_REPOSITORY%/*}"
        parent_name="${GITHUB_REPOSITORY##*/}"
        embedded_repo="${owner}/${parent_name}-embedded"

        if gh api "repos/${embedded_repo}" --silent 2>/dev/null; then
          echo "convention=consolidated" >> "$GITHUB_OUTPUT"
          echo "embedded_repo=${embedded_repo}" >> "$GITHUB_OUTPUT"
          echo "::notice::Using consolidated convention: ${embedded_repo}"

          # Detect per-path repos that would conflict; warn if found.
          warn=""
          while IFS=$'\t' read -r _ path; do
            [ -z "$path" ] && continue
            suffix=$(echo "$path" | sed 's|/$||' | tr '/' '-')
            per_path_repo="${owner}/${parent_name}-${suffix}"
            if gh api "repos/${per_path_repo}" --silent 2>/dev/null; then
              warn="${warn}  - ${per_path_repo}"$'\n'
            fi
          done <<< "${{ steps.detect.outputs.gitlinks }}"
          if [ -n "$warn" ]; then
            echo "::warning::Both '${embedded_repo}' AND per-path repos exist; using consolidated. Per-path repos found:"
            printf '%s' "$warn" >&2
            echo "Consider removing the per-path repos to make the convention choice unambiguous."
          fi
        else
          echo "convention=per-path" >> "$GITHUB_OUTPUT"
          echo "::notice::Using per-path convention (one private repo per gitlink)"
        fi

    # ──────────────────────────────────────────────────────────────────
    # Step 5 — fetch each embedded repo.
    # ──────────────────────────────────────────────────────────────────
    # Branches on the convention detected in step 4.
    # Partial success is NOT acceptable — any failure exits the action.
    - name: Fetch private repos
      id: fetch
      if: steps.detect.outputs.should_continue == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        set -e
        owner="${GITHUB_REPOSITORY%/*}"
        parent_name="${GITHUB_REPOSITORY##*/}"
        convention="${{ steps.convention.outputs.convention }}"
        fetched=""

        if [ "$convention" = "consolidated" ]; then
          embedded_repo="${{ steps.convention.outputs.embedded_repo }}"
          tmp_dir=$(mktemp -d)

          if ! git clone --quiet "https://x-access-token:${GH_TOKEN}@github.com/${embedded_repo}.git" "$tmp_dir" 2>/dev/null; then
            echo "::error::Failed to clone ${embedded_repo} (check that the bot App is installed on this repo)"
            rm -rf "$tmp_dir"
            exit 1
          fi

          while IFS=$'\t' read -r sha path; do
            [ -z "$path" ] && continue
            # Pin the tmp clone to this gitlink's SHA. Each gitlink in the
            # parent can pin a different SHA of -embedded; the tmp gets
            # re-pinned per gitlink before extracting its subdir.
            if ! (cd "$tmp_dir" && git checkout --quiet --detach "$sha" 2>/dev/null); then
              echo "::error::SHA ${sha} not found on ${embedded_repo}; push the missing commit for path '${path}'"
              rm -rf "$tmp_dir"
              exit 1
            fi
            # The path inside -embedded mirrors the parent's gitlink path.
            src="${tmp_dir}/${path%/}"
            if [ ! -d "$src" ]; then
              echo "::error::Path '${path}' not found in ${embedded_repo}@${sha} (expected directory at ${src})"
              rm -rf "$tmp_dir"
              exit 1
            fi
            # Stage into parent's working tree at the gitlink path.
            dest="${path%/}"
            mkdir -p "$(dirname "$dest")"
            rm -rf "$dest"
            cp -r "$src" "$dest"
            fetched="${fetched}${dest}"$'\n'
            echo "  ✓ ${dest}  ←  ${embedded_repo}@${sha:0:8}/${path%/}"
          done <<< "${{ steps.detect.outputs.gitlinks }}"

          rm -rf "$tmp_dir"

        else
          # Per-path convention: one private repo per gitlink path.
          while IFS=$'\t' read -r sha path; do
            [ -z "$path" ] && continue
            suffix=$(echo "$path" | sed 's|/$||' | tr '/' '-')
            repo="${owner}/${parent_name}-${suffix}"
            dest="${path%/}"

            if ! git clone --no-checkout --quiet "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git" "$dest" 2>/dev/null; then
              echo "::error::Failed to clone ${repo} for gitlink '${path}' (check bot App installation and that the repo exists)"
              exit 1
            fi
            if ! (cd "$dest" && git checkout --quiet --detach "$sha" 2>/dev/null); then
              echo "::error::SHA ${sha} not found on ${repo}; push the missing commit"
              exit 1
            fi
            # Verify the checkout landed at the expected SHA.
            actual=$(cd "$dest" && git rev-parse HEAD)
            if [ "$actual" != "$sha" ]; then
              echo "::error::${repo} checkout landed at ${actual}, expected ${sha}"
              exit 1
            fi
            fetched="${fetched}${dest}"$'\n'
            echo "  ✓ ${dest}  ←  ${repo}@${sha:0:8}"
          done <<< "${{ steps.detect.outputs.gitlinks }}"
        fi

        {
          echo "fetched_paths<<EMBEDDED_EOF"
          printf '%s' "$fetched"
          echo "EMBEDDED_EOF"
        } >> "$GITHUB_OUTPUT"

    # ──────────────────────────────────────────────────────────────────
    # Step 6 — render a summary to $GITHUB_STEP_SUMMARY.
    # ──────────────────────────────────────────────────────────────────
    - name: Summary
      if: always()
      shell: bash
      run: |
        skip="${{ steps.check.outputs.skipped_reason }}${{ steps.detect.outputs.skipped_reason }}"
        convention="${{ steps.convention.outputs.convention }}"
        fetched='${{ steps.fetch.outputs.fetched_paths }}'
        {
          echo "### 📦 Embedded private repos"
          echo ""
          if [ -n "$skip" ]; then
            case "$skip" in
              no-secrets)
                echo "**Skipped:** no bot App credentials available (typical for fork PRs)."
                ;;
              no-gitlinks)
                echo "**Skipped:** no embedded gitlinks found in HEAD."
                ;;
              *)
                echo "**Skipped:** \`${skip}\`"
                ;;
            esac
          elif [ -n "$fetched" ]; then
            echo "**Convention:** \`${convention}\`"
            echo ""
            echo "**Fetched:**"
            while IFS= read -r p; do
              [ -n "$p" ] && echo "- \`${p}\`"
            done <<< "$fetched"
          else
            echo "_No action taken._"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
