name: "Resolve Label Aliases"
description: "Resolves comma-separated label aliases to their canonical names from data/github-labels.json"

inputs:
  aliases:
    description: "Comma-separated label aliases to resolve (e.g. 'release,patch,bug')"
    required: true

outputs:
  labels:
    description: "Comma-separated canonical label names ready to apply to a PR/issue"
    value: ${{ steps.resolve.outputs.labels }}

runs:
  using: "composite"
  steps:
    - name: Resolve label aliases
      id: resolve
      shell: bash
      env:
        INPUT_ALIASES: ${{ inputs.aliases }}
      run: node "${{ github.action_path }}/resolve.mjs"
