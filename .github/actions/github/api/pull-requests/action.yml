name: "Create Pull Request"
description: "Create or update a pull request with release changes"

inputs:
  title:
    description: "PR title"
    required: true
  base-branch:
    description: "Base branch for the PR"
    required: true
  head-branch:
    description: "Head branch for the PR"
    required: true
  body-content:
    description: "PR body content"
    required: true
  labels:
    description: "Comma-separated list of labels"
    required: false
    default: "release"
  managed-labels:
    description: "Comma-separated allowlist of labels the update path may remove. When set on an EXISTING PR, only labels in this set are removed when not in 'labels' — anything outside (e.g. path-based labels from the labeler workflow) is left alone. Empty (default) = the historical full-replace behavior."
    required: false
    default: ""
  github-token:
    description: "GitHub token for API access (overridden by the GITHUB_TOKEN env var if set)"
    required: false
    default: ${{ github.token }}

outputs:
  pr-number:
    description: "Number of the created/existing PR"
  pr-created:
    description: "Whether a new PR was created (false if existing PR was found)"

runs:
  using: "node24"
  main: "action.mjs"
