name: "Create GitHub Release via API"
description: "Reusable action to create a GitHub release, supporting prerelease, draft, and asset uploads."

inputs:
  debug:
    description: "Enable debug logging"
    required: false
    default: "false"
  tag_name:
    description: "Tag name for the release (e.g. v1.2.3)"
    required: true
  name:
    description: "Release name (title)"
    required: true
  body:
    description: "Release notes content in markdown"
    required: false
    default: ""
  is_prerelease:
    description: "Whether this is a prerelease"
    required: false
    default: "false"
  is_draft:
    description: "Whether this is a draft release"
    required: false
    default: "false"
  make_latest:
    description: "GitHub 'make_latest' release field: 'true' | 'false' | 'legacy'. Leave empty to
      let GitHub apply its own default (true — the release created/updated becomes 'Latest').
      Satellite packages (docs/conventions/satellite-packages.md) must pass 'false' so a
      satellite release published after the core release doesn't steal the 'Latest release'
      badge from it."
    required: false
    default: ""
  assets:
    description: "Comma-separated list of file paths to upload as release assets"
    required: false
    default: ""
  repo:
    description: "owner/repo (defaults to current repository)"
    required: false

outputs:
  release_id:
    description: "ID of the created GitHub release"
  html_url:
    description: "URL of the created release"
  upload_url:
    description: "Upload URL for assets"

runs:
  using: "node24"
  main: "action.mjs"
