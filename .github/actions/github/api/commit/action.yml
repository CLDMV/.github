name: "Create Signed Commit"
description: "Create a signed commit via GitHub API with version bump and build artifacts"

inputs:
  commit-message:
    description: "Commit message"
    required: true
  github-token:
    description: "GitHub token for API access"
    required: true

outputs:
  commit-sha:
    description: "SHA of the created commit"
    value: ${{ steps.commit.outputs.commit-sha }}
  verified:
    description: "Whether the commit was verified"
    value: ${{ steps.commit.outputs.verified }}

runs:
  using: "composite"
  steps:
    - name: Create signed commit via GitHub API
      id: commit
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        # Check if there are changes to commit
        git add .
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        # Get current branch and commit info
        CURRENT_BRANCH="${{ github.ref_name }}"
        BASE_SHA=$(git rev-parse HEAD)
        TMP_DIR="tmp/commit-api"
        mkdir -p "$TMP_DIR"

        # Create tree with all changes using GitHub API
        echo "📦 Creating tree with version bump and build artifacts..."

        # Refresh the local git index
        git update-index --refresh || true

        # Build tree entries from staged changes so GitHub can create a remote tree SHA
        echo "📄 Building API tree items from staged changes..."
        : > "$TMP_DIR/tree-items.ndjson"

        git diff --cached --name-status | while IFS=$'\t' read -r status path extra; do
          [ -z "$status" ] && continue

          case "$status" in
            D*)
              echo "Queue delete: $path"
              jq -n --arg path "$path" '{path: $path, mode: "100644", type: "blob", sha: null}' >> "$TMP_DIR/tree-items.ndjson"
              ;;
            R*)
              echo "Queue rename: $path -> $extra"
              # Delete old path
              jq -n --arg path "$path" '{path: $path, mode: "100644", type: "blob", sha: null}' >> "$TMP_DIR/tree-items.ndjson"

              # Add new path from staged blob content
              MODE=$(git ls-files --stage -- "$extra" | awk '{print $1}' | head -n1)
              [ -z "$MODE" ] && MODE="100644"
              CONTENT=$(git show ":$extra" | base64 -w 0)
              BLOB_RESPONSE=$(printf '{"content":"%s","encoding":"base64"}' "$CONTENT" | \
                curl -s -X POST \
                  -H "Authorization: token ${{ inputs.github-token }}" \
                  -H "Accept: application/vnd.github.v3+json" \
                  -H "Content-Type: application/json" \
                  --data-binary @- \
                  "https://api.github.com/repos/${{ github.repository }}/git/blobs")
              BLOB_SHA=$(echo "$BLOB_RESPONSE" | jq -r '.sha')
              if [ -z "$BLOB_SHA" ] || [ "$BLOB_SHA" = "null" ]; then
                echo "❌ Failed creating blob for renamed path: $extra"
                echo "Blob response: $BLOB_RESPONSE"
                exit 1
              fi
              jq -n --arg path "$extra" --arg mode "$MODE" --arg sha "$BLOB_SHA" '{path: $path, mode: $mode, type: "blob", sha: $sha}' >> "$TMP_DIR/tree-items.ndjson"
              ;;
            *)
              TARGET_PATH="$path"
              MODE=$(git ls-files --stage -- "$TARGET_PATH" | awk '{print $1}' | head -n1)
              [ -z "$MODE" ] && MODE="100644"

              echo "Queue upsert: $TARGET_PATH"
              CONTENT=$(git show ":$TARGET_PATH" | base64 -w 0)
              BLOB_RESPONSE=$(printf '{"content":"%s","encoding":"base64"}' "$CONTENT" | \
                curl -s -X POST \
                  -H "Authorization: token ${{ inputs.github-token }}" \
                  -H "Accept: application/vnd.github.v3+json" \
                  -H "Content-Type: application/json" \
                  --data-binary @- \
                  "https://api.github.com/repos/${{ github.repository }}/git/blobs")
              BLOB_SHA=$(echo "$BLOB_RESPONSE" | jq -r '.sha')
              if [ -z "$BLOB_SHA" ] || [ "$BLOB_SHA" = "null" ]; then
                echo "❌ Failed creating blob for path: $TARGET_PATH"
                echo "Blob response: $BLOB_RESPONSE"
                exit 1
              fi

              jq -n --arg path "$TARGET_PATH" --arg mode "$MODE" --arg sha "$BLOB_SHA" '{path: $path, mode: $mode, type: "blob", sha: $sha}' >> "$TMP_DIR/tree-items.ndjson"
              ;;
          esac
        done

        TREE_ITEMS_JSON=$(jq -s . "$TMP_DIR/tree-items.ndjson")
        ITEM_COUNT=$(echo "$TREE_ITEMS_JSON" | jq 'length')

        if [ "$ITEM_COUNT" -eq 0 ]; then
          echo "❌ No staged tree items were generated for API commit"
          exit 1
        fi

        echo "✅ Prepared $ITEM_COUNT tree items"

        # Now create the tree via API
        echo "🌳 Creating tree via GitHub API..."

        # Create the full tree JSON
        BASE_TREE=$(git rev-parse HEAD^{tree})
        TREE_JSON=$(jq -n --arg base_tree "$BASE_TREE" --argjson tree "$TREE_ITEMS_JSON" '{
          base_tree: $base_tree,
          tree: $tree
        }')

        echo "Tree JSON: $TREE_JSON"

        echo "$TREE_JSON" | \
        curl -s -X POST \
          -H "Authorization: token ${{ inputs.github-token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Content-Type: application/json" \
          --data-binary @- \
          "https://api.github.com/repos/${{ github.repository }}/git/trees" > "$TMP_DIR/tree_response.json"

        API_TREE_SHA=$(cat "$TMP_DIR/tree_response.json" | jq -r '.sha')

        if [ "$API_TREE_SHA" = "null" ] || [ -z "$API_TREE_SHA" ]; then
          echo "❌ Failed to create tree via API"
          echo "Response: $(cat "$TMP_DIR/tree_response.json")"
          exit 1
        fi

        echo "✅ Created tree via API: $API_TREE_SHA"
        FINAL_TREE_SHA="$API_TREE_SHA"

        # Create commit using GitHub API (automatically signed)
        echo "✍️ Creating signed commit via GitHub API..."
        COMMIT_RESPONSE=$(curl -s -X POST \
          -H "Authorization: token ${{ inputs.github-token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/git/commits" \
          -d "{
            \"message\": \"${{ inputs.commit-message }}\",
            \"tree\": \"$FINAL_TREE_SHA\",
            \"parents\": [\"$BASE_SHA\"]
          }")

        # Extract new commit SHA and verification status
        NEW_COMMIT_SHA=$(echo "$COMMIT_RESPONSE" | jq -r '.sha')
        VERIFIED=$(echo "$COMMIT_RESPONSE" | jq -r '.verification.verified')
        VERIFICATION_REASON=$(echo "$COMMIT_RESPONSE" | jq -r '.verification.reason')

        if [ "$NEW_COMMIT_SHA" = "null" ] || [ -z "$NEW_COMMIT_SHA" ]; then
          echo "❌ Failed to create commit via API"
          echo "Response: $COMMIT_RESPONSE"
          echo "This likely means some git objects don't exist remotely."
          echo "Tree SHA: $FINAL_TREE_SHA"
          exit 1
        fi

        echo "✅ Created signed commit: $NEW_COMMIT_SHA"
        echo "🔐 Verified: $VERIFIED (reason: $VERIFICATION_REASON)"

        # Update branch reference to new signed commit
        echo "📌 Updating branch reference..."
        UPDATE_RESPONSE=$(curl -s -X PATCH \
          -H "Authorization: token ${{ inputs.github-token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/$CURRENT_BRANCH" \
          -d "{
            \"sha\": \"$NEW_COMMIT_SHA\"
          }")

        echo "✅ Updated branch $CURRENT_BRANCH to signed commit"
        echo "Update response: $UPDATE_RESPONSE"

        # Set outputs
        echo "commit-sha=$NEW_COMMIT_SHA" >> $GITHUB_OUTPUT
        echo "verified=$VERIFIED" >> $GITHUB_OUTPUT
