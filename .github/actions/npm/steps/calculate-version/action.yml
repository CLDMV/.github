name: "Calculate Version"
description: "Calculate new version based on current package.json and bump type"

inputs:
  version-bump:
    description: "Type of version bump (major, minor, patch, explicit)"
    required: true
  explicit-version:
    description: "Explicit version to use when version-bump is explicit"
    required: false
  base-version:
    description: "Version to calculate from (overrides package.json). Provide the version at the branch divergence point so re-runs remain idempotent."
    required: false

outputs:
  current-version:
    description: "Current version from package.json"
  new-version:
    description: "Calculated new version"

runs:
  using: "node24"
  main: "action.mjs"
