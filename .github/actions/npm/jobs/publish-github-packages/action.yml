name: "Publish to GitHub Packages"
description: "Composite action for publishing to GitHub Packages registry"

inputs:
  package-name:
    description: "Name of the package to publish"
    required: true
  version:
    description: "Version to publish"
    required: true
  node-version:
    description: "Node.js version to use"
    required: false
    default: "lts/*"
  package-manager:
    description: "Package manager (npm or yarn)"
    required: false
    default: "npm"
  publish-command:
    description: "Command to publish the package"
    required: true
  dry-run:
    description: "Dry run mode - validate everything but don't publish"
    required: false
    default: "false"
  github-token:
    description: "GitHub token for authentication"
    required: true
  artifact-name:
    description: "Name of the build artifact to download"
    required: false
    default: "build-artifacts"

outputs:
  published:
    description: "Whether the package was successfully published"
    value: ${{ steps.publish-package.outputs.published }}

runs:
  using: composite
  steps:
    - name: Generate publish command
      id: generate-command
      shell: bash
      run: node "${{ github.action_path }}/generate-command.mjs"
      env:
        CUSTOM_CMD: ${{ inputs.publish-command }}
        PACKAGE_MANAGER: ${{ inputs.package-manager }}

    - name: Publish package to GitHub Packages
      id: publish-package
      uses: CLDMV/.github/.github/actions/npm/steps/publish-package@v4
      with:
        registry-name: "GitHub Packages"
        registry-url: "https://npm.pkg.github.com"
        package-name: ${{ inputs.package-name }}
        version: ${{ inputs.version }}
        node-version: ${{ inputs.node-version }}
        package-manager: ${{ inputs.package-manager }}
        publish-command: ${{ steps.generate-command.outputs.command }}
        dry-run: ${{ inputs.dry-run }}
        auth-token: ${{ inputs.github-token }}
        artifact-name: ${{ inputs.artifact-name }}

    - name: GitHub Packages publishing summary
      if: always()
      shell: bash
      run: node "${{ github.action_path }}/summary.mjs"
      env:
        PACKAGE_NAME: ${{ inputs.package-name }}
        VERSION: ${{ inputs.version }}
        DRY_RUN: ${{ inputs.dry-run }}
        PUBLISHED: ${{ steps.publish-package.outputs.published }}
        COMMAND: ${{ steps.generate-command.outputs.command }}
        REPOSITORY: ${{ github.repository }}
