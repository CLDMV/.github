name: "Build and Test NPM Package"
description: "Composite action for building and testing NPM packages"

inputs:
  node-version:
    description: "Node.js version to use"
    required: false
    default: "lts/*"
  package-manager:
    description: "Package manager (npm or yarn)"
    required: false
    default: "npm"
  test-command:
    description: "Command to run pre-build tests"
    required: false
    default: "npm test"
  build-command:
    description: "Command to build package"
    required: false
    default: "npm run build:ci"
  skip-performance-tests:
    description: "Skip performance tests during CI"
    required: false
    default: "false"
  test-environment:
    description: "Environment for tests (affects NODE_ENV and NODE_OPTIONS --conditions flag)"
    required: false
    default: "development"

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v4

    - name: Setup Node.js
      uses: CLDMV/.github/.github/actions/common/steps/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      uses: CLDMV/.github/.github/actions/npm/steps/install-dependencies@v4
      with:
        package-manager: ${{ inputs.package-manager }}

    - name: Get Node.js Version
      id: get_node_version
      uses: CLDMV/.github/.github/actions/node/steps/get-node-version@v4
      with:
        label: ${{ (inputs.node-version == 'lts/*' || inputs.node-version == 'lts') && 'lts' || '' }}

    - name: Run pre-build tests
      id: pre-tests
      uses: CLDMV/.github/.github/actions/common/steps/run-tests@v4
      with:
        test-command: ${{ inputs.test-command }}
        environment: ${{ inputs.test-environment }}

    - name: Build package
      id: build
      uses: CLDMV/.github/.github/actions/common/steps/build-project@v4
      with:
        build-command: ${{ inputs.build-command }}
        environment: production

    - name: Create npm package
      id: create-package
      uses: CLDMV/.github/.github/actions/npm/steps/create-package@v4
      with:
        package-manager: ${{ inputs.package-manager }}

    - name: Extract package contents for artifacts
      shell: bash
      run: node "${{ github.action_path }}/extract-contents.mjs"

    - name: Upload build artifacts
      uses: CLDMV/.github/.github/actions/common/steps/upload-artifacts@v4
      with:
        artifact-name: build-artifacts-${{ steps.get_node_version.outputs.node-label }}
        artifact-path: |
          dist/
          lib/
          build/
          *.tgz
          package-contents/
          package.json
          package-lock.json
          yarn.lock
        retention-days: 1

    - name: Build & Test summary
      if: always()
      shell: bash
      run: node "${{ github.action_path }}/summary.mjs"
      env:
        NODE_VERSION: ${{ inputs.node-version }}
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
        PRE_TESTS_OUTCOME: ${{ steps.pre-tests.outcome }}
        BUILD_OUTCOME: ${{ steps.build.outcome }}
