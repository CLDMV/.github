name: "Build and Test NPM Package"
description: "Composite action for building and testing NPM packages"

inputs:
  node-version:
    description: "Node.js version to use"
    required: false
    default: "lts/*"
  package-manager:
    description: "Package manager (npm or yarn)"
    required: false
    default: "npm"
  test-command:
    description: "Command to run pre-build tests"
    required: false
    default: "npm test"
  build-command:
    description: "Command to build package"
    required: false
    default: "npm run build:ci"
  build-subpackages-command:
    description: "Optional command run after the main build to carve satellite packages
      into dist-packages/<name>/. Leave empty (default) to skip, or fold the carve into
      build-command instead. See docs/conventions/satellite-packages.md."
    required: false
    default: ""
  skip-performance-tests:
    description: "Skip performance tests during CI"
    required: false
    default: "false"
  test-environment:
    description: "Environment for tests (affects NODE_ENV and NODE_OPTIONS --conditions flag)"
    required: false
    default: "development"
  enable-embedded-tests:
    description: "Fetch and run private tests from embedded anonymous gitlinks via the org bot App. See docs/conventions/embedded-tests-ci.md."
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v4

    # When enabled, mint an App token then detect anonymous gitlinks in HEAD
    # and clone the matching private repos. Runs after checkout (gitlinks must
    # be in the tree) and before any build/test steps (tests need the files
    # present). Silently no-ops on fork PRs where the bot App secrets aren't
    # available (the token step returns empty, fetch-embedded-repos skips).
    - name: Create App token (for embedded-tests fetch)
      if: inputs.enable-embedded-tests == 'true'
      id: embedded-tests-token
      uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4

    - name: Fetch embedded private tests
      if: inputs.enable-embedded-tests == 'true'
      uses: CLDMV/.github/.github/actions/github/steps/fetch-embedded-repos@v4
      with:
        token: ${{ steps.embedded-tests-token.outputs.token }}

    - name: Setup Node.js
      uses: CLDMV/.github/.github/actions/common/steps/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      uses: CLDMV/.github/.github/actions/npm/steps/install-dependencies@v4
      with:
        package-manager: ${{ inputs.package-manager }}

    - name: Get Node.js Version
      id: get_node_version
      uses: CLDMV/.github/.github/actions/node/steps/get-node-version@v4
      with:
        label: ${{ (inputs.node-version == 'lts/*' || inputs.node-version == 'lts') && 'lts' || '' }}

    - name: Run pre-build tests
      id: pre-tests
      uses: CLDMV/.github/.github/actions/common/steps/run-tests@v4
      with:
        test-command: ${{ inputs.test-command }}
        environment: ${{ inputs.test-environment }}

    - name: Build package
      id: build
      uses: CLDMV/.github/.github/actions/common/steps/build-project@v4
      with:
        build-command: ${{ inputs.build-command }}
        environment: production

    # Carve satellite packages from the build output into dist-packages/<name>/.
    # Optional; satellites also supported by folding the carve into build-command.
    # Runs after the build so dist/ is present, and before artifact upload so the
    # staged dirs ride the same artifact. See docs/conventions/satellite-packages.md.
    - name: Build satellite packages
      if: inputs.build-subpackages-command != ''
      shell: bash
      run: ${{ inputs.build-subpackages-command }}

    - name: Create npm package
      id: create-package
      uses: CLDMV/.github/.github/actions/npm/steps/create-package@v4
      with:
        package-manager: ${{ inputs.package-manager }}

    - name: Extract package contents for artifacts
      shell: bash
      run: node "${{ github.action_path }}/extract-contents.mjs"

    - name: Upload build artifacts
      uses: CLDMV/.github/.github/actions/common/steps/upload-artifacts@v4
      with:
        artifact-name: build-artifacts-${{ steps.get_node_version.outputs.node-label }}
        artifact-path: |
          dist/
          lib/
          build/
          *.tgz
          package-contents/
          dist-packages/
          package.json
          package-lock.json
          yarn.lock
        retention-days: 1

    - name: Build & Test summary
      if: always()
      shell: bash
      run: node "${{ github.action_path }}/summary.mjs"
      env:
        NODE_VERSION: ${{ inputs.node-version }}
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
        PRE_TESTS_OUTCOME: ${{ steps.pre-tests.outcome }}
        BUILD_OUTCOME: ${{ steps.build.outcome }}
