name: "Notifier"
description: "Dispatch a release / PR / release-PR notification. Reads one secret per (type, kind, visibility) tuple from env; if the secret is set, the channel fires. No config file."

inputs:
  event_kind:
    description: "Which event triggered: `releases` (release: published), `pr` (pull_request: opened), `release_pr` (release-PR open/version-bump from update-release-pr)."
    required: true
  pr_number:
    description: "PR number — required when event_kind=release_pr (other kinds read it from the event payload)."
    required: false
  version:
    description: "Target version e.g. `4.5.0` — required when event_kind=release_pr."
    required: false
  github_token:
    description: "Token with read access to the repo (visibility detection + PR fetch for release_pr kind)."
    required: true

runs:
  using: node24
  main: action.mjs
