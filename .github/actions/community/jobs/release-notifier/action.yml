name: "Release Notifier"
description: "On `release: published`, fan out to one or more channels (Discord, Slack, generic webhook). Org-default config merged with per-repo override by channel id. Batch 6.2."

inputs:
  config_path:
    required: false
    default: ".github/release-notifier.yml"
  default_config_repo:
    required: false
    default: "CLDMV/.github"
  default_config_ref:
    required: false
    default: "v2"
  default_config_path:
    required: false
    default: ".github/templates/release-notifier.default.yml"
  github_token:
    required: true

runs:
  using: node24
  main: action.mjs
