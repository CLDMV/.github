# CLDMV org-default release-notifier channels.
# Each entry is merged with per-repo overrides by `id`.
# Per-repo override: place .github/release-notifier.yml in the consumer repo.
#
# Channel types:
#   - discord  → rich embed via Discord webhook
#   - slack    → Block Kit message via Slack webhook
#   - webhook  → generic JSON POST (Matrix, Mattermost, anything that takes JSON)
#
# `webhook_secret` names the GitHub Actions secret to read for the URL.
# Per-repo configs typically override `enabled: false` to opt out, OR add
# new channel entries with unique ids.

channels:
  # Example default channels — adjust to your actual webhook secrets.
  # Empty by default; consumers add what they need.
