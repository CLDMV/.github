# CodeQL config for THIS repo's Local CodeQL workflow.
# CodeQL requires this file to live INSIDE the workspace (under the checked-out
# tree), so it's committed here rather than generated at runtime in /tmp.
# Referenced by .github/workflows/local-codeql.yml via `config-file:`.

paths-ignore:
    - node_modules/
    - tmp/
    - backup/
    - .archive/
    - examples/

# Org-wide false-positive suppressions. Every entry here needs a clear
# rationale; the cost of misuse is real findings being suppressed silently.
query-filters:
    # js/file-data-to-network-request — "Outbound network request depends
    # on file data."
    #
    # Triggers on every action that reads `GITHUB_EVENT_PATH` (a JSON
    # event file written by GitHub Actions infrastructure) and forwards
    # a scalar from it to an outbound HTTP request. Covered call sites:
    #   - .github/actions/community/jobs/release-notifier/channels/*.mjs
    #     POST event fields to a Discord / Slack / generic webhook URL.
    #   - .github/actions/github/jobs/dependabot-auto-merge/action.mjs
    #     POSTs `pr.node_id` to api.github.com/graphql to call
    #     enablePullRequestAutoMerge.
    #   - .github/actions/github/jobs/member-auto-merge/action.mjs
    #     Same shape as dependabot-auto-merge for org-member PRs.
    #
    # Why it's a false positive in this codebase:
    #   - The source file is runner-local — written by GitHub Actions
    #     infrastructure, not user input, not a configurable path.
    #   - The destination URL is either a GitHub Actions secret (the
    #     notifier webhooks) or a hardcoded GitHub API endpoint (the
    #     auto-merge dispatchers) — never pulled from the event payload.
    #   - The fields broadcast are already public GitHub event data
    #     visible to anyone who can read the repo. For the auto-merge
    #     actions, only the PR's opaque GraphQL node_id is sent.
    #   - Each action explicitly whitelists specific scalar fields off
    #     the parsed event into a fresh object literal (notifier's
    #     buildEventData, the auto-merge actions' `variables` object);
    #     the parsed `event` itself is never passed verbatim.
    #
    # Forwarding GitHub event data to a configured webhook (notifier) or
    # to GitHub's own GraphQL API (auto-merge) IS the entire purpose of
    # these actions — no code change resolves the alert, only a behavior
    # change that defeats the feature would.
    #
    # Suppressed query-globally rather than via paths-ignore so the
    # dispatcher files keep coverage from every OTHER CodeQL query (XSS
    # in embed content, prototype-pollution in JSON.stringify, etc.).
    # The trade-off: a NEW legitimate file → network flow added elsewhere
    # in this repo also escapes this specific query. The repo's other
    # `readFileSync` usages don't feed into fetch(), and any reviewer
    # adding such a path should update the call-site list above and
    # weigh whether to keep the suppression.
    #
    # Does not propagate to consumer repos: this config is loaded only
    # by THIS repo's local-codeql.yml. Consumers use reusable-codeql.yml
    # with their own config_file or a generated one, and they analyze
    # their own source — not our notifier action's internals.
    - exclude:
          id: js/file-data-to-network-request
