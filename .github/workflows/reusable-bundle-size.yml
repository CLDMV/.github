# Bundle-size diff on PRs (org-level, reusable).
# Roll our own — no dependency on andresz1/size-limit-action.
# Builds head + base in parallel, compares artifacts, posts/updates comment.
# Batch 5.4 from tmp/plan-future-workflows.md.
name: 📊 Bundle Size Diff (Org-Level)

on:
    workflow_call:
        inputs:
            build_command:
                required: false
                type: string
                default: "npm run build"
            dist_paths:
                required: false
                type: string
                default: "dist/**"
            package_manager:
                required: false
                type: string
                default: "npm"
            node_version:
                required: false
                type: string
                default: "lts/*"
            warning_pct:
                required: false
                type: number
                default: 5
            warning_bytes:
                required: false
                type: number
                default: 500
            comment_mode:
                required: false
                type: string
                default: "update"

permissions:
    contents: read
    pull-requests: write

jobs:
    build-head:
        name: "📊 Measure HEAD"
        runs-on: ubuntu-latest
        steps:
            - name: Checkout PR head
              uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v3
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
            - name: Setup Node
              uses: CLDMV/.github/.github/actions/common/steps/setup-node@v3
              with:
                  node-version: ${{ inputs.node_version }}
            - name: Install
              uses: CLDMV/.github/.github/actions/npm/steps/install-dependencies@v3
              with:
                  package-manager: ${{ inputs.package_manager }}
            - name: Build
              shell: bash
              run: ${{ inputs.build_command }}
            - name: Measure
              uses: CLDMV/.github/.github/actions/npm/jobs/bundle-size@v3
              with:
                  mode: measure
                  dist_paths: ${{ inputs.dist_paths }}
                  output_file: sizes.json
            - name: Upload head sizes
              uses: actions/upload-artifact@v6
              with:
                  name: head-sizes
                  path: sizes.json

    build-base:
        name: "📊 Measure BASE"
        runs-on: ubuntu-latest
        steps:
            - name: Checkout PR base
              uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v3
              with:
                  ref: ${{ github.event.pull_request.base.sha }}
            - name: Setup Node
              uses: CLDMV/.github/.github/actions/common/steps/setup-node@v3
              with:
                  node-version: ${{ inputs.node_version }}
            - name: Install
              uses: CLDMV/.github/.github/actions/npm/steps/install-dependencies@v3
              with:
                  package-manager: ${{ inputs.package_manager }}
            - name: Build
              shell: bash
              run: ${{ inputs.build_command }}
            - name: Measure
              uses: CLDMV/.github/.github/actions/npm/jobs/bundle-size@v3
              with:
                  mode: measure
                  dist_paths: ${{ inputs.dist_paths }}
                  output_file: sizes.json
            - name: Upload base sizes
              uses: actions/upload-artifact@v6
              with:
                  name: base-sizes
                  path: sizes.json

    compare:
        name: "📊 Compare"
        runs-on: ubuntu-latest
        needs: [build-head, build-base]
        steps:
            - name: Download head sizes
              uses: actions/download-artifact@v7
              with:
                  name: head-sizes
                  path: head-sizes
            - name: Download base sizes
              uses: actions/download-artifact@v7
              with:
                  name: base-sizes
                  path: base-sizes
            - name: Compare and comment
              uses: CLDMV/.github/.github/actions/npm/jobs/bundle-size@v3
              with:
                  mode: compare
                  head_sizes: head-sizes/sizes.json
                  base_sizes: base-sizes/sizes.json
                  pr_number: ${{ github.event.pull_request.number }}
                  warning_pct: ${{ inputs.warning_pct }}
                  warning_bytes: ${{ inputs.warning_bytes }}
                  comment_mode: ${{ inputs.comment_mode }}
                  github_token: ${{ github.token }}
