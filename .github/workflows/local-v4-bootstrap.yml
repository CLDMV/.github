# Local dogfood of v4-bootstrap. Mirrors examples/.../v4-bootstrap.yml but
# wired against THIS repo, calling the shared org-bootstrap-repo composite
# action via a relative path so a PR that edits the action is tested against
# the PR's version (not the published @v4 tag).
#
# What gets applied (full list in the composite action docs):
#   - next + hotfixes branches if missing
#   - repo settings flipped to v4 defaults
#   - security toggles (Dependabot alerts + security updates, secret
#     scanning + push protection, private vulnerability reporting)
#   - the three rulesets installed (overwrite-with-warn for divergences)
#
# Idempotent. Default `dry_run: true`.
name: 🚀 Local v4 Bootstrap

on:
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Log every API call without applying. Default `true`."
                type: boolean
                required: false
                default: true
            steps:
                description: "Subset of phases to run, comma-separated."
                required: false
                default: "branches,settings,security,rulesets"

permissions:
    contents: read

jobs:
    bootstrap:
        name: "🚀 Bootstrap v4 (this repo)"
        runs-on: ubuntu-latest
        steps:
            - name: Checkout (for relative-path action ref)
              uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v4

            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            - name: Bootstrap
              uses: ./.github/actions/github/jobs/org-bootstrap-repo
              with:
                  github_token: ${{ steps.app-token.outputs.token }}
                  dry_run: ${{ github.event.inputs.dry_run }}
                  steps: ${{ github.event.inputs.steps }}
