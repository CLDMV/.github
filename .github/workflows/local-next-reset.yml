# v4 core: after a release lands on master, re-sync the integration branches
# (docs/conventions/release-flow-v4.md ¬ß6.3, ¬ß7).
#
#   - `hotfixes` is ALWAYS force-reset to master HEAD after any release.
#   - `next` depends on which lane released:
#       * normal release (next ‚Üí master, or a v3-style feat ‚Üí master):
#         force-reset `next` to master HEAD (¬ß7.1).
#       * hotfix release (hotfixes ‚Üí master): MERGE master into `next`
#         instead, so next's accumulated feature work is preserved (¬ß7.2,
#         option B). The merge is a no-op (204) when next has no extra work.
#
# The released lane is detected from the PR head ref behind the squash
# commit's trailing "(#N)".
#
# wait-for-tags gate: a release also fires `update-major-version-tags`, which
# rolls @v3. Jobs resolve `uses: ...@v3` at job start, so without this gate
# the sync job can run the PREVIOUS release's action code (this exact race
# made the v3.5.0 reset fail against the old force-reset-branch). The gate
# job polls @v3 until it matches the release commit, then releases the sync.
#
# Guarded to no-op when next/hotfixes don't exist, so it's safe pre-cutover.
# STATUS: v4 preview.
name: ‚ôªÔ∏è Local Next/Hotfixes Reset (v4)

on:
    push:
        branches: [master, main]

permissions:
    contents: write

concurrency:
    group: local-next-reset-${{ github.repository }}
    cancel-in-progress: false

jobs:
    wait-for-tags:
        # Only fire on a release commit (the squash-merge of a release PR).
        if: startsWith(github.event.head_commit.message, 'release:')
        name: "‚è≥ Wait for @v3 to roll forward"
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Poll refs/tags/v3 until it matches the release commit
              shell: bash
              env:
                  TARGET_SHA: ${{ github.sha }}
                  REPO: ${{ github.repository }}
              run: |
                  echo "üîç Release commit: $TARGET_SHA"
                  max_attempts=24   # 24 * 5s = 120s
                  for attempt in $(seq 1 $max_attempts); do
                      v3_sha=$(git ls-remote "https://github.com/${REPO}.git" 'refs/tags/v3^{}' 2>/dev/null | awk '{print $1}')
                      [ -z "$v3_sha" ] && v3_sha=$(git ls-remote "https://github.com/${REPO}.git" 'refs/tags/v3' 2>/dev/null | awk '{print $1}')
                      echo "Attempt $attempt/$max_attempts: @v3 ‚Üí ${v3_sha:-<not found>}"
                      if [ "$v3_sha" = "$TARGET_SHA" ]; then
                          echo "‚úÖ @v3 matches the release commit ‚Äî safe to proceed"
                          exit 0
                      fi
                      [ "$attempt" -lt "$max_attempts" ] && sleep 5
                  done
                  echo "‚öÝÔ∏è Timed out waiting for @v3 to roll forward ‚Äî proceeding anyway."

    sync-branches:
        name: "‚ôªÔ∏è Sync next + hotfixes to master"
        needs: wait-for-tags
        if: startsWith(github.event.head_commit.message, 'release:')
        runs-on: ubuntu-latest
        steps:
            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v3
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
                  # Pushing/merging master's tree (which includes
                  # .github/workflows/**) requires contents + workflows write.
                  permission_contents: "true"
                  permission_workflows: "true"
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            - name: Checkout master
              uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v3
              with:
                  fetch-depth: 0

            - name: Determine released lane
              id: lane
              shell: bash
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
              run: |
                  # The squash commit ends with "(#N)" ‚Äî the merged PR number.
                  prnum=$(printf '%s' "$COMMIT_MSG" | grep -oE '#[0-9]+' | tail -1 | tr -d '#')
                  head=""
                  if [ -n "$prnum" ]; then
                      head=$(gh pr view "$prnum" --repo "$GITHUB_REPOSITORY" \
                             --json headRefName --jq '.headRefName' 2>/dev/null || echo "")
                  fi
                  echo "released PR #${prnum:-?} head ref: ${head:-<unknown>}"
                  if [ "$head" = "hotfixes" ]; then
                      echo "lane=hotfix" >> "$GITHUB_OUTPUT"
                  else
                      echo "lane=other" >> "$GITHUB_OUTPUT"
                  fi

            - name: Guard ‚Äî which integration branches exist?
              id: guard
              shell: bash
              run: |
                  next_exists=false; hotfixes_exists=false
                  if git ls-remote --exit-code --heads origin next >/dev/null 2>&1; then
                      next_exists=true
                      git fetch origin next:refs/remotes/origin/next --quiet || true
                  fi
                  if git ls-remote --exit-code --heads origin hotfixes >/dev/null 2>&1; then
                      hotfixes_exists=true
                      git fetch origin hotfixes:refs/remotes/origin/hotfixes --quiet || true
                  fi
                  echo "next-exists=$next_exists" >> "$GITHUB_OUTPUT"
                  echo "hotfixes-exists=$hotfixes_exists" >> "$GITHUB_OUTPUT"
                  echo "‚ÑπÔ∏è next=$next_exists hotfixes=$hotfixes_exists lane=${{ steps.lane.outputs.lane }}"

            # hotfixes always tracks master after a release.
            - name: Force-reset hotfixes to master HEAD
              if: steps.guard.outputs.hotfixes-exists == 'true'
              uses: CLDMV/.github/.github/actions/git/steps/force-reset-branch@v3
              with:
                  target-branch: hotfixes
                  source-ref: master
                  github-token: ${{ steps.app-token.outputs.token }}

            # Normal release ‚Üí next is force-reset (its work just shipped).
            - name: Force-reset next to master HEAD
              if: steps.guard.outputs.next-exists == 'true' && steps.lane.outputs.lane != 'hotfix'
              uses: CLDMV/.github/.github/actions/git/steps/force-reset-branch@v3
              with:
                  target-branch: next
                  source-ref: master
                  github-token: ${{ steps.app-token.outputs.token }}

            # Hotfix release ‚Üí merge master into next (preserve next's features).
            - name: Merge master into next (¬ß7.2 option B)
              if: steps.guard.outputs.next-exists == 'true' && steps.lane.outputs.lane == 'hotfix'
              uses: CLDMV/.github/.github/actions/github/steps/merge-master-into-branch@v3
              with:
                  target-branch: next
                  source-ref: master
                  github-token: ${{ steps.app-token.outputs.token }}
