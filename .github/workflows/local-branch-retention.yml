# Prune merged head branches on this repo. Rules (from
# reusable-branch-retention.yml defaults + this file's exempt_patterns):
#
#   release/*  — keep last 5
#   hotfix/*   — keep last 3
#   everything else (feat/*, fix/*, chore/*, refactor/*, docs/*, ci/*,
#                    perf/*, test/*, style/*, feature/*) — delete on merge
#   master, main, badges, gh-pages, dev, next, hotfixes — exempt; never
#       touched. (next/hotfixes are PR HEADS of the persistent release
#       PRs; without exemption a release would delete the integration
#       branch.)
#
# Trigger: PR-close against any branch in the `branches:` filter below.
# In v4 the contributor PRs merge into next / hotfixes, not master — both
# must be in the filter or retention never fires for those merges and
# feat/* / fix/* / chore/* etc. pile up on origin indefinitely.
name: 🌿 Local Branch Retention

on:
    pull_request:
        types: [closed]
        # v4 flow: contributor PRs merge into `next` and `hotfixes`, not
        # directly into master. Without next/hotfixes in this branches
        # filter, branch-retention never fires for feat/fix/chore/etc.
        # source branches under v4 — they pile up on origin indefinitely.
        branches: [master, main, next, hotfixes]

permissions:
    contents: write
    pull-requests: read

jobs:
    retain:
        if: github.event.pull_request.merged == true
        uses: ./.github/workflows/reusable-branch-retention.yml
        with:
            # `dev` is an exempt long-lived integration branch in this repo.
            exempt_patterns: '["master","main","badges","gh-pages","dev","next","hotfixes"]'
        secrets:
            BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
