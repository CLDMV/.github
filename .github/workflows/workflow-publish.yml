# CLDMV/.github/.github/workflows/publish.yml
name: 📦 Publish Workflow (Org-Level)

on:
    workflow_call:
        inputs:
            package_name:
                required: true
                type: string
                description: "NPM package name (e.g., @cldmv/slothlet)"
            debug:
                required: false
                type: boolean
                default: false
                description: "Enable debug logging for troubleshooting"
            dry_run:
                required: false
                type: boolean
                default: false
                description: "Dry run mode - validate everything but don't publish or create releases"
            node_version:
                required: false
                type: string
                default: "lts/*"
                description: "Node.js version to use (default: lts/*)"
            package_manager:
                required: false
                type: string
                default: "npm"
                description: "Package manager (npm or yarn)"
            version:
                required: false
                type: string
                default: ""
                description: "Version to publish (auto-detected from package.json if not provided)"
            publish_to_npm:
                required: false
                type: boolean
                default: true
                description: "Publish to NPM registry"
            publish_to_github_packages:
                required: false
                type: boolean
                default: true
                description: "Publish to GitHub Packages registry"
            publish_command:
                required: false
                type: string
                default: ""
                description: "Custom NPM publish command"
            github_packages_publish_command:
                required: false
                type: string
                default: ""
                description: "Custom GitHub Packages publish command"
            # Build parameters
            min_node_version:
                required: false
                type: string
                default: "20"
                description: "Minimum Node.js version for matrix testing (enables matrix when set)"
            max_node_major:
                required: false
                type: string
                default: "22"
                description: "Override max Node.js major version (default: 22)"
            lts_only_matrix:
                required: false
                type: boolean
                default: true
                description: "Only include even-numbered (LTS) Node.js majors in the test matrix. Required when deps declare engines that exclude odd-numbered releases (e.g. rolldown)."
            test_command:
                required: false
                type: string
                default: "npm test"
                description: "Command to run tests"
            build_command:
                required: false
                type: string
                default: "npm run build:ci"
                description: "Command to build package"
            # Release parameters
            is_prerelease:
                required: false
                type: boolean
                default: false
                description: "Whether this is a prerelease"
            release_source_only:
                required: false
                type: boolean
                default: false
                description: "Whether to create source-only release (no package assets)"
            create_documentation:
                required: false
                type: boolean
                default: true
                description: "Whether to create/update VERSION_TAGS.md"
            # Test control options
            skip_performance_tests:
                required: false
                type: boolean
                default: false
                description: "Skip performance tests during CI"
            skip_matrix_tests:
                required: false
                type: boolean
                default: false
                description: "Skip matrix testing (use single node version only)"
            test_environment:
                required: false
                type: string
                default: "development"
                description: "Environment for tests (affects NODE_ENV and NODE_OPTIONS --conditions flag)"
            # Bot signing parameters
            use_gpg:
                required: false
                type: boolean
                default: false
                description: "If true, forward provided secrets to enable GPG signing"
        secrets:
            NPM_TOKEN:
                description: "NPM token for publishing packages (optional when using trusted publishers)"
                required: false
            BOT_APP_CLIENT_ID:
                description: "GitHub App Client ID for CLDMV bot"
                required: false
            BOT_APP_ID:
                description: "[DEPRECATED] Use BOT_APP_CLIENT_ID instead"
                required: false
            BOT_APP_PRIVATE_KEY:
                description: "GitHub App private key for CLDMV bot"
                required: false
            TAGGER_NAME:
                description: "GPG tagger name for signing"
                required: false
            TAGGER_EMAIL:
                description: "GPG tagger email for signing"
                required: false
            GPG_PRIVATE_KEY:
                description: "ASCII-armored private key for signing"
                required: false
            GPG_PASSPHRASE:
                description: "Passphrase for the private key (if protected)"
                required: false
        outputs:
            version:
                description: "Detected or provided package version"
                value: ${{ jobs.publish.outputs.version }}
            npm-published:
                description: "Whether the package was published to NPM"
                value: ${{ jobs.publish.outputs.npm-published }}
            github-packages-published:
                description: "Whether the package was published to GitHub Packages"
                value: ${{ jobs.publish.outputs.github-packages-published }}
            release-id:
                description: "The ID of the created GitHub release"
                value: ${{ jobs.publish.outputs.release-id }}
            major-version:
                description: "The major version tag that was updated (e.g. v1)"
                value: ${{ jobs.publish.outputs.major-version }}
            minor-version:
                description: "The minor version tag that was updated (e.g. v1.2)"
                value: ${{ jobs.publish.outputs.minor-version }}
            tags-updated:
                description: "Whether rolling version tags were successfully updated"
                value: ${{ jobs.publish.outputs.tags-updated }}
    workflow_dispatch:
        inputs:
            package_name:
                required: true
                type: string
                description: "NPM package name (e.g., @cldmv/slothlet)"
            debug:
                required: false
                type: boolean
                default: false
                description: "Enable debug logging for troubleshooting"
            dry_run:
                required: false
                type: boolean
                default: false
                description: "Dry run mode - validate everything but don't publish or create releases"
            node_version:
                required: false
                type: string
                default: "lts/*"
                description: "Node.js version to use (default: lts/*)"
            version:
                required: false
                type: string
                default: ""
                description: "Version to publish (auto-detected from package.json if not provided)"
            lts_only_matrix:
                required: false
                type: boolean
                default: true
                description: "Only include even-numbered (LTS) Node.js majors in the test matrix. Required when deps declare engines that exclude odd-numbered releases (e.g. rolldown)."

jobs:
    debug-inputs:
        name: "🔍 Debug Input Parameters"
        runs-on: ubuntu-latest
        steps:
            - name: "Debug min_node_version parameter"
              run: |
                  echo "🔍 DEBUG (publish.yml): min_node_version input = '${{ inputs.min_node_version }}'"
                  echo "🔍 DEBUG (publish.yml): max_node_major input = '${{ inputs.max_node_major }}'"
                  echo "🔍 DEBUG (publish.yml): node_version input = '${{ inputs.node_version }}'"

    build-and-test:
        name: "🏗️ Build and Test"
        needs: debug-inputs
        uses: CLDMV/.github/.github/workflows/reusable-build-and-test.yml@v2
        with:
            package_name: ${{ inputs.package_name }}
            debug: ${{ inputs.debug }}
            run_build_and_test: true
            node_version: ${{ inputs.node_version }}
            min_node_version: ${{ inputs.min_node_version }}
            max_node_major: ${{ inputs.max_node_major }}
            lts_only_matrix: ${{ inputs.lts_only_matrix }}
            package_manager: ${{ inputs.package_manager }}
            test_command: ${{ inputs.test_command }}
            build_command: ${{ inputs.build_command }}
            skip_performance_tests: ${{ inputs.skip_performance_tests }}
            skip_matrix_tests: ${{ inputs.skip_matrix_tests }}
            test_environment: ${{ inputs.test_environment }}

    publish:
        name: "📦 Publish Package"
        needs: build-and-test
        permissions:
            id-token: write # Required for NPM trusted publishers (OIDC)
            contents: write
            packages: write # Required to publish to GitHub Packages
        uses: CLDMV/.github/.github/workflows/reusable-publishing.yml@v2
        with:
            package_name: ${{ inputs.package_name }}
            debug: ${{ inputs.debug }}
            dry_run: ${{ inputs.dry_run }}
            # Job control flags - enable the jobs we want to run
            run_detect_repo_config: true
            run_publish_npm: ${{ inputs.publish_to_npm }}
            run_publish_github_packages: ${{ inputs.publish_to_github_packages }}
            run_create_release: true # Create GitHub release after publishing
            # Build parameters
            node_version: ${{ inputs.node_version }}
            package_manager: ${{ inputs.package_manager }}
            version: ${{ inputs.version }}
            publish_command_npm: ${{ inputs.publish_command }}
            publish_command_github_packages: ${{ inputs.github_packages_publish_command }}
            # Release parameters
            is_prerelease: ${{ inputs.is_prerelease }}
            release_source_only: ${{ inputs.release_source_only }}
            build_command: ${{ inputs.build_command }}
            use_gpg: ${{ inputs.use_gpg }}
        secrets:
            NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
            BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID || secrets.BOT_APP_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}
            TAGGER_NAME: ${{ secrets.TAGGER_NAME }}
            TAGGER_EMAIL: ${{ secrets.TAGGER_EMAIL }}
            GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
            GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    summary:
        name: "📋 Publish Summary"
        needs: [build-and-test, publish]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Generate Publish Summary
              run: |
                  if [ "${{ inputs.dry_run }}" = "true" ]; then
                    echo "## 🧪 Dry Run - Publish Workflow Validation" >> $GITHUB_STEP_SUMMARY
                  else
                    echo "## 📦 Publish Workflow Summary" >> $GITHUB_STEP_SUMMARY
                  fi
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**Package**: \`${{ inputs.package_name }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "**Version**: \`${{ needs.publish.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  if [ "${{ needs.publish.result }}" = "success" ]; then
                    if [ "${{ inputs.dry_run }}" = "true" ]; then
                      echo "✅ **Overall Status**: Dry run validation successful" >> $GITHUB_STEP_SUMMARY
                      echo "" >> $GITHUB_STEP_SUMMARY
                      echo "🧪 **Dry Run Complete**: All validations passed! No publishing or releases were created." >> $GITHUB_STEP_SUMMARY
                      echo "" >> $GITHUB_STEP_SUMMARY
                      echo "### ✅ Validation Results:" >> $GITHUB_STEP_SUMMARY
                      echo "- Build and tests passed" >> $GITHUB_STEP_SUMMARY
                      echo "- Package configuration is valid" >> $GITHUB_STEP_SUMMARY
                      echo "- NPM authentication and commands validated" >> $GITHUB_STEP_SUMMARY
                      echo "- GitHub Packages authentication and commands validated" >> $GITHUB_STEP_SUMMARY
                      echo "- Release creation prerequisites verified" >> $GITHUB_STEP_SUMMARY
                      echo "" >> $GITHUB_STEP_SUMMARY
                      echo "🚀 **Ready to Publish**: Re-run with \`dry_run: false\` to execute the actual publishing." >> $GITHUB_STEP_SUMMARY
                    else
                      echo "✅ **Overall Status**: Publishing workflow completed successfully" >> $GITHUB_STEP_SUMMARY
                      echo "" >> $GITHUB_STEP_SUMMARY
                      echo "Check the detailed progress above for specific publishing results to each registry." >> $GITHUB_STEP_SUMMARY
                    fi
                  else
                    echo "❌ **Overall Status**: Publishing workflow failed" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "Check the detailed progress above and workflow logs for specific failure details." >> $GITHUB_STEP_SUMMARY
                  fi
