# Master commit audit (org-level, reusable).
#
# Post-merge safety net: when a commit lands on the default branch, verify its
# subject matches the expected release-flow patterns. On miss, file a deduped
# GitHub Issue so the alert is persistent and assignable — not just a red ❌
# that dies in the Actions tab. Catches release-workflow title regressions,
# branch-protection bypasses, unexpected bot commits, direct emergency pushes.
#
# Centralizing the steps (the create-app-token wiring and the action ref) here
# means consumers can't drift them, and the canonical pattern set lives in the
# audit-commit-subject action itself (omit allowed_patterns to inherit it).
#
# Triggers (push to default) stay in the CALLER.
name: 🧾 Master Commit Audit (Org-Level)

on:
    workflow_call:
        inputs:
            allowed_patterns:
                description: "Optional multi-line regex override. Leave empty to inherit audit-commit-subject's canonical release-flow default (release + chore + merge). Set only if this repo's conventions differ."
                required: false
                type: string
                default: ""
            issue_labels:
                description: "Comma-sep labels for auto-filed issues. Canonical names from data/github-labels.json (note the space after each colon)."
                required: false
                type: string
                default: "type: ci,priority: high"
            issue_assignee:
                description: "Optional GitHub login to assign auto-filed issues. Empty = unassigned."
                required: false
                type: string
                default: ""
        secrets:
            # Optional. When provided, the audit issue is filed by the
            # consumer's bot App instead of github-actions[bot]. Falls back to
            # GITHUB_TOKEN via create-app-token's auto-detect.
            BOT_APP_CLIENT_ID:
                required: false
            BOT_APP_PRIVATE_KEY:
                required: false

permissions:
    contents: read
    issues: write

jobs:
    audit:
        name: "🧾 Audit commit subject"
        runs-on: ubuntu-latest
        steps:
            - name: Create App token (falls back to GITHUB_TOKEN)
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            - name: Audit commit subject
              uses: CLDMV/.github/.github/actions/git/jobs/audit-commit-subject@v4
              with:
                  commit_sha: ${{ github.sha }}
                  # Empty passthrough → action falls back to its canonical
                  # DEFAULT_ALLOWED_PATTERNS (single source of truth).
                  allowed_patterns: ${{ inputs.allowed_patterns }}
                  issue_labels: ${{ inputs.issue_labels }}
                  issue_assignee: ${{ inputs.issue_assignee }}
                  github_token: ${{ steps.app-token.outputs.token }}
