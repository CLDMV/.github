# Branch retention (org-level, reusable).
# Batch 1.3 from tmp/plan-future-workflows.md.
name: 🌿 Branch Retention (Org-Level)

on:
    workflow_call:
        inputs:
            retention_rules:
                required: false
                type: string
                default: '[{"pattern":"release/*","keep_last":5},{"pattern":"hotfix/*","keep_last":3}]'
            exempt_patterns:
                required: false
                type: string
                default: '["master","main","badges","gh-pages"]'
        secrets:
            BOT_APP_CLIENT_ID:
                required: true
            BOT_APP_PRIVATE_KEY:
                required: true

permissions:
    contents: write
    pull-requests: read

jobs:
    retain:
        runs-on: ubuntu-latest
        steps:
            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v3
              with:
                  client_id: ${{ secrets.BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            - name: Apply branch retention
              uses: CLDMV/.github/.github/actions/git/jobs/branch-retention@v3
              with:
                  retention_rules: ${{ inputs.retention_rules }}
                  exempt_patterns: ${{ inputs.exempt_patterns }}
                  github_token: ${{ steps.app-token.outputs.token }}
