# Org-wide v4 onboarding fanout. Run ONCE from this repo's Actions tab and
# bootstrap up to N target repos in parallel. Each target gets the full
# baseline applied by the `org-bootstrap-repo` composite action:
#   - next + hotfixes branches created if missing
#   - repo settings flipped to v4 defaults
#   - security toggles enabled (alerts, secret scanning + push protection,
#     dependabot security updates, private vulnerability reporting)
#   - the three rulesets replaced with the org canonical defaults
#
# Overwrite-with-warn policy: existing diverged values are overwritten and
# logged in the run summary so the audit trail captures what changed.
#
# Run order: triage repos first ("dirt heads", in-flight PRs, etc.), then
# add the ready ones to a batch file and dispatch this workflow against
# that batch. Re-running is safe — every step in the composite is idempotent.
name: 🏗️ Org Onboarding (v4 Fanout)

on:
    workflow_dispatch:
        inputs:
            repos:
                description: 'OVERRIDE: comma-separated `owner/name` list. Leave blank for auto-discovery of the whole org. Example: `CLDMV/foo,CLDMV/bar`'
                required: false
                default: ""
            repos_file:
                description: 'OVERRIDE: path in THIS repo to a newline-delimited list of `owner/name` entries. Blank lines and `#` comments allowed. Example: `data/onboarding-batches/batch-1.txt`. Leave blank for auto-discovery.'
                required: false
                default: ""
            exclude:
                description: "Comma-separated `owner/name` entries to skip from auto-discovery. Ignored when `repos` / `repos_file` is set (those are already explicit lists)."
                required: false
                default: ""
            include_forks:
                description: "Include forks in auto-discovery. Default off — forks shouldn't carry the org's release flow."
                type: boolean
                required: false
                default: false
            dry_run:
                description: "Dry-run: preview every mutation (PUT/POST/PATCH/DELETE) without firing it. Default `true` — leave checked to preview, UNCHECK to actually apply changes."
                type: boolean
                required: false
                default: true
            code_security:
                description: "GitHub Code Security policy (the paid product that gates CodeQL alerts on private repos; free on public). off = disable everywhere. public-only = enable on public repos (free), disable on private (paid). all = enable everywhere (paid for private)."
                type: choice
                required: false
                default: "off"
                options:
                    - "off"
                    - "public-only"
                    - "all"
            secret_protection:
                description: "GitHub Secret Protection policy (secret scanning + push protection — paid on private, free on public). Same off | public-only | all shape as code_security."
                type: choice
                required: false
                default: "off"
                options:
                    - "off"
                    - "public-only"
                    - "all"
            steps:
                description: "Subset of phases to run, comma-separated. Default runs everything."
                required: false
                default: "branches,settings,security,rulesets"
            concurrency:
                description: "Max parallel per-repo jobs. GitHub Actions caps matrix at 256."
                required: false
                default: "10"

permissions:
    contents: read

jobs:
    plan:
        name: "📋 Resolve target repo list"
        runs-on: ubuntu-latest
        outputs:
            repos: ${{ steps.resolve.outputs.repos }}
            count: ${{ steps.resolve.outputs.count }}
            mode: ${{ steps.resolve.outputs.mode }}
        steps:
            - name: Checkout (for repos_file lookup)
              uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v4

            - name: Create App token (org-wide read for auto-discovery)
              id: app-token
              # Needed for the GET /orgs/{org}/repos call in auto-discovery
              # mode. When `repos` or `repos_file` is set, we still mint the
              # token (cheap) so the workflow flow stays uniform — the API
              # call just doesn't fire.
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
                  owner: ${{ github.repository_owner }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            - name: Resolve repo list
              id: resolve
              shell: bash
              env:
                  REPOS_INLINE: ${{ github.event.inputs.repos }}
                  REPOS_FILE: ${{ github.event.inputs.repos_file }}
                  EXCLUDE: ${{ github.event.inputs.exclude }}
                  INCLUDE_FORKS: ${{ github.event.inputs.include_forks }}
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  GH_OWNER: ${{ github.repository_owner }}
                  THIS_REPO: ${{ github.repository }}
              run: |
                  set -euo pipefail

                  if [ -n "${REPOS_INLINE}" ] && [ -n "${REPOS_FILE}" ]; then
                      echo "::error::Set either 'repos' or 'repos_file' (or neither, for auto-discovery) — not both." >&2
                      exit 1
                  fi

                  mode=""
                  raw=""
                  if [ -n "${REPOS_INLINE}" ]; then
                      mode="explicit-inline"
                      raw=$(printf '%s' "$REPOS_INLINE" | tr ',' '\n')
                  elif [ -n "${REPOS_FILE}" ]; then
                      mode="explicit-file"
                      if [ ! -f "$REPOS_FILE" ]; then
                          echo "::error::repos_file '$REPOS_FILE' not found in this repo" >&2
                          exit 1
                      fi
                      raw=$(cat "$REPOS_FILE")
                  else
                      # AUTO-DISCOVERY: every non-archived repo in the org.
                      # `--paginate` walks all pages; default per_page=30 is
                      # fine, gh handles the link-header chase. Forks excluded
                      # unless include_forks=true. Archived always excluded.
                      mode="auto-discover"
                      include_forks="${INCLUDE_FORKS:-false}"
                      fork_jq='select(.fork == false)'
                      if [ "$include_forks" = "true" ]; then
                          fork_jq='.'
                      fi
                      raw=$(gh api --paginate "orgs/$GH_OWNER/repos?per_page=100&type=all" \
                          --jq ".[] | select(.archived == false) | $fork_jq | .full_name")
                      if [ -z "$raw" ]; then
                          echo "::error::Auto-discovery returned no repos for org '$GH_OWNER'. Bot App may lack org:read or have no repos installed." >&2
                          exit 1
                      fi
                  fi

                  # Drop comments + blanks, normalize whitespace, dedupe.
                  list=$(printf '%s\n' "$raw" \
                      | sed -E 's/#.*$//' \
                      | tr -d '\r' \
                      | awk 'NF' \
                      | sort -u)

                  # Auto-discovery always skips this repo (running the bootstrap
                  # against itself while a dispatch is mid-flight would race).
                  # Explicit modes don't filter — the user opted in by name.
                  if [ "$mode" = "auto-discover" ]; then
                      list=$(printf '%s\n' "$list" | grep -vxF "$THIS_REPO" || true)
                  fi

                  # Apply user-supplied excludes (auto-discovery only; explicit
                  # modes ignore this — the user already picked the list).
                  if [ "$mode" = "auto-discover" ] && [ -n "${EXCLUDE}" ]; then
                      while IFS=',' read -r -a excl_arr; do
                          for excl in "${excl_arr[@]}"; do
                              excl_trim=$(printf '%s' "$excl" | tr -d '[:space:]')
                              [ -z "$excl_trim" ] && continue
                              list=$(printf '%s\n' "$list" | grep -vxF "$excl_trim" || true)
                          done
                      done <<< "$EXCLUDE"
                  fi

                  if [ -z "$list" ]; then
                      echo "::error::Empty repo list after filtering" >&2
                      exit 1
                  fi

                  # Validate owner/name shape.
                  while IFS= read -r entry; do
                      if ! printf '%s' "$entry" | grep -qE '^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$'; then
                          echo "::error::Invalid entry '$entry' (expected owner/name)" >&2
                          exit 1
                      fi
                  done <<< "$list"

                  count=$(printf '%s\n' "$list" | wc -l)

                  # Matrix cap (GitHub Actions limit = 256). For larger orgs,
                  # use repos_file batches instead.
                  if [ "$count" -gt 256 ]; then
                      echo "::warning::$count repos exceeds GitHub Actions matrix cap (256). Truncating; split into batches via repos_file for full coverage." >&2
                      list=$(printf '%s\n' "$list" | head -n 256)
                      count=256
                  fi

                  json=$(printf '%s\n' "$list" | jq -R . | jq -sc .)
                  {
                      echo "count=$count"
                      echo "repos=$json"
                      echo "mode=$mode"
                  } >> "$GITHUB_OUTPUT"
                  {
                      echo "## 📋 Onboarding batch"
                      echo ""
                      echo "**Source:** \`$mode\`"
                      echo "**Count:** $count repo(s)"
                      echo "**Dry run:** \`${{ github.event.inputs.dry_run }}\`"
                      echo ""
                      echo '<details><summary>Target repos</summary>'
                      echo ""
                      echo '```'
                      printf '%s\n' "$list"
                      echo '```'
                      echo "</details>"
                  } >> "$GITHUB_STEP_SUMMARY"

    bootstrap:
        name: "🏗️ ${{ matrix.repo }}"
        needs: plan
        if: needs.plan.outputs.count != '0'
        runs-on: ubuntu-latest
        # `max-parallel` honors the user's `concurrency` input; matrix continues
        # on individual failures so one bad repo doesn't block the rest.
        strategy:
            fail-fast: false
            max-parallel: ${{ fromJSON(github.event.inputs.concurrency || '10') }}
            matrix:
                repo: ${{ fromJSON(needs.plan.outputs.repos) }}
        steps:
            - name: Split owner / name from target_repo
              id: target
              shell: bash
              env:
                  TARGET: ${{ matrix.repo }}
              run: |
                  owner="${TARGET%%/*}"
                  name="${TARGET#*/}"
                  echo "owner=$owner" >> "$GITHUB_OUTPUT"
                  echo "name=$name" >> "$GITHUB_OUTPUT"

            - name: Create App token (target-repo owner)
              id: app-token
              # Mints an App-installation token for the target repo's owner.
              # The App must be installed on each target — repos where the App
              # isn't installed fail fast in the bootstrap step with a clear
              # GitHub error.
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
                  owner: ${{ steps.target.outputs.owner }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            - name: Bootstrap
              id: bootstrap
              uses: CLDMV/.github/.github/actions/github/jobs/org-bootstrap-repo@v4
              with:
                  target_repo: ${{ matrix.repo }}
                  github_token: ${{ steps.app-token.outputs.token }}
                  dry_run: ${{ github.event.inputs.dry_run }}
                  steps: ${{ github.event.inputs.steps }}
                  code_security: ${{ github.event.inputs.code_security }}
                  secret_protection: ${{ github.event.inputs.secret_protection }}

    summary:
        name: "📊 Aggregate summary"
        needs: [plan, bootstrap]
        if: always() && needs.plan.outputs.count != '0'
        runs-on: ubuntu-latest
        steps:
            - name: Aggregate per-repo status
              shell: bash
              run: |
                  {
                      echo "## 📊 Org onboarding result"
                      echo ""
                      echo "See individual per-repo job pages for the warn-on-diff details — each repo's run summary lists every divergence that was overwritten."
                      echo ""
                      echo "**Bootstrap job overall:** \`${{ needs.bootstrap.result }}\`"
                  } >> "$GITHUB_STEP_SUMMARY"
