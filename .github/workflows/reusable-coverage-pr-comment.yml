# CLDMV/.github/.github/workflows/reusable-coverage-pr-comment.yml
name: "PR Coverage Badge (Reusable)"

# Injects (or updates) a coverage badge + breakdown table directly into the
# PR description body. Uses HTML marker comments to find and replace the block
# on re-runs, so successive pushes to the PR branch update it in place.
# No comments are posted; no files are committed anywhere.
#
# Bot attribution: if BOT_APP_CLIENT_ID / BOT_APP_PRIVATE_KEY are passed via
# `secrets:`, the PR-body edit is attributed to the consumer's bot App.
# Otherwise falls back to GITHUB_TOKEN (attributed to github-actions[bot]).
# Ensure the calling job has `permissions: pull-requests: write`.

on:
    workflow_call:
        inputs:
            # ── Node / package manager ──────────────────────────────────────────
            node_version:
                description: "Node.js version to use"
                required: false
                type: string
                default: "lts/*"
            package_manager:
                description: "Package manager (npm or yarn)"
                required: false
                type: string
                default: "npm"

            # ── Commands ────────────────────────────────────────────────────────
            type_check_command:
                description: "Command to run type checking"
                required: false
                type: string
                default: "npm run test:types"
            coverage_command:
                description: "Command to run tests and generate coverage data"
                required: false
                type: string
                default: "npm run ci:coverage"
            coverage_summary_path:
                description: "Path to the coverage-summary.json produced by Jest / c8"
                required: false
                type: string
                default: "coverage/coverage-summary.json"

            # ── Control ─────────────────────────────────────────────────────────
            skip_type_check:
                description: "Skip the type-check step"
                required: false
                type: boolean
                default: false
            debug:
                description: "Enable debug logging"
                required: false
                type: boolean
                default: false
        secrets:
            # Optional. When provided, the PR-body edit is attributed to the
            # consumer's bot App instead of github-actions[bot]. Falls back to
            # GITHUB_TOKEN via create-app-token's auto-detect.
            BOT_APP_CLIENT_ID:
                required: false
            BOT_APP_PRIVATE_KEY:
                required: false

# Workflow-level: edits the PR description body (HTML marker-fenced
# coverage block). PRs live under the issues API surface, so
# `pull-requests: write` is what's needed — no `contents: write` since
# nothing is pushed back to the repo.
permissions:
    contents: read
    pull-requests: write

jobs:
    coverage-pr-comment:
        name: "PR Coverage Badge"
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write

        steps:
            # ── 1. Source ────────────────────────────────────────────────────────
            - name: Checkout
              uses: actions/checkout@v6

            # ── 2. Runtime ──────────────────────────────────────────────────────
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ inputs.node_version }}
                  cache: ${{ inputs.package_manager }}

            # ── 3. Dependencies ─────────────────────────────────────────────────
            - name: Install dependencies
              uses: CLDMV/.github/.github/actions/npm/steps/install-dependencies@v4
              with:
                  package-manager: ${{ inputs.package_manager }}

            # ── 4. Type check ───────────────────────────────────────────────────
            - name: Type check
              if: ${{ !inputs.skip_type_check }}
              run: ${{ inputs.type_check_command }}

            # ── 5. Tests + coverage ─────────────────────────────────────────────
            - name: Tests + coverage
              run: ${{ inputs.coverage_command }}

            # ── 6. App token for PR-body edit attribution ───────────────────────
            - name: Create App token (falls back to GITHUB_TOKEN)
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            # ── 7. Compute coverage and inject the badge block into the PR body ─
            - name: Update PR description with coverage badge
              uses: CLDMV/.github/.github/actions/coverage/steps/update-pr-coverage@v4
              with:
                  coverage-summary-path: ${{ inputs.coverage_summary_path }}
                  node-version: ${{ inputs.node_version }}
                  github-token: ${{ steps.app-token.outputs.token }}
                  repository: ${{ github.repository }}
