# Build and Test Workflow Package
name: 🏗️ Build and Test Jobs

on:
    workflow_call:
        inputs:
            # Package information
            package_name:
                description: "NPM package name (e.g., @cldmv/slothlet)"
                required: true
                type: string

            # Debug control
            debug:
                description: "Enable debug logging for troubleshooting"
                required: false
                type: boolean
                default: false

            # Job control flags
            run_build_and_test:
                description: "Run build and test job"
                required: false
                type: boolean
                default: false

            # Build and test parameters
            node_version:
                description: "Node.js version to use (default: lts/*)"
                required: false
                type: string
                default: "lts/*"
            min_node_version:
                description: "Minimum Node.js version to test (e.g., 16.4)"
                required: false
                type: string
                default: "20"
            max_node_major:
                description: "Override max Node.js major version (default: 22)"
                required: false
                type: string
                default: "22"
            lts_only_matrix:
                description: "Only include even-numbered (LTS) Node.js major versions in the
                    test matrix"
                required: false
                type: boolean
                default: false
            package_manager:
                description: "Package manager (npm or yarn)"
                required: false
                type: string
                default: "npm"
            test_command:
                description: "Command to run tests"
                required: false
                type: string
                default: "npm test"
            build_command:
                description: "Command to build package"
                required: false
                type: string
                default: "npm run build:ci"
            build_subpackages_command:
                description: "Optional command run after the main build to carve satellite
                    packages into dist-packages/<name>/. Empty (default) skips it. See
                    docs/conventions/satellite-packages.md."
                required: false
                type: string
                default: ""

            # Test control options
            skip_performance_tests:
                description: "Skip performance tests during CI"
                required: false
                type: boolean
                default: false
            skip_matrix_tests:
                description: "Skip matrix testing (use single node version only)"
                required: false
                type: boolean
                default: false
            test_environment:
                description: "Environment for tests (affects NODE_ENV and NODE_OPTIONS
                    --conditions flag)"
                required: false
                type: string
                default: "development"
            enable_embedded_tests:
                description: "Fetch and run private tests from embedded anonymous
                    gitlinks via the org bot App. See
                    docs/conventions/embedded-tests-ci.md."
                required: false
                type: boolean
                default: false

        secrets:
            BOT_APP_CLIENT_ID:
                description: "GitHub App Client ID for the org bot. Required when
                    enable_embedded_tests is true; ignored otherwise."
                required: false
            BOT_APP_PRIVATE_KEY:
                description: "GitHub App private key for the org bot. Required when
                    enable_embedded_tests is true; ignored otherwise."
                required: false

# Workflow-level baseline: build + test only reads from the repo. The
# embedded-tests path mints an App token that has its own scope; nothing
# in this workflow writes back via GITHUB_TOKEN.
permissions:
    contents: read

jobs:
    set-matrix:
        name: "Set Node.js Matrix"
        runs-on: ubuntu-latest
        if: inputs.run_build_and_test == true
        outputs:
            node-matrix: ${{ steps.set-matrix.outputs.matrix }}
        steps:
            - id: set-matrix
              uses: CLDMV/.github/.github/actions/node/steps/generate-matrix@v4
              with:
                  skip-matrix-tests: ${{ inputs.skip_matrix_tests }}
                  node-version: ${{ inputs.node_version }}
                  min-node-version: ${{ inputs.min_node_version }}
                  max-node-major: ${{ inputs.max_node_major }}
                  lts-only-matrix: ${{ inputs.lts_only_matrix }}

    build-and-test:
        name: "🏗️ Build & Test"
        if: inputs.run_build_and_test == true
        runs-on: ubuntu-latest
        needs: set-matrix
        strategy:
            matrix:
                node-version: ${{ fromJson(needs.set-matrix.outputs.node-matrix) }}
        # Make the bot App credentials available to nested composites
        # (the create-app-token sub-action falls back to these env vars
        # when its inputs are empty). Only consumed when
        # enable_embedded_tests is true.
        env:
            BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}
        steps:
            - name: Build and Test
              uses: CLDMV/.github/.github/actions/npm/jobs/build-and-test@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  package-manager: ${{ inputs.package_manager }}
                  test-command: ${{ inputs.test_command }}
                  build-command: ${{ inputs.build_command }}
                  build-subpackages-command: ${{ inputs.build_subpackages_command }}
                  skip-performance-tests: ${{ inputs.skip_performance_tests }}
                  test-environment: ${{ inputs.test_environment }}
                  enable-embedded-tests: ${{ inputs.enable_embedded_tests }}
