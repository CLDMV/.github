# Build and Test Workflow Package
name: 🏗️ Build and Test Jobs

on:
    workflow_call:
        inputs:
            # Package information
            package_name:
                description: "NPM package name (e.g., @cldmv/slothlet)"
                required: true
                type: string

            # Debug control
            debug:
                description: "Enable debug logging for troubleshooting"
                required: false
                type: boolean
                default: false

            # Job control flags
            run_build_and_test:
                description: "Run build and test job"
                required: false
                type: boolean
                default: false

            # Build and test parameters
            node_version:
                description: "Node.js version to use (default: lts/*)"
                required: false
                type: string
                default: "lts/*"
            min_node_version:
                description: "Minimum Node.js version to test (e.g., 16.4)"
                required: false
                type: string
                default: "20"
            max_node_major:
                description: "Override max Node.js major version (default: 22)"
                required: false
                type: string
                default: "22"
            lts_only_matrix:
                description: "Only include even-numbered (LTS) Node.js major versions in the
                    test matrix"
                required: false
                type: boolean
                default: false
            package_manager:
                description: "Package manager (npm or yarn)"
                required: false
                type: string
                default: "npm"
            test_command:
                description: "Command to run tests"
                required: false
                type: string
                default: "npm test"
            build_command:
                description: "Command to build package"
                required: false
                type: string
                default: "npm run build:ci"

            # Test control options
            skip_performance_tests:
                description: "Skip performance tests during CI"
                required: false
                type: boolean
                default: false
            skip_matrix_tests:
                description: "Skip matrix testing (use single node version only)"
                required: false
                type: boolean
                default: false
            test_environment:
                description: "Environment for tests (affects NODE_ENV and NODE_OPTIONS
                    --conditions flag)"
                required: false
                type: string
                default: "development"

jobs:
    set-matrix:
        name: "Set Node.js Matrix"
        runs-on: ubuntu-latest
        if: inputs.run_build_and_test == true
        outputs:
            node-matrix: ${{ steps.set-matrix.outputs.matrix }}
        steps:
            - id: set-matrix
              uses: CLDMV/.github/.github/actions/node/steps/generate-matrix@v3
              with:
                  skip-matrix-tests: ${{ inputs.skip_matrix_tests }}
                  node-version: ${{ inputs.node_version }}
                  min-node-version: ${{ inputs.min_node_version }}
                  max-node-major: ${{ inputs.max_node_major }}
                  lts-only-matrix: ${{ inputs.lts_only_matrix }}

    build-and-test:
        name: "🏗️ Build & Test"
        if: inputs.run_build_and_test == true
        runs-on: ubuntu-latest
        needs: set-matrix
        strategy:
            matrix:
                node-version: ${{ fromJson(needs.set-matrix.outputs.node-matrix) }}
        steps:
            - name: Build and Test
              uses: CLDMV/.github/.github/actions/npm/jobs/build-and-test@v3
              with:
                  node-version: ${{ matrix.node-version }}
                  package-manager: ${{ inputs.package_manager }}
                  test-command: ${{ inputs.test_command }}
                  build-command: ${{ inputs.build_command }}
                  skip-performance-tests: ${{ inputs.skip_performance_tests }}
                  test-environment: ${{ inputs.test_environment }}
