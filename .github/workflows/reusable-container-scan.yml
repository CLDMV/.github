# Container vulnerability scan via Trivy (org-level, reusable).
#
# Aquasecurity's marketplace action IS the Trivy team's official integration
# (handles vuln-DB caching, retries, SARIF emission, exit codes). Reimplementing
# would just re-wrap their CLI — substantive external system.
#
# Batch 4.1 from tmp/plan-future-workflows.md.
name: 🛡️ Container Scan (Org-Level)

on:
    workflow_call:
        inputs:
            image:
                description: "Full image ref (registry/repo:tag)"
                required: true
                type: string
            severity:
                description: "Comma-sep severities to report. Defaults to CRITICAL+HIGH (these block when fail_on_severity is true)."
                required: false
                type: string
                default: "CRITICAL,HIGH"
            fail_on_severity:
                description: "Fail the job (and block publish) on any finding at `severity` or above"
                required: false
                type: boolean
                default: true
            ignore_unfixed:
                description: "Skip vulns with no upstream fix. Default true: failing on unfixable vulns stalls publishes indefinitely."
                required: false
                type: boolean
                default: true
            sarif_upload:
                description: "Upload SARIF to GitHub Security tab"
                required: false
                type: boolean
                default: true
            sarif_category:
                description: "SARIF category for Code-Scanning grouping"
                required: false
                type: string
                default: "trivy"

permissions:
    contents: read
    security-events: write
    actions: read

jobs:
    scan:
        name: "🛡️ Trivy Scan"
        runs-on: ubuntu-latest
        steps:
            - name: Trivy scan
              # Pinned by SHA to v0.35.0 — the only tag the March 2026 supply-
              # chain advisory confirms safe. The attacker force-pushed 76 of
              # 77 version tags to credential-stealing payloads; v0.35.0 was
              # protected by GitHub's immutable releases feature (enabled
              # before publish). SHA-pin (not mutable tag) per the advisory's
              # explicit guidance: https://github.com/aquasecurity/trivy-action/security/advisories
              # Re-verify this SHA against the upstream advisory before any future bump.
              uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
              with:
                  image-ref: ${{ inputs.image }}
                  format: ${{ inputs.sarif_upload && 'sarif' || 'table' }}
                  output: ${{ inputs.sarif_upload && 'trivy.sarif' || '' }}
                  severity: ${{ inputs.severity }}
                  ignore-unfixed: ${{ inputs.ignore_unfixed }}
                  exit-code: ${{ inputs.fail_on_severity && '1' || '0' }}

            - name: Upload SARIF
              if: inputs.sarif_upload && always()
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: trivy.sarif
                  category: ${{ inputs.sarif_category }}
