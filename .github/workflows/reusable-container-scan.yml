# Container vulnerability scan via Trivy (org-level, reusable).
#
# Aquasecurity's marketplace action IS the Trivy team's official integration
# (handles vuln-DB caching, retries, SARIF emission, exit codes). Reimplementing
# would just re-wrap their CLI — substantive external system.
#
# Batch 4.1 from tmp/plan-future-workflows.md.
name: 🛡️ Container Scan (Org-Level)

on:
    workflow_call:
        inputs:
            image:
                description: "Full image ref (registry/repo:tag)"
                required: true
                type: string
            severity:
                description: "Comma-sep severities to report. Defaults to CRITICAL+HIGH (these block when fail_on_severity is true)."
                required: false
                type: string
                default: "CRITICAL,HIGH"
            fail_on_severity:
                description: "Fail the job (and block publish) on any finding at `severity` or above"
                required: false
                type: boolean
                default: true
            ignore_unfixed:
                description: "Skip vulns with no upstream fix. Default true: failing on unfixable vulns stalls publishes indefinitely."
                required: false
                type: boolean
                default: true
            sarif_upload:
                description: "Upload SARIF to GitHub Security tab"
                required: false
                type: boolean
                default: true
            sarif_category:
                description: "SARIF category for Code-Scanning grouping"
                required: false
                type: string
                default: "trivy"

permissions:
    contents: read
    security-events: write
    actions: read

jobs:
    scan:
        name: "🛡️ Trivy Scan"
        runs-on: ubuntu-latest
        steps:
            - name: Trivy scan
              # Pinned by SHA to v0.36.0 (published 2026-04-22). The March
              # 2026 supply-chain advisory exposed that aquasecurity's tag
              # publishing was vulnerable to force-push — 76 of 77 historical
              # tags were rewritten to credential-stealing payloads, with
              # v0.35.0 the only pre-advisory tag protected by GitHub's
              # immutable-releases feature. All post-advisory releases
              # (v0.36.0 and later) are published with immutable-releases
              # protection. SHA-pin (not mutable tag) per the advisory's
              # explicit guidance, and re-verify against the upstream
              # advisory before any future bump:
              # https://github.com/aquasecurity/trivy-action/security/advisories
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
              with:
                  image-ref: ${{ inputs.image }}
                  format: ${{ inputs.sarif_upload && 'sarif' || 'table' }}
                  output: ${{ inputs.sarif_upload && 'trivy.sarif' || '' }}
                  severity: ${{ inputs.severity }}
                  ignore-unfixed: ${{ inputs.ignore_unfixed }}
                  exit-code: ${{ inputs.fail_on_severity && '1' || '0' }}

            - name: Upload SARIF
              if: inputs.sarif_upload && always()
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: trivy.sarif
                  category: ${{ inputs.sarif_category }}
