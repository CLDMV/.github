# Publishing Workflow Package
name: 📦 Publishing Jobs

on:
    workflow_call:
        inputs:
            # Package information
            package_name:
                description: "NPM package name (e.g., @cldmv/slothlet)"
                required: true
                type: string

            # Debug control
            debug:
                description: "Enable debug logging for troubleshooting"
                required: false
                type: boolean
                default: false
            dry_run:
                description: "Dry run mode - validate everything but don't publish or create
                    releases"
                required: false
                type: boolean
                default: false

            # Job control flags
            run_detect_repo_config:
                description: "Run detect repository config job"
                required: false
                type: boolean
                default: false
            run_publish_npm:
                description: "Run publish to NPM job"
                required: false
                type: boolean
                default: false
            run_publish_github_packages:
                description: "Run publish to GitHub Packages job"
                required: false
                type: boolean
                default: false
            run_create_release:
                description: "Run create GitHub release job (after publishing)"
                required: false
                type: boolean
                default: false

            # Build parameters
            node_version:
                description: "Node.js version to use (default: lts/*)"
                required: false
                type: string
                default: "lts/*"
            package_manager:
                description: "Package manager (npm or yarn)"
                required: false
                type: string
                default: "npm"

            # Version parameter
            version:
                description: "Specific version for publishing"
                required: false
                type: string
                default: ""

            # Publishing parameters
            publish_command_npm:
                description: "Command to publish to NPM"
                required: false
                type: string
                default: ""
            publish_command_github_packages:
                description: "Command to publish to GitHub Packages"
                required: false
                type: string
                default: ""

            # Release parameters (for create-release job)
            is_prerelease:
                description: "Whether this is a prerelease"
                required: false
                type: boolean
                default: false
            release_source_only:
                description: "Whether to create source-only release (no package assets)"
                required: false
                type: boolean
                default: false
            build_command:
                description: "Command to build package for release"
                required: false
                type: string
                default: "npm run build:ci"

            # GPG signing control
            use_gpg:
                description: "If true, use GPG signing for release tags"
                required: false
                type: boolean
                default: false

            # SBOM generation (Batch 4.2)
            generate_sbom:
                description: "Generate CycloneDX SBOM during publish; attach to release if create_release runs. Opt-in (off by default since dep-free repos produce meaningless artifacts)."
                required: false
                type: boolean
                default: false
            attest_sbom:
                description: "Sigstore-attest the SBOM. Only relevant when generate_sbom is true. Un-attested SBOMs are 'trust me bro' data."
                required: false
                type: boolean
                default: true
            sbom_format:
                description: "SBOM format: cyclonedx-json (recommended) or spdx-json"
                required: false
                type: string
                default: "cyclonedx-json"

        secrets:
            NPM_TOKEN:
                description: "NPM token for publishing packages"
                required: false
            BOT_APP_CLIENT_ID:
                description: "GitHub App Client ID for CLDMV bot"
                required: false
            BOT_APP_PRIVATE_KEY:
                description: "GitHub App private key for CLDMV bot"
                required: false
            TAGGER_NAME:
                description: "GPG tagger name for signing"
                required: false
            TAGGER_EMAIL:
                description: "GPG tagger email for signing"
                required: false
            GPG_PRIVATE_KEY:
                description: "ASCII-armored private key for signing"
                required: false
            GPG_PASSPHRASE:
                description: "Passphrase for the private key (if protected)"
                required: false

        outputs:
            # Version output
            version:
                description: "Detected or provided package version"
                value: ${{ jobs.detect-version.outputs.version }}

            # Repository config outputs
            npm-command:
                description: "Detected NPM publish command"
                value: ${{ jobs.detect-repo-config.outputs.npm-command }}
            github-packages-command:
                description: "Detected GitHub Packages publish command"
                value: ${{ jobs.detect-repo-config.outputs.github-packages-command }}
            repo-is-private:
                description: "Whether the repository is private"
                value: ${{ jobs.detect-repo-config.outputs.repo-is-private }}

            # Publishing outputs
            npm-published:
                description: "Whether the package was published to NPM"
                value: ${{ jobs.publish-npm.outputs.published }}
            github-packages-published:
                description: "Whether the package was published to GitHub Packages"
                value: ${{ jobs.publish-github-packages.outputs.published }}

            # Release outputs
            release-id:
                description: "The ID of the created GitHub release"
                value: ${{ jobs.create-release.outputs.release-id }}

            # Version tag outputs
            major-version:
                description: "The major version tag that was updated (e.g. v1)"
                value: ${{ jobs.update-version-tags.outputs.major-version }}
            minor-version:
                description: "The minor version tag that was updated (e.g. v1.2)"
                value: ${{ jobs.update-version-tags.outputs.minor-version }}
            tags-updated:
                description: "Whether rolling version tags were successfully updated"
                value: ${{ jobs.update-version-tags.outputs.updated }}

# Workflow-level: publish jobs need to create GitHub releases (contents),
# publish to GitHub Packages (packages), and use OIDC for npm provenance
# (id-token). The detect-version + dry-run jobs only read, but the
# workflow-level grant matches the broadest consumer to keep the
# permissions surface declared in one place.
permissions:
    contents: write
    packages: write
    id-token: write

jobs:
    detect-version:
        name: "🔍 Detect Version"
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.extract.outputs.version }}
            # Latest version already on NPM. Downstream publish/release jobs gate
            # on `version != npm-latest-version` to skip cleanly when the
            # package.json version is unchanged (e.g. a non-release PR merged to
            # master). Avoids the false-positive "version already published"
            # failure that trains people to ignore real publish failures.
            # See P3.3 in tmp/plan-future-workflows.md.
            npm-latest-version: ${{ steps.extract.outputs.npm-latest-version }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Extract and validate version
              id: extract
              uses: CLDMV/.github/.github/actions/npm/steps/extract-version@v4
              with:
                  package-name: ${{ inputs.package_name }}
                  version-override: ${{ inputs.version }}

            - name: Report skip-publish status
              shell: bash
              run: |
                  if [ "${{ steps.extract.outputs.version }}" = "${{ steps.extract.outputs.npm-latest-version }}" ] && [ -n "${{ steps.extract.outputs.npm-latest-version }}" ]; then
                      echo "📦 v${{ steps.extract.outputs.version }} already on NPM — downstream publish/release jobs will skip."
                      echo "::notice::Version unchanged (v${{ steps.extract.outputs.version }}) — publish/release jobs skipped. This is expected when a non-release PR merged to the default branch."
                  else
                      echo "🆕 v${{ steps.extract.outputs.version }} is new (NPM latest: ${{ steps.extract.outputs.npm-latest-version || '(unpublished)' }}) — proceeding with publish."
                  fi

    detect-repo-config:
        name: "🔧 Detect Repository Config"
        if: inputs.run_detect_repo_config == true || inputs.run_publish_npm == true ||
            inputs.run_publish_github_packages == true
        runs-on: ubuntu-latest
        outputs:
            npm-command: ${{ steps.detect.outputs.npm-command }}
            github-packages-command: ${{ steps.detect.outputs.github-packages-command }}
            repo-is-private: ${{ steps.detect.outputs.repo-is-private }}
        steps:
            - name: Detect Repository Config
              id: detect
              uses: CLDMV/.github/.github/actions/github/jobs/detect-repo-config@v4
              with:
                  package-manager: ${{ inputs.package_manager }}
                  custom-npm-command: ${{ inputs.publish_command_npm }}
                  custom-github-packages-command: ${{ inputs.publish_command_github_packages }}
                  github-token: ${{ github.token }}

    publish-npm:
        name: "📦 Publish to NPM"
        # Skip when package.json version already matches NPM (no actual bump
        # to publish). Dry-run still runs the validation steps so consumers
        # can sanity-check the flow regardless of version state. P3.3.
        if: |
            inputs.run_publish_npm == true && (
              inputs.dry_run == true ||
              needs.detect-version.outputs.version != needs.detect-version.outputs.npm-latest-version
            )
        runs-on: ubuntu-latest
        needs: [ detect-version, detect-repo-config ]
        permissions:
            id-token: write # Required for NPM trusted publishers (OIDC)
            contents: read
        outputs:
            published: ${{ steps.publish.outputs.published }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Calculate artifact names
              id: names
              uses: CLDMV/.github/.github/actions/common/steps/calculate-names@v4
              with:
                  node-version: ${{ inputs.node_version }}
                  package-name: ${{ inputs.package_name }}
                  version: ${{ needs.detect-version.outputs.version }}

            - name: Publish to NPM
              id: publish
              uses: CLDMV/.github/.github/actions/npm/jobs/publish-npm@v4
              with:
                  package-name: ${{ inputs.package_name }}
                  version: ${{ needs.detect-version.outputs.version }}
                  node-version: ${{ inputs.node_version }}
                  package-manager: ${{ inputs.package_manager }}
                  publish-command: ${{ needs.detect-repo-config.outputs.npm-command }}
                  dry-run: ${{ inputs.dry_run }}
                  npm-token: ${{ secrets.NPM_TOKEN }}
                  artifact-name: ${{ steps.names.outputs.artifact-name }}

    publish-github-packages:
        name: "📦 Publish to GitHub Packages"
        # Mirrors the NPM gate (assumes NPM + GH Packages stay in sync, which is
        # the case when both publish from the same package.json bump). P3.3.
        if: |
            inputs.run_publish_github_packages == true && (
              inputs.dry_run == true ||
              needs.detect-version.outputs.version != needs.detect-version.outputs.npm-latest-version
            )
        runs-on: ubuntu-latest
        needs: [ detect-version, detect-repo-config ]
        permissions:
            contents: read
            packages: write # Required to publish to GitHub Packages
        outputs:
            published: ${{ steps.publish.outputs.published }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            # - name: Create App token
            #   id: app-token
            #   uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
            #   with:
            #       client_id: ${{ secrets.BOT_APP_CLIENT_ID }}
            #       private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
            #   env:
            #       BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
            #       BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            - name: Calculate artifact names
              id: names
              uses: CLDMV/.github/.github/actions/common/steps/calculate-names@v4
              with:
                  node-version: ${{ inputs.node_version }}
                  package-name: ${{ inputs.package_name }}
                  version: ${{ needs.detect-version.outputs.version }}

            - name: Publish to GitHub Packages
              id: publish
              uses: CLDMV/.github/.github/actions/npm/jobs/publish-github-packages@v4
              with:
                  package-name: ${{ inputs.package_name }}
                  version: ${{ needs.detect-version.outputs.version }}
                  node-version: ${{ inputs.node_version }}
                  package-manager: ${{ inputs.package_manager }}
                  publish-command: ${{ needs.detect-repo-config.outputs.github-packages-command }}
                  dry-run: ${{ inputs.dry_run }}
                  #   github-token: ${{ steps.app-token.outputs.token }}
                  github-token: ${{ github.token }}
                  artifact-name: ${{ steps.names.outputs.artifact-name }}

    create-release:
        name: "📋 Create GitHub Release"
        # Skip release creation when the version already has one on NPM (and
        # therefore presumably here). Dry-run still validates. P3.3.
        if: |
            inputs.run_create_release == true && (
              inputs.dry_run == true ||
              needs.detect-version.outputs.version != needs.detect-version.outputs.npm-latest-version
            )
        runs-on: ubuntu-latest
        needs: [ detect-version ]
        outputs:
            release-id: ${{ steps.create.outputs.release-id }}
        steps:
            - name: Create App token (auto-detect)
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            - name: Create GitHub Release
              id: create
              uses: CLDMV/.github/.github/actions/github/jobs/create-release@v4
              with:
                  version: ${{ needs.detect-version.outputs.version }}
                  package-name: ${{ inputs.package_name }}
                  is-prerelease: ${{ inputs.is_prerelease }}
                  package-manager: ${{ inputs.package_manager }}
                  release-source-only: ${{ inputs.release_source_only }}
                  node-version: ${{ inputs.node_version }}
                  build-command: ${{ inputs.build_command }}
                  dry-run: ${{ inputs.dry_run }}
                  github-token: ${{ steps.app-token.outputs.token }}
                  # GPG signing parameters
                  gpg_enabled: ${{ inputs.use_gpg }}
                  tagger_name: ${{ secrets.TAGGER_NAME }}
                  tagger_email: ${{ secrets.TAGGER_EMAIL }}
                  gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
                  gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}

            # SBOM generation + attestation. Anchore's syft does the per-
            # ecosystem dep-tree walking (~2000 lines of correctness logic);
            # actions/attest-sbom is GitHub-owned Sigstore signing. Both
            # substantive external systems — we wrap, don't roll our own.
            # Batch 4.2.
            - name: Generate SBOM (CycloneDX)
              if: inputs.generate_sbom == true && inputs.dry_run != true
              uses: anchore/sbom-action@v0
              with:
                  format: ${{ inputs.sbom_format }}
                  output-file: sbom.${{ inputs.sbom_format == 'spdx-json' && 'spdx.json' || 'cdx.json' }}
                  artifact-name: sbom.${{ inputs.sbom_format == 'spdx-json' && 'spdx.json' || 'cdx.json' }}

            - name: Attest SBOM (Sigstore)
              if: inputs.generate_sbom == true && inputs.attest_sbom == true && inputs.dry_run != true
              uses: actions/attest-sbom@v3
              with:
                  subject-path: "*.tgz"
                  sbom-path: sbom.${{ inputs.sbom_format == 'spdx-json' && 'spdx.json' || 'cdx.json' }}

            - name: Attach SBOM to release
              if: inputs.generate_sbom == true && inputs.dry_run != true && steps.create.outputs.release-id != ''
              shell: bash
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  REPO: ${{ github.repository }}
                  RELEASE_ID: ${{ steps.create.outputs.release-id }}
                  SBOM_PATH: sbom.${{ inputs.sbom_format == 'spdx-json' && 'spdx.json' || 'cdx.json' }}
              run: |
                  curl -sSL -X POST \
                    -H "Authorization: Bearer $GH_TOKEN" \
                    -H "Accept: application/vnd.github+json" \
                    -H "Content-Type: application/octet-stream" \
                    "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=$SBOM_PATH" \
                    --data-binary "@$SBOM_PATH"
                  echo "📋 SBOM attached to release"

    update-version-tags:
        name: "📌 Update Major Version Tags"
        if: inputs.run_create_release == true
        needs: [ create-release ]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        # Serialize with workflow-update-major-version-tags.yml (which declares
        # the same group at workflow-level). Prevents intermediate-state flicker
        # when both run for the same repo around the same release. P3.4.
        concurrency:
            group: tags-${{ github.repository }}
            cancel-in-progress: false
        outputs:
            major-version: ${{ steps.update.outputs.major-version }}
            minor-version: ${{ steps.update.outputs.minor-version }}
            updated: ${{ steps.update.outputs.updated }}
        steps:
            # An App installation token is required: moving the rolling vX / vX.Y
            # tags onto a release commit that modifies .github/workflows/ needs the
            # `workflows` scope, which the default Actions GITHUB_TOKEN can never
            # hold. The GitHub App must also be granted Workflows: write on the repo.
            - name: Create App token (auto-detect)
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            - name: Update Major Version Tags
              id: update
              uses: CLDMV/.github/.github/actions/git/jobs/update-major-version-tags@v4
              with:
                  debug: ${{ inputs.debug }}
                  github_token: ${{ steps.app-token.outputs.token }}
                  gpg_enabled: ${{ inputs.use_gpg }}
                  tagger_name: ${{ secrets.TAGGER_NAME }}
                  tagger_email: ${{ secrets.TAGGER_EMAIL }}
                  gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
                  gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
