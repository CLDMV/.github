# Audit every commit that lands on this repo's default branch against the
# expected release-flow shape. On miss, files a GitHub Issue (deduped by SHA)
# attributed to the CLDMV bot App.
name: 🧾 Local Master Commit Audit

on:
    push:
        branches: [master, main]

permissions:
    contents: read
    issues: write

jobs:
    audit:
        runs-on: ubuntu-latest
        steps:
            - name: Create App token (falls back to GITHUB_TOKEN)
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v3
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            - name: Audit commit subject
              uses: CLDMV/.github/.github/actions/git/jobs/audit-commit-subject@v3
              with:
                  commit_sha: ${{ github.sha }}
                  allowed_patterns: |
                      ^release: v\d+\.\d+\.\d+( - .+?)?( \(#\d+\))?$
                      ^chore(\([^)]+\))?: .+
                      ^Merge pull request #\d+ from .+
                      ^feat(\([^)]+\))?: .+
                      ^fix(\([^)]+\))?: .+
                      ^docs(\([^)]+\))?: .+
                      ^refactor(\([^)]+\))?: .+
                  # Use canonical label names from data/github-labels.json
                  # (note the space after each colon).
                  issue_labels: "type: ci,priority: high"
                  github_token: ${{ steps.app-token.outputs.token }}
