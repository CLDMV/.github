# When any PR merges to master/main, fan out and refresh every open release
# PR so its version bump and changelog stay in sync with the new master state.
# Companion to P3.1's calculate-version-from-master fix.
name: 🔄 Local Sync Open Release PRs

on:
    pull_request:
        types: [closed]
        branches: [master, main]

permissions:
    contents: write
    pull-requests: write

jobs:
    sync:
        # Fire on every merged PR — including release PRs auto-opened by
        # cldmv-bot. The earlier "skip bot-authored merges to avoid recursion"
        # comment was wrong: sync-fan-out only UPDATES open release PRs
        # (force-pushes a bumped chore commit onto each), it never merges
        # anything. A force-push triggers other workflows (Local Release PR,
        # Local CI) but NOT local-sync-release-prs (which fires on PR close).
        # Excluding cldmv-bot defeats the whole point — every release PR is
        # auto-opened by that bot, so the sync flow never fired on the merges
        # it was built for. github-actions[bot] is still excluded as a
        # defensive guard against any workflow that posts merges under that
        # identity.
        if: |
            github.event.pull_request.merged == true &&
            github.event.pull_request.user.login != 'github-actions[bot]'
        uses: ./.github/workflows/workflow-sync-open-release-prs.yml
        with:
            package_name: "@cldmv/.github"
        secrets:
            BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
