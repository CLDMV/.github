# Daily stale sweep for this repo. Calls our own reusable so the implementation
# is exercised against real data.
name: 🍂 Local Stale

on:
    schedule:
        - cron: "13 5 * * *" # daily 05:13 UTC
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Preview only — no changes will be made"
                type: boolean
                default: false

permissions:
    issues: write
    pull-requests: write

jobs:
    sweep:
        uses: ./.github/workflows/reusable-stale.yml
        with:
            dry_run: ${{ github.event.inputs.dry_run == 'true' }}
        secrets:
            BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
