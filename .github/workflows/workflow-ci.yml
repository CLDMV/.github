# CLDMV/.github/.github/workflows/ci.yml
name: 🧪 CI Workflow (Org-Level)

on:
    workflow_call:
        outputs:
            docs_only:
                description: "true if every changed file matched `paths_ignore`; false otherwise. Callers should green-light their Required PR Check when this is true so docs-only PRs aren't blocked at the ruleset."
                value: ${{ jobs.paths-gate.outputs.docs_only }}
            is_master_sync:
                description: "true if `next` / `hotfixes` was just force-synced to master (head SHA matches the default branch). Callers should green-light their Required PR Check when this is true — there's no diff to test, no PR to gate."
                value: ${{ jobs.sync-gate.outputs.is_master_sync }}
        inputs:
            package_name:
                required: true
                type: string
                description: "NPM package name (e.g., @cldmv/slothlet)"
            paths_ignore:
                required: false
                type: string
                default: |
                    **.md
                    docs/**
                    *.md
                    LICENSE
                    .gitignore
                description: "Multiline list of GitHub paths-ignore-style globs. When every changed file matches one of these, the CI matrix is skipped and `docs_only` output is set to `true` so the caller can post a green Required PR Check without running the heavy chain. Do NOT put these on the `on:` trigger — that skips the workflow entirely and the required check never posts."
            debug:
                required: false
                type: boolean
                default: false
                description: "Enable debug logging for troubleshooting"
            node_version:
                required: false
                type: string
                default: "lts/*"
                description: "Node.js version to use (default: lts/*)"
            min_node_version:
                required: false
                type: string
                default: "20"
                description: "Minimum Node.js version for matrix testing (default: 20, oldest
                    non-EOL)"
            max_node_major:
                required: false
                type: string
                default: "22"
                description: "Override max Node.js major version (default: 22)"
            lts_only_matrix:
                required: false
                type: boolean
                default: false
                description: "Only include even-numbered (LTS) Node.js major versions in the
                    test matrix"
            package_manager:
                required: false
                type: string
                default: "npm"
                description: "Package manager (npm or yarn)"
            test_command:
                required: false
                type: string
                default: "npm test"
                description: "Command to run tests"
            build_command:
                required: false
                type: string
                default: "npm run build:ci"
                description: "Command to build package"
            skip_build:
                required: false
                type: boolean
                default: false
                description: "Skip the local Build step in the coverage-badge and
                    coverage-pr-comment legs. Use for repos with no build."
            # Test control options
            skip_performance_tests:
                required: false
                type: boolean
                default: false
                description: "Skip performance tests during CI"
            skip_matrix_tests:
                required: false
                type: boolean
                default: false
                description: "Skip matrix testing (use single node version only)"
            test_environment:
                required: false
                type: string
                default: "development"
                description: "Environment for tests (affects NODE_ENV and NODE_OPTIONS
                    --conditions flag)"

            # ── Type check ─────────────────────────────────────────────────────
            type_check_command:
                required: false
                type: string
                default: "npm run test:types"
                description: "Command to run type checking (e.g. npm run test:types)"
            skip_type_check:
                required: false
                type: boolean
                default: false
                description: "Skip the type-check step in the coverage-badge job"

            # ── Coverage badge ─────────────────────────────────────────────────
            enable_coverage_badge:
                required: false
                type: boolean
                default: false
                description: "Run the coverage + badge-push job after CI passes"
            coverage_command:
                required: false
                type: string
                default: "npm run ci:coverage"
                description: "Command to run tests and generate coverage data"
            coverage_summary_path:
                required: false
                type: string
                default: "coverage/coverage-summary.json"
                description: "Path to the coverage-summary.json produced by Jest / c8"
            badges_branch:
                required: false
                type: string
                default: "badges"
                description: "Branch where the badge JSON is published"
            badge_filename:
                required: false
                type: string
                default: "coverage.json"
                description: "Filename for the badge JSON committed to the badges branch"
            upload_coverage_artifact:
                required: false
                type: boolean
                default: true
                description: "Upload the full coverage/ directory as a workflow artifact"
            default_branch:
                required: false
                type: string
                default: "master"
                description: "Default branch name — badge is only pushed when a push lands on
                    this branch (prevents PR coverage from overwriting merged
                    coverage)"
            enable_coverage_pr_comment:
                required: false
                type: boolean
                default: true
                description: "Post/update a sticky coverage report comment on pull requests"
            enable_embedded_tests:
                required: false
                type: boolean
                default: false
                description: "Fetch and run private tests from embedded anonymous gitlinks
                    via the org bot App. Requires BOT_APP_CLIENT_ID +
                    BOT_APP_PRIVATE_KEY secrets. Silently no-ops on fork PRs.
                    See docs/conventions/embedded-tests-ci.md."

        secrets:
            NPM_TOKEN:
                description: "NPM token for publishing packages"
                required: false
            BOT_APP_CLIENT_ID:
                description: "GitHub App Client ID for CLDMV bot"
                required: false
            BOT_APP_ID:
                description: "[DEPRECATED] Use BOT_APP_CLIENT_ID instead"
                required: false
            BOT_APP_PRIVATE_KEY:
                description: "GitHub App private key for CLDMV bot"
                required: false
            # Required when enable_coverage_badge is true
            BOT_NAME:
                description: "Git user.name for the signed badge commit"
                required: false
            BOT_EMAIL:
                description: "Git user.email for the signed badge commit"
                required: false
            BOT_GPG_PRIVATE_KEY:
                description: "Armored GPG private key for commit signing"
                required: false
            BOT_GPG_PASSPHRASE:
                description: "Passphrase for the GPG key"
                required: false
            # Required when enable_coverage_pr_comment is true
            # (no extra secrets needed — github.token is used directly)

# Workflow-level: broadest of the called reusables' declared permissions.
# Reusable-workflow-call jobs (`uses:`) inherit from the caller's
# workflow-level grant — they can't declare per-job overrides — so the
# baseline must cover the largest write surface used by any branch:
#   - coverage-badge:      contents:write   (pushes to `badges` branch)
#   - coverage-pr-comment: pull-requests:write (edits PR description)
#   - ci / commit-gate:    contents:read    (no writes)
# Jobs that don't need the write surface simply don't exercise it.
permissions:
    contents: write
    pull-requests: write

jobs:
    # After a release merge, the bot force-syncs `next` / `hotfixes` to
    # master. The resulting push event fires every workflow on a SHA that
    # has nothing new to test. This gate detects that case so downstream
    # jobs can short-circuit, and the caller's Required PR Check can
    # green-light. See `.github/actions/common/steps/master-sync-gate`.
    sync-gate:
        name: "🪞 Master sync gate"
        runs-on: ubuntu-latest
        if: |
            github.event_name == 'push' &&
            (github.ref_name == 'next' || github.ref_name == 'hotfixes')
        permissions:
            contents: read
        outputs:
            is_master_sync: ${{ steps.gate.outputs.is_master_sync }}
        steps:
            - name: Decide master-sync
              id: gate
              uses: CLDMV/.github/.github/actions/common/steps/master-sync-gate@v4

    # Decide whether the triggering change is entirely covered by the
    # `paths_ignore` glob list. The caller's Required PR Check should
    # green-light when `docs_only=true` so docs-only PRs aren't blocked at
    # the ruleset. Heavy jobs (`ci`, `coverage-*`) gate on the output so
    # they don't run for docs-only changes.
    paths-gate:
        name: "🧭 Paths Gate"
        runs-on: ubuntu-latest
        outputs:
            docs_only: ${{ steps.gate.outputs.docs_only }}
        steps:
            - name: Decide docs-only
              id: gate
              uses: CLDMV/.github/.github/actions/common/steps/paths-gate@v4
              with:
                  paths_ignore: ${{ inputs.paths_ignore }}

    # Check if we should skip CI based on commit message
    commit-gate:
        name: "🚪 Commit Gate"
        runs-on: ubuntu-latest
        outputs:
            should_skip: ${{ steps.gate.outputs.should_skip }}
            matched_prefix: ${{ steps.gate.outputs.matched_prefix }}
        steps:
            - name: Check commit message
              id: gate
              uses: CLDMV/.github/.github/actions/common/steps/commit-gate@v4
              with:
                  prefixes: "chore: bump version"

    ci:
        name: "🏗️ Continuous Integration"
        needs: [sync-gate, paths-gate, commit-gate]
        # `!cancelled()` is load-bearing: sync-gate skips on every event that
        # isn't a push to next/hotfixes, which would cascade-skip ci without
        # the guard. With it, ci runs whenever the gate outputs (empty when
        # skipped) don't actively veto.
        if: |
            !cancelled() &&
            needs.commit-gate.outputs.should_skip != 'true' &&
            needs.paths-gate.outputs.docs_only != 'true' &&
            needs.sync-gate.outputs.is_master_sync != 'true'
        uses: CLDMV/.github/.github/workflows/reusable-build-and-test.yml@v4
        with:
            package_name: ${{ inputs.package_name }}
            debug: ${{ inputs.debug }}
            run_build_and_test: true
            node_version: ${{ inputs.node_version }}
            min_node_version: ${{ inputs.min_node_version }}
            max_node_major: ${{ inputs.max_node_major }}
            lts_only_matrix: ${{ inputs.lts_only_matrix }}
            package_manager: ${{ inputs.package_manager }}
            test_command: ${{ inputs.test_command }}
            build_command: ${{ inputs.build_command }}
            skip_performance_tests: ${{ inputs.skip_performance_tests }}
            skip_matrix_tests: ${{ inputs.skip_matrix_tests }}
            test_environment: ${{ inputs.test_environment }}
            enable_embedded_tests: ${{ inputs.enable_embedded_tests }}
        secrets:
            BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID || secrets.BOT_APP_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

    coverage-badge:
        name: "📊 Coverage & Badge Push"
        needs: [ paths-gate, commit-gate, ci ]
        # NOTE: a `type: boolean` input arrives as the STRING "true"/"false"
        # when a consumer passes it through a `${{ }}` expression — the standard
        # template does `enable_*: ${{ github.event.inputs.* != 'false' }}` — so
        # a bare `inputs.* == true` silently evaluates false and the job skips
        # (green, no error). Accept both the boolean and string forms.
        if: >
            needs.paths-gate.outputs.docs_only != 'true' &&
            needs.commit-gate.outputs.should_skip != 'true' && needs.ci.result
            == 'success' && (inputs.enable_coverage_badge == true ||
            inputs.enable_coverage_badge == 'true') &&
            github.event_name == 'push' && github.ref ==
            format('refs/heads/{0}', inputs.default_branch)
        uses: CLDMV/.github/.github/workflows/reusable-coverage-badge.yml@v4
        with:
            node_version: ${{ inputs.node_version }}
            package_manager: ${{ inputs.package_manager }}
            # Coverage runs on a fresh runner — pass `build_command` so the
            # local `dist/` exists before `test:types` resolves. Set
            # `skip_build: true` upstream for repos with no build.
            build_command: ${{ inputs.build_command }}
            skip_build: ${{ inputs.skip_build }}
            type_check_command: ${{ inputs.type_check_command }}
            coverage_command: ${{ inputs.coverage_command }}
            skip_type_check: ${{ inputs.skip_type_check }}
            coverage_summary_path: ${{ inputs.coverage_summary_path }}
            badges_branch: ${{ inputs.badges_branch }}
            badge_filename: ${{ inputs.badge_filename }}
            upload_coverage_artifact: ${{ inputs.upload_coverage_artifact }}
            debug: ${{ inputs.debug }}
        secrets:
            BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID || secrets.BOT_APP_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}
            BOT_NAME: ${{ secrets.BOT_NAME }}
            BOT_EMAIL: ${{ secrets.BOT_EMAIL }}
            BOT_GPG_PRIVATE_KEY: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
            BOT_GPG_PASSPHRASE: ${{ secrets.BOT_GPG_PASSPHRASE }}

    coverage-pr-comment:
        name: "PR Coverage Badge"
        needs: [ paths-gate, commit-gate, ci ]
        # NOTE: see coverage-badge above — a `${{ }}`-passed boolean input
        # arrives as the STRING "true", so a bare `== true` skips the job.
        if: >
            needs.paths-gate.outputs.docs_only != 'true' &&
            needs.commit-gate.outputs.should_skip != 'true' && needs.ci.result
            == 'success' && (inputs.enable_coverage_pr_comment == true ||
            inputs.enable_coverage_pr_comment == 'true') &&
            github.event_name == 'pull_request'
        uses: CLDMV/.github/.github/workflows/reusable-coverage-pr-comment.yml@v4
        with:
            node_version: ${{ inputs.node_version }}
            package_manager: ${{ inputs.package_manager }}
            # Coverage runs on a fresh runner — pass `build_command` so the
            # local `dist/` exists before `test:types` resolves.
            build_command: ${{ inputs.build_command }}
            skip_build: ${{ inputs.skip_build }}
            type_check_command: ${{ inputs.type_check_command }}
            coverage_command: ${{ inputs.coverage_command }}
            coverage_summary_path: ${{ inputs.coverage_summary_path }}
            skip_type_check: ${{ inputs.skip_type_check }}
            debug: ${{ inputs.debug }}
        # Pass the bot App credentials through so the PR-body edit is attributed
        # to the consumer's bot. Falls back to GITHUB_TOKEN if these are unset.
        secrets:
            BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

    summary:
        name: "📊 CI Summary"
        needs: [ sync-gate, paths-gate, commit-gate, ci, coverage-badge, coverage-pr-comment ]
        # `always()` is already there so skipped gates don't suppress the
        # summary; the sync-gate / paths-gate / commit-gate output checks
        # then decide whether the summary is meaningful enough to produce.
        if: always() && needs.commit-gate.outputs.should_skip != 'true' && needs.paths-gate.outputs.docs_only != 'true' && needs.sync-gate.outputs.is_master_sync != 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Generate CI Summary
              uses: CLDMV/.github/.github/actions/workflows/ci-summary@v4
              with:
                  package-name: ${{ inputs.package_name }}
                  node-version: ${{ inputs.node_version }}
                  package-manager: ${{ inputs.package_manager }}
                  ci-result: ${{ needs.ci.result }}
                  enable-coverage-badge: ${{ inputs.enable_coverage_badge }}
                  badges-branch: ${{ inputs.badges_branch }}
                  coverage-badge-result: ${{ needs.coverage-badge.result }}
                  enable-coverage-pr-comment: ${{ inputs.enable_coverage_pr_comment }}
                  coverage-pr-comment-result: ${{ needs.coverage-pr-comment.result }}
