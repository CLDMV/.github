# First-time-contributor welcomer (org-level, reusable).
# Batch 5.3 from tmp/plan-future-workflows.md.
name: 👋 Welcome Contributor (Org-Level)

on:
    workflow_call:
        inputs:
            pr_message_path:
                required: false
                type: string
                default: ""
            issue_message_path:
                required: false
                type: string
                default: ""
            exempt_logins:
                required: false
                type: string
                default: "dependabot[bot],renovate[bot],github-actions[bot],cldmv-bot[bot]"
        secrets:
            # Optional. When provided, welcome comments are posted by the
            # consumer's bot App instead of github-actions[bot]. Falls back to
            # GITHUB_TOKEN via create-app-token's auto-detect.
            BOT_APP_CLIENT_ID:
                required: false
            BOT_APP_PRIVATE_KEY:
                required: false

permissions:
    issues: write
    pull-requests: write

jobs:
    welcome:
        runs-on: ubuntu-latest
        steps:
            - name: Create App token (falls back to GITHUB_TOKEN)
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            - name: Welcome contributor
              uses: CLDMV/.github/.github/actions/github/jobs/welcome-contributor@v4
              with:
                  pr_message_path: ${{ inputs.pr_message_path }}
                  issue_message_path: ${{ inputs.issue_message_path }}
                  exempt_logins: ${{ inputs.exempt_logins }}
                  github_token: ${{ steps.app-token.outputs.token }}
