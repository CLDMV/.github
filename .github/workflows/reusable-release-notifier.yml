# Release notifier (org-level, reusable). Fires on `release: published` and
# routes the announcement to the matching set of (discord, slack, generic)
# webhooks based on repo visibility (public vs private/internal).
#
# Channels are addressed by secret name — no config file. Set the org-level
# secret for each channel you want active; unset secrets are silently skipped.
# Per-repo override: set a repo secret with the same name (repo wins over org).
# Repo mute: set the repo secret to an empty string.
#
# Secret naming: <TYPE>_RELEASES_<VIS>_WEBHOOK
#   TYPE = DISCORD | SLACK | GENERIC
#   VIS  = PUBLIC | PRIVATE
name: 📣 Release Notifier (Org-Level)

on:
    workflow_call:

permissions:
    contents: read

jobs:
    notify:
        runs-on: ubuntu-latest
        steps:
            - name: Dispatch release notification
              uses: CLDMV/.github/.github/actions/community/jobs/release-notifier@v4
              with:
                  event_kind: releases
                  github_token: ${{ github.token }}
              env:
                  # All six release channels. Empty / unset secrets are no-ops
                  # — only the channels you've actually provisioned URLs for
                  # will fire. The dispatcher picks PUBLIC vs PRIVATE based on
                  # the repo's actual visibility.
                  DISCORD_RELEASES_PUBLIC_WEBHOOK: ${{ secrets.DISCORD_RELEASES_PUBLIC_WEBHOOK }}
                  DISCORD_RELEASES_PRIVATE_WEBHOOK: ${{ secrets.DISCORD_RELEASES_PRIVATE_WEBHOOK }}
                  SLACK_RELEASES_PUBLIC_WEBHOOK: ${{ secrets.SLACK_RELEASES_PUBLIC_WEBHOOK }}
                  SLACK_RELEASES_PRIVATE_WEBHOOK: ${{ secrets.SLACK_RELEASES_PRIVATE_WEBHOOK }}
                  GENERIC_RELEASES_PUBLIC_WEBHOOK: ${{ secrets.GENERIC_RELEASES_PUBLIC_WEBHOOK }}
                  GENERIC_RELEASES_PRIVATE_WEBHOOK: ${{ secrets.GENERIC_RELEASES_PRIVATE_WEBHOOK }}
