# Welcome first-time contributors to this repo.
name: 👋 Local Welcome

# SECURITY NOTE: pull_request_target — see local-labeler.yml.
on:
    issues:
        types: [opened]
    pull_request_target:
        types: [opened]

permissions:
    issues: write
    pull-requests: write

jobs:
    welcome:
        uses: ./.github/workflows/reusable-welcome.yml
        # Pass bot App credentials so the welcome comment is posted by the
        # CLDMV bot instead of github-actions[bot]. Falls back to GITHUB_TOKEN
        # if these secrets aren't configured at the repo/org level.
        secrets:
            BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
