# Welcome first-time contributors to this repo.
name: 👋 Local Welcome

# SECURITY NOTE: pull_request_target — see local-labeler.yml.
on:
    issues:
        types: [opened]
    pull_request_target:
        types: [opened]

permissions:
    issues: write
    pull-requests: write

