# CLA bot (org-level, reusable).
#
# Per-CLA-version, org-wide signing model with per-repo override support.
#
#   - Default scope: a consumer repo with no local CLA.md uses the org-wide
#     CLA in the ledger at cla-versions/v<X.Y>.md. A contributor signs once
#     per CLA major.minor; their signature applies to every consumer repo
#     that uses the default until the major.minor is bumped.
#   - Override scope: a consumer repo with its own CLA.md at the root
#     overrides the default. The bot reads the version from the file's
#     header. On the first signature, the bot bootstraps an immutable
#     snapshot at cla-versions/overrides/<owner>/<repo>/v<X.Y>.md and
#     stores signatures under signatures/<platform>/overrides/<owner>/<repo>/v<X.Y>/.
#     Editing the override CLA.md without bumping the header version is
#     detected as drift and rejected.
#
# Records live in the central ledger repo (default: CLDMV/.cla-signatures)
# as immutable JSON files. Org members are exempt via /orgs/{org}/members.
#
# Two secret pairs:
#   - BOT_APP_CLIENT_ID / BOT_APP_PRIVATE_KEY: required; the general org bot
#   - CLA_BOT_APP_CLIENT_ID / CLA_BOT_APP_PRIVATE_KEY: optional override
#     that, when both are set, takes precedence. Useful if you want a
#     dedicated CLA-bot identity in the audit trail.
name: 📜 CLA (Org-Level)

on:
    workflow_call:
        inputs:
            cla_version:
                required: true
                type: string
                description: "Default-scope CLA version (e.g. '1.0' or '1.0.0'). For override scope, the version is read from the consumer's CLA.md header and this input is only a fallback."
            cla_path:
                required: false
                type: string
                default: "CLA.md"
                description: "Path inside the consumer repo where an override CLA may exist. If a file is present at this path, the bot uses override scope."
            exempt_users:
                required: false
                type: string
                default: "cldmv-bot[bot],dependabot[bot],github-actions[bot],renovate[bot],copilot[bot]"
            exempt_org_members:
                required: false
                type: boolean
                default: true
            exempt_org:
                required: false
                type: string
                default: ${{ github.repository_owner }}
            required_text_template:
                required: false
                type: string
                default: "I have read and I agree to the CLA ${cla_version}"
            ledger_repo:
                required: false
                type: string
                default: "CLDMV/.cla-signatures"
                description: "owner/name of the central CLA signatures ledger repo"
            ledger_platform:
                required: false
                type: string
                default: "github"
            public_cla_url_template:
                required: false
                type: string
                default: "https://github.com/CLDMV/.github/blob/v4/examples/repo-seeds/.cla-signatures/cla-versions/${cla_version}.md"
                description: "URL template for the publicly-readable copy of the default CLA. ${cla_version} expands to the effective version. Only used for the default scope; overrides link to the consumer's own CLA.md."
        secrets:
            BOT_APP_CLIENT_ID:
                required: true
            BOT_APP_PRIVATE_KEY:
                required: true
            CLA_BOT_APP_CLIENT_ID:
                required: false
            CLA_BOT_APP_PRIVATE_KEY:
                required: false
            TAGGER_NAME:
                required: false
            TAGGER_EMAIL:
                required: false

permissions:
    contents: read
    pull-requests: write
    statuses: write
    issues: write

jobs:
    check:
        # Runs on PR events (opened/synchronize/reopened/etc) — uses
        # pull_request_target so fork PRs get full permissions + secrets.
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        runs-on: ubuntu-latest
        steps:
            - name: Validate CLA bot credentials are paired
              shell: bash
              env:
                  CLA_ID: ${{ secrets.CLA_BOT_APP_CLIENT_ID }}
                  CLA_KEY: ${{ secrets.CLA_BOT_APP_PRIVATE_KEY }}
              run: |
                  if { [[ -n "$CLA_ID" && -z "$CLA_KEY" ]] || [[ -z "$CLA_ID" && -n "$CLA_KEY" ]]; }; then
                      echo "::error::CLA_BOT_APP_CLIENT_ID and CLA_BOT_APP_PRIVATE_KEY must be set together (or both unset)."
                      exit 1
                  fi

            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLA_BOT_APP_CLIENT_ID || secrets.BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLA_BOT_APP_PRIVATE_KEY || secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLA_BOT_APP_CLIENT_ID || secrets.BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLA_BOT_APP_PRIVATE_KEY || secrets.BOT_APP_PRIVATE_KEY }}

            - name: CLA check
              uses: CLDMV/.github/.github/actions/community/jobs/cla-check@v4
              with:
                  cla_version: ${{ inputs.cla_version }}
                  cla_path: ${{ inputs.cla_path }}
                  exempt_users: ${{ inputs.exempt_users }}
                  exempt_org_members: ${{ inputs.exempt_org_members }}
                  exempt_org: ${{ inputs.exempt_org }}
                  required_text_template: ${{ inputs.required_text_template }}
                  ledger_repo: ${{ inputs.ledger_repo }}
                  ledger_platform: ${{ inputs.ledger_platform }}
                  public_cla_url_template: ${{ inputs.public_cla_url_template }}
                  github_token: ${{ steps.app-token.outputs.token }}

    record:
        # Runs on issue_comment events — no git checkout needed since the
        # record action writes to the ledger repo via the Contents API.
        if: github.event_name == 'issue_comment' && github.event.action == 'created'
        runs-on: ubuntu-latest
        steps:
            - name: Validate CLA bot credentials are paired
              shell: bash
              env:
                  CLA_ID: ${{ secrets.CLA_BOT_APP_CLIENT_ID }}
                  CLA_KEY: ${{ secrets.CLA_BOT_APP_PRIVATE_KEY }}
              run: |
                  if { [[ -n "$CLA_ID" && -z "$CLA_KEY" ]] || [[ -z "$CLA_ID" && -n "$CLA_KEY" ]]; }; then
                      echo "::error::CLA_BOT_APP_CLIENT_ID and CLA_BOT_APP_PRIVATE_KEY must be set together (or both unset)."
                      exit 1
                  fi

            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLA_BOT_APP_CLIENT_ID || secrets.BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLA_BOT_APP_PRIVATE_KEY || secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLA_BOT_APP_CLIENT_ID || secrets.BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLA_BOT_APP_PRIVATE_KEY || secrets.BOT_APP_PRIVATE_KEY }}

            - name: CLA record
              uses: CLDMV/.github/.github/actions/community/jobs/cla-record@v4
              with:
                  cla_version: ${{ inputs.cla_version }}
                  cla_path: ${{ inputs.cla_path }}
                  required_text_template: ${{ inputs.required_text_template }}
                  ledger_repo: ${{ inputs.ledger_repo }}
                  ledger_platform: ${{ inputs.ledger_platform }}
                  github_token: ${{ steps.app-token.outputs.token }}
              env:
                  TAGGER_NAME: ${{ secrets.TAGGER_NAME }}
                  TAGGER_EMAIL: ${{ secrets.TAGGER_EMAIL }}
