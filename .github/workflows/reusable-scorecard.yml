# OpenSSF Scorecard (org-level, reusable).
#
# Scans the repo against ~18 security best-practice checks (branch protection,
# signed releases, dependency update tooling, no binary artifacts in repo,
# etc.) and emits a 0-10 score + SARIF. The marketplace action is OpenSSF's own
# research output; reimplementing it would mean re-deriving an external
# project, so we wrap it.
#
# Centralizing it here is the whole point: the SHA-pinned scorecard-action
# version lives in ONE place instead of being copied into every consumer's
# workflow, where it drifts (a bogus `@v3.4.0` that never existed is exactly
# how that drift surfaces). Consumers call this at `@v4` and inherit version
# bumps automatically.
#
# Triggers (branch_protection_rule / schedule / push to default) stay in the
# CALLER, per OpenSSF's recommended setup.
name: 🔬 OpenSSF Scorecard (Org-Level)

on:
    workflow_call:
        inputs:
            publish_results:
                # NOTE: publishing uses OIDC (id-token). When a job runs inside
                # a reusable workflow, the OIDC token's `job_workflow_ref` claim
                # resolves to THIS file's ref, not the caller's. Scorecard's
                # publish step accepts that, but verify the public badge still
                # updates after adopting the reusable. These two modes are
                # mutually exclusive, not independently toggleable: true = public
                # badge, no SARIF-to-Security-tab upload (scorecard-action's
                # publish step rejects submission from a security-events: write
                # token). false = SARIF-to-Security-tab upload instead (caller
                # must grant security-events: write itself), no public badge.
                description: "Publish results to the OpenSSF transparency log (powers the public Scorecard badge). Requires id-token: write on the caller. Mutually exclusive with SARIF-to-Security-tab upload — see the permissions note below."
                required: false
                type: boolean
                default: true
            sarif_category:
                description: "SARIF category for Code-Scanning grouping"
                required: false
                type: string
                default: "scorecard"

# NOTE: security-events: write is deliberately NOT declared here. GitHub Actions
# hard-fails a reusable workflow's run at startup (zero jobs created, conclusion
# startup_failure) if this file's own top-level `permissions:` requests something
# the caller doesn't grant — it doesn't silently downgrade for this kind of static
# workflow-level declaration. scorecard-action's publish step (fired when
# publish_results: true, the default) independently REJECTS submission from any
# workflow whose token has security-events: write — see
# https://github.com/ossf/scorecard-action#workflow-restrictions. Those two facts
# make a static, unconditional security-events: write requirement here
# incompatible with the default (public-badge) use case for every caller. Omitting
# the block entirely means this workflow's jobs simply inherit whatever the caller
# grants — no static ceiling to violate either way.
permissions:
    id-token: write # publish to OpenSSF transparency log
    contents: read
    actions: read

jobs:
    analyze:
        name: "🔬 Scorecard Analysis"
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              # OSSF Scorecard's publish step verifies the analysis job and
              # allows only a fixed set of steps; a custom composite action (our
              # checkout-code) trips "job has unallowed step" -> publish HTTP 400.
              # Use actions/checkout directly here.
              uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Run Scorecard
              # SHA-pinned to v2.4.3 (published 2025-09-30). There is no v3.x;
              # the action has never released past v2.4.x — a mistaken `@v3.4.0`
              # fails to resolve at runtime. SHA-pin (not the mutable tag)
              # matches the posture for other third-party security actions here
              # (trivy). Re-verify against
              # https://github.com/ossf/scorecard-action/releases before bumping.
              uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
              with:
                  results_file: results.sarif
                  results_format: sarif
                  publish_results: ${{ inputs.publish_results }}

            # Mutually exclusive with the public-badge publish above (see the
            # permissions note): only attempt this when the caller opted OUT of
            # publish_results, since only then might the caller have granted
            # security-events: write. Callers wanting SARIF-to-Security-tab
            # upload must set publish_results: false AND grant security-events:
            # write themselves — this workflow no longer requests it for them.
            - name: Upload SARIF
              if: ${{ !inputs.publish_results }}
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: results.sarif
                  category: ${{ inputs.sarif_category }}
