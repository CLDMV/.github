# CLDMV/.github/.github/workflows/release.yml
name: 🚀 Release Workflow (Org-Level)

on:
    workflow_call:
        inputs:
            package_name:
                required: true
                type: string
                description: "NPM package name (e.g., @cldmv/slothlet)"
            debug:
                required: false
                type: boolean
                default: false
                description: "Enable debug logging for troubleshooting"
            dry_run:
                required: false
                type: boolean
                default: false
                description: "Dry run mode - validate everything but don't create PR or make changes"
            node_version:
                required: false
                type: string
                default: "lts/*"
                description: "Node.js version to use (default: lts/*)"
            min_node_version:
                required: false
                type: string
                default: "20"
                description: "Minimum Node.js version for matrix testing (default: 20, oldest non-EOL)"
            max_node_major:
                required: false
                type: string
                default: "22"
                description: "Override max Node.js major version (default: 22)"
            package_manager:
                required: false
                type: string
                default: "npm"
                description: "Package manager (npm or yarn)"
            test_command:
                required: false
                type: string
                default: "npm test"
                description: "Command to run tests"
            build_command:
                required: false
                type: string
                default: "npm run build:ci"
                description: "Command to build package"
            version_bump:
                required: false
                type: string
                default: ""
                description: "Type of version bump (major, minor, patch). Leave empty for auto-detection from commit message."
            # Optional release parameters
            version:
                required: false
                type: string
                default: ""
                description: "Specific version for release (auto-calculated if not provided)"
            is_prerelease:
                required: false
                type: boolean
                default: false
                description: "Whether this is a prerelease"
            release_source_only:
                required: false
                type: boolean
                default: false
                description: "Whether to create source-only release (no package assets)"
            create_documentation:
                required: false
                type: boolean
                default: true
                description: "Whether to create/update VERSION_TAGS.md"
            # Test control options
            skip_performance_tests:
                required: false
                type: boolean
                default: false
                description: "Skip performance tests during CI"
            skip_matrix_tests:
                required: false
                type: boolean
                default: false
                description: "Skip matrix testing (use single node version only)"
            test_environment:
                required: false
                type: string
                default: "development"
                description: "Environment for tests (affects NODE_ENV and NODE_OPTIONS --conditions flag)"
            # Bot signing parameters
            use_gpg:
                required: false
                type: boolean
                default: false
                description: "If true, forward provided secrets to enable GPG signing"
        outputs:
            release-pr-created:
                description: "Whether a release PR was created"
                value: ${{ jobs.release.outputs.pr-created }}
            release-pr-number:
                description: "The release PR number if created"
                value: ${{ jobs.release.outputs.pr-number }}
            new-version:
                description: "The new version that was set"
                value: ${{ jobs.release.outputs.new-version }}

        secrets:
            NPM_TOKEN:
                description: "NPM token for publishing packages"
                required: false
            BOT_APP_CLIENT_ID:
                description: "GitHub App Client ID for CLDMV bot"
                required: false
            BOT_APP_PRIVATE_KEY:
                description: "GitHub App private key for CLDMV bot"
                required: false
            TAGGER_NAME:
                description: "GPG tagger name for signing"
                required: false
            TAGGER_EMAIL:
                description: "GPG tagger email for signing"
                required: false
            GPG_PRIVATE_KEY:
                description: "ASCII-armored private key for signing"
                required: false
            GPG_PASSPHRASE:
                description: "Passphrase for the private key (if protected)"
                required: false

jobs:
    check-existing-pr:
        name: "🔍 Check for Existing PR"
        runs-on: ubuntu-latest
        outputs:
            pr-exists: ${{ steps.check.outputs.pr-exists }}
            pr-number: ${{ steps.check.outputs.pr-number }}
            should-skip: ${{ steps.check.outputs.should-skip }}
        steps:
            - name: Check for existing release PR
              id: check
              uses: CLDMV/.github/.github/actions/github/steps/check-existing-pr@v1
              with:
                  github-token: ${{ github.token }}
                  head-branch: ${{ github.ref_name }}
                  base-branch: ${{ github.event.repository.default_branch }}

    detect-release:
        name: "🔍 Detect Release"
        if: needs.check-existing-pr.outputs.should-skip == 'false'
        needs: check-existing-pr
        runs-on: ubuntu-latest
        outputs:
            should-release: ${{ steps.check.outputs.should-create-pr }}
            version-bump: ${{ steps.check.outputs.version-bump }}
            has-breaking: ${{ steps.check.outputs.has-breaking }}
        steps:
            - name: Checkout code
              uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v1
              with:
                  fetch-depth: 0

            - name: Check Release Commit
              id: check
              uses: CLDMV/.github/.github/actions/git/steps/check-release-commit@v1
              env:
                  DEBUG: ${{ inputs.debug || 'true' }}

    update-existing-pr:
        name: "📝 Update Existing PR"
        if: needs.check-existing-pr.outputs.should-skip == 'true'
        needs: check-existing-pr
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v1
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: CLDMV/.github/.github/actions/common/steps/setup-node@v1

            - name: Check release commit type
              id: release-check
              uses: CLDMV/.github/.github/actions/git/steps/check-release-commit@v1
              env:
                  DEBUG: ${{ inputs.debug || 'true' }}

            - name: Get base version from branch divergence point
              id: base-version
              shell: bash
              run: |
                  mkdir -p tmp
                  MERGE_BASE=$(git merge-base HEAD origin/master 2>/dev/null || git merge-base HEAD origin/main 2>/dev/null)
                  git show "$MERGE_BASE:package.json" > tmp/base-package.json
                  BASE_VERSION=$(node -p "require('./tmp/base-package.json').version")
                  echo "base-version=$BASE_VERSION" >> $GITHUB_OUTPUT
                  echo "📦 Base version at divergence point: $BASE_VERSION"

            - name: Calculate new version
              id: version
              uses: CLDMV/.github/.github/actions/npm/steps/calculate-version@v1
              with:
                  version-bump: ${{ steps.release-check.outputs.version-bump }}
                  explicit-version: ${{ steps.release-check.outputs.explicit-version }}
                  base-version: ${{ steps.base-version.outputs.base-version }}

            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v1
              with:
                  client_id: ${{ secrets.BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            - name: Install dependencies
              uses: CLDMV/.github/.github/actions/npm/steps/install-dependencies@v1
              with:
                  package-manager: ${{ inputs.package_manager }}

            - name: Build package
              uses: CLDMV/.github/.github/actions/common/steps/build-project@v1
              with:
                  build-command: ${{ inputs.build_command }}
                  environment: production

            - name: Update package version
              uses: CLDMV/.github/.github/actions/npm/steps/update-package-version@v1
              with:
                  new-version: ${{ steps.version.outputs.new-version }}
                  package-manager: ${{ inputs.package_manager }}

            - name: Restore src/ deleted by build
              shell: bash
              run: |
                  if git ls-files --deleted -- src/ | grep -q .; then
                    echo "🔄 Restoring src/ deleted by build step..."
                    git checkout HEAD -- src/
                    echo "✅ src/ restored"
                  else
                    echo "ℹ️ No src/ deletions detected — skipping restore"
                  fi

            - name: Create signed commit
              uses: CLDMV/.github/.github/actions/github/api/commit@v1
              with:
                  commit-message: "chore: bump version to ${{ steps.version.outputs.new-version }}"
                  github-token: ${{ steps.app-token.outputs.token }}

            - name: Get PR commit range
              id: get-pr-range
              shell: bash
              env:
                  GITHUB_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ needs.check-existing-pr.outputs.pr-number }}
              run: |
                  # Get the repository info
                  REPO_OWNER="${{ github.repository_owner }}"
                  REPO_NAME="${{ github.event.repository.name }}"

                  # Get current PR details
                  CURRENT_PR=$(gh api repos/$REPO_OWNER/$REPO_NAME/pulls/$PR_NUMBER)

                  # Get the base branch and commit from the PR
                  BASE_SHA=$(echo "$CURRENT_PR" | jq -r '.base.sha')
                  HEAD_SHA=$(echo "$CURRENT_PR" | jq -r '.head.sha')

                  # Create commit range
                  COMMIT_RANGE="${BASE_SHA}..${HEAD_SHA}"
                  echo "commit-range=${COMMIT_RANGE}" >> $GITHUB_OUTPUT
                  echo "🔍 Using commit range: ${COMMIT_RANGE}"

            - name: Generate updated changelog
              id: changelog
              uses: CLDMV/.github/.github/actions/git/steps/generate-comprehensive-changelog@v1
              with:
                  commit-range: ${{ steps.get-pr-range.outputs.commit-range }}

            - name: Update PR title and description
              shell: bash
              env:
                  GITHUB_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ needs.check-existing-pr.outputs.pr-number }}
                  CHANGELOG_CONTENT: ${{ steps.changelog.outputs.changelog-content }}
                  NEW_VERSION: ${{ steps.version.outputs.new-version }}
              run: |
                  echo "📝 Updating PR #$PR_NUMBER title and description..."

                  # Get the repository info
                  REPO_OWNER="${{ github.repository_owner }}"
                  REPO_NAME="${{ github.event.repository.name }}"
                                    TMP_DIR="tmp/pr-update"
                                    mkdir -p "$TMP_DIR"

                                    # Get the generated changelog from env and write to file safely
                                    printf "%s\n" "$CHANGELOG_CONTENT" > "$TMP_DIR/changelog.md"

                                    if [ ! -s "$TMP_DIR/changelog.md" ]; then
                                        echo "⚠️ No changelog generated, using fallback message"
                                        printf "%s\n" \
                                            "## 🚀 What's Changed" \
                                            "" \
                                            "_Changelog generation in progress. The PR has been updated with the latest commits._" \
                                            "" \
                                            "Please check the commit history for details of the changes included in this release." \
                                            > "$TMP_DIR/changelog.md"
                  fi

                  # Update the PR title and description
                  echo "📝 Updating PR title to: release: v${NEW_VERSION}"
                                    jq -n --rawfile body "$TMP_DIR/changelog.md" --arg title "release: v${NEW_VERSION}" \
                                        '{title: $title, body: $body}' > "$TMP_DIR/pr-patch.json"

                  gh api repos/$REPO_OWNER/$REPO_NAME/pulls/$PR_NUMBER \
                    --method PATCH \
                                        --input "$TMP_DIR/pr-patch.json"

                  echo "✅ PR #$PR_NUMBER has been updated with title 'release: v${NEW_VERSION}' and latest changelog"
                  echo "ℹ️ Skipped full release workflow since PR already exists"

            - name: Sync PR labels
              shell: bash
              env:
                  GITHUB_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ needs.check-existing-pr.outputs.pr-number }}
                  BUMP_TYPE: ${{ steps.release-check.outputs.version-bump }}
              run: |
                  REPO_OWNER="${{ github.repository_owner }}"
                  REPO_NAME="${{ github.event.repository.name }}"
                  LABELS="release,${BUMP_TYPE}"
                  [ "$BUMP_TYPE" = "patch" ] && LABELS="${LABELS},bug"
                  echo "🏷️ Syncing labels: ${LABELS}"
                  LABELS_JSON=$(echo "$LABELS" | tr ',' '\n' | jq -R . | jq -s .)
                  gh api repos/$REPO_OWNER/$REPO_NAME/issues/$PR_NUMBER/labels \
                    --method PUT \
                    --input <(echo "{\"labels\": $LABELS_JSON}")
                  echo "✅ Labels synced: ${LABELS}"

    build-and-test:
        name: "🏗️ Build and Test"
        if: needs.check-existing-pr.outputs.should-skip == 'false' && needs.detect-release.outputs.should-release == 'true'
        needs: [check-existing-pr, detect-release]
        uses: CLDMV/.github/.github/workflows/reusable-build-and-test.yml@v1
        with:
            package_name: ${{ inputs.package_name }}
            debug: ${{ inputs.debug }}
            run_build_and_test: true
            node_version: ${{ inputs.node_version }}
            min_node_version: ${{ inputs.min_node_version }}
            max_node_major: ${{ inputs.max_node_major }}
            package_manager: ${{ inputs.package_manager }}
            test_command: ${{ inputs.test_command }}
            build_command: ${{ inputs.build_command }}
            skip_performance_tests: ${{ inputs.skip_performance_tests }}
            skip_matrix_tests: ${{ inputs.skip_matrix_tests }}
            test_environment: ${{ inputs.test_environment }}

    release:
        name: "🚀 Release Management"
        if: needs.check-existing-pr.outputs.should-skip == 'false' && needs.detect-release.outputs.should-release == 'true'
        needs: [check-existing-pr, detect-release, build-and-test]
        uses: CLDMV/.github/.github/workflows/reusable-release-management.yml@v1
        with:
            package_name: ${{ inputs.package_name }}
            debug: ${{ inputs.debug }}
            dry_run: ${{ inputs.dry_run }}
            # Job control flags - only run create release PR since we already detected
            run_detect_release: false
            run_create_release_pr: true
            # Build parameters
            node_version: ${{ inputs.node_version }}
            package_manager: ${{ inputs.package_manager }}
            version_bump: ${{ needs.detect-release.outputs.version-bump }}
            version: ${{ inputs.version }}
        secrets:
            BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

    summary:
        name: "📋 Release Summary"
        needs:
            [
                check-existing-pr,
                detect-release,
                update-existing-pr,
                build-and-test,
                release,
            ]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Generate Release Summary
              run: |
                  if [ "${{ inputs.dry_run }}" = "true" ]; then
                    echo "## 🧪 Dry Run - Release Workflow Validation" >> $GITHUB_STEP_SUMMARY
                  else
                    echo "## 🚀 Release Workflow Summary" >> $GITHUB_STEP_SUMMARY
                  fi
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**Package**: \`${{ inputs.package_name }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  # Check if PR was updated (existing PR path)
                  if [ "${{ needs.update-existing-pr.result }}" = "success" ]; then
                    echo "✅ **Overall Status**: Existing release PR updated successfully" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "**PR Number**: [#${{ needs.check-existing-pr.outputs.pr-number }}](${{ github.server_url }}/${{ github.repository }}/pull/${{ needs.check-existing-pr.outputs.pr-number }})" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "📝 **Updated**: The PR description has been updated with the latest commits and changelog." >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "🔄 **Next Steps**: Review the updated PR and merge when ready to publish the package." >> $GITHUB_STEP_SUMMARY
                  # Check if release was detected
                  elif [ "${{ needs.detect-release.outputs.should-release }}" != "true" ]; then
                    echo "ℹ️ **Overall Status**: No release needed" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "This commit was not detected as a release trigger." >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "**Automatic release detection:** The workflow detects conventional commits (\`feat:\`, \`fix:\`, breaking changes) and creates release PRs automatically." >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "**Manual release:** Use \`release:\` or \`release!:\` prefix to explicitly trigger releases with custom versioning." >> $GITHUB_STEP_SUMMARY
                  elif [ "${{ needs.release.result }}" = "success" ]; then
                    if [ "${{ needs.release.outputs.pr-created }}" = "true" ]; then
                      if [ "${{ inputs.dry_run }}" = "true" ]; then
                        echo "✅ **Overall Status**: Dry run validation successful" >> $GITHUB_STEP_SUMMARY
                        echo "" >> $GITHUB_STEP_SUMMARY
                        echo "**New Version**: \`${{ needs.release.outputs.new-version }}\`" >> $GITHUB_STEP_SUMMARY
                        echo "" >> $GITHUB_STEP_SUMMARY
                        echo "🧪 **Dry Run Complete**: All validations passed! No changes were made." >> $GITHUB_STEP_SUMMARY
                        echo "" >> $GITHUB_STEP_SUMMARY
                        echo "### ✅ Validation Results:" >> $GITHUB_STEP_SUMMARY
                        echo "- Release commit detected successfully" >> $GITHUB_STEP_SUMMARY
                        echo "- Version calculation completed" >> $GITHUB_STEP_SUMMARY
                        echo "- Build and tests passed" >> $GITHUB_STEP_SUMMARY
                        echo "- Changelog generation successful" >> $GITHUB_STEP_SUMMARY
                        echo "- All prerequisites met for release PR creation" >> $GITHUB_STEP_SUMMARY
                        echo "" >> $GITHUB_STEP_SUMMARY
                        echo "🚀 **Ready to Release**: Re-run with \`dry_run: false\` to create the actual release PR." >> $GITHUB_STEP_SUMMARY
                      else
                        echo "✅ **Overall Status**: Release PR created successfully" >> $GITHUB_STEP_SUMMARY
                        echo "" >> $GITHUB_STEP_SUMMARY
                        echo "**New Version**: \`${{ needs.release.outputs.new-version }}\`" >> $GITHUB_STEP_SUMMARY
                        echo "**PR Number**: [#${{ needs.release.outputs.pr-number }}](${{ github.server_url }}/${{ github.repository }}/pull/${{ needs.release.outputs.pr-number }})" >> $GITHUB_STEP_SUMMARY
                        echo "" >> $GITHUB_STEP_SUMMARY
                        echo "🔄 **Next Steps**: Review and merge the release PR to publish the package." >> $GITHUB_STEP_SUMMARY
                      fi
                    else
                      echo "ℹ️ **Overall Status**: No release PR created" >> $GITHUB_STEP_SUMMARY
                      echo "" >> $GITHUB_STEP_SUMMARY
                      echo "Release was detected but no PR was created." >> $GITHUB_STEP_SUMMARY
                    fi
                  else
                    echo "❌ **Overall Status**: Release workflow failed" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "Check the detailed progress above and workflow logs for specific failure details." >> $GITHUB_STEP_SUMMARY
                  fi
