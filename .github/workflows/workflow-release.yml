# CLDMV/.github/.github/workflows/release.yml
name: 🚀 Release Workflow (Org-Level)

on:
    workflow_call:
        inputs:
            package_name:
                required: true
                type: string
                description: "NPM package name (e.g., @cldmv/slothlet)"
            debug:
                required: false
                type: boolean
                default: false
                description: "Enable debug logging for troubleshooting"
            dry_run:
                required: false
                type: boolean
                default: false
                description: "Dry run mode - validate everything but don't create PR or make changes"
            node_version:
                required: false
                type: string
                default: "lts/*"
                description: "Node.js version to use (default: lts/*)"
            min_node_version:
                required: false
                type: string
                default: "20"
                description: "Minimum Node.js version for matrix testing (default: 20, oldest non-EOL)"
            max_node_major:
                required: false
                type: string
                default: "22"
                description: "Override max Node.js major version (default: 22)"
            lts_only_matrix:
                required: false
                type: boolean
                default: true
                description: "Only include even-numbered (LTS) Node.js majors in the test matrix. Required when deps declare engines that exclude odd-numbered releases (e.g. rolldown)."
            package_manager:
                required: false
                type: string
                default: "npm"
                description: "Package manager (npm or yarn)"
            test_command:
                required: false
                type: string
                default: "npm test"
                description: "Command to run tests"
            build_command:
                required: false
                type: string
                default: "npm run build:ci"
                description: "Command to build package"
            version_bump:
                required: false
                type: string
                default: ""
                description: "Type of version bump (major, minor, patch). Leave empty for auto-detection from commit message."
            # Optional release parameters
            version:
                required: false
                type: string
                default: ""
                description: "Specific version for release (auto-calculated if not provided)"
            is_prerelease:
                required: false
                type: boolean
                default: false
                description: "Whether this is a prerelease"
            release_source_only:
                required: false
                type: boolean
                default: false
                description: "Whether to create source-only release (no package assets)"
            create_documentation:
                required: false
                type: boolean
                default: true
                description: "Whether to create/update VERSION_TAGS.md"
            # Test control options
            skip_performance_tests:
                required: false
                type: boolean
                default: false
                description: "Skip performance tests during CI"
            skip_matrix_tests:
                required: false
                type: boolean
                default: false
                description: "Skip matrix testing (use single node version only)"
            test_environment:
                required: false
                type: string
                default: "development"
                description: "Environment for tests (affects NODE_ENV and NODE_OPTIONS --conditions flag)"
            # Bot signing parameters
            use_gpg:
                required: false
                type: boolean
                default: false
                description: "If true, forward provided secrets to enable GPG signing"
        outputs:
            release-pr-created:
                description: "Whether a release PR was created"
                value: ${{ jobs.release.outputs.pr-created }}
            release-pr-number:
                description: "The release PR number if created"
                value: ${{ jobs.release.outputs.pr-number }}
            new-version:
                description: "The new version that was set"
                value: ${{ jobs.release.outputs.new-version }}

        secrets:
            NPM_TOKEN:
                description: "NPM token for publishing packages"
                required: false
            BOT_APP_CLIENT_ID:
                description: "GitHub App Client ID for CLDMV bot"
                required: false
            BOT_APP_ID:
                description: "[DEPRECATED] Use BOT_APP_CLIENT_ID instead"
                required: false
            BOT_APP_PRIVATE_KEY:
                description: "GitHub App private key for CLDMV bot"
                required: false
            TAGGER_NAME:
                description: "GPG tagger name for signing"
                required: false
            TAGGER_EMAIL:
                description: "GPG tagger email for signing"
                required: false
            GPG_PRIVATE_KEY:
                description: "ASCII-armored private key for signing"
                required: false
            GPG_PASSPHRASE:
                description: "Passphrase for the private key (if protected)"
                required: false

jobs:
    check-existing-pr:
        name: "🔍 Check for Existing PR"
        runs-on: ubuntu-latest
        outputs:
            pr-exists: ${{ steps.check.outputs.pr-exists }}
            pr-number: ${{ steps.check.outputs.pr-number }}
            should-skip: ${{ steps.check.outputs.should-skip }}
        steps:
            - name: Check for existing release PR
              id: check
              uses: CLDMV/.github/.github/actions/github/steps/check-existing-pr@v4
              with:
                  github-token: ${{ github.token }}
                  head-branch: ${{ github.ref_name }}
                  base-branch: ${{ github.event.repository.default_branch }}

    detect-release:
        name: "🔍 Detect Release"
        if: needs.check-existing-pr.outputs.should-skip == 'false'
        needs: check-existing-pr
        runs-on: ubuntu-latest
        outputs:
            should-release: ${{ steps.check.outputs.should-create-pr }}
            version-bump: ${{ steps.check.outputs.version-bump }}
            has-breaking: ${{ steps.check.outputs.has-breaking }}
        steps:
            - name: Checkout code
              uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v4
              with:
                  fetch-depth: 0

            - name: Check Release Commit
              id: check
              uses: CLDMV/.github/.github/actions/git/steps/check-release-commit@v4
              env:
                  DEBUG: ${{ inputs.debug || 'true' }}

    update-existing-pr:
        name: "📝 Update Existing PR"
        if: needs.check-existing-pr.outputs.should-skip == 'true'
        needs: check-existing-pr
        runs-on: ubuntu-latest
        steps:
            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.BOT_APP_CLIENT_ID || secrets.BOT_APP_ID }}
                  private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID || secrets.BOT_APP_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            # Refresh logic lives in the update-release-pr composite action so
            # it can be reused by workflow-sync-open-release-prs.yml (fan-out
            # from master merges) without duplication. P3.2.
            - name: Refresh release PR
              uses: CLDMV/.github/.github/actions/github/jobs/update-release-pr@v4
              with:
                  head-ref: ${{ github.ref_name }}
                  pr-number: ${{ needs.check-existing-pr.outputs.pr-number }}
                  package-name: ${{ inputs.package_name }}
                  package-manager: ${{ inputs.package_manager }}
                  build-command: ${{ inputs.build_command }}
                  node-version: ${{ inputs.node_version }}
                  github-token: ${{ steps.app-token.outputs.token }}
                  debug: ${{ inputs.debug && 'true' || 'false' }}

    build-and-test:
        name: "🏗️ Build and Test"
        if: needs.check-existing-pr.outputs.should-skip == 'false' && needs.detect-release.outputs.should-release == 'true'
        needs: [check-existing-pr, detect-release]
        uses: CLDMV/.github/.github/workflows/reusable-build-and-test.yml@v4
        with:
            package_name: ${{ inputs.package_name }}
            debug: ${{ inputs.debug }}
            run_build_and_test: true
            node_version: ${{ inputs.node_version }}
            min_node_version: ${{ inputs.min_node_version }}
            max_node_major: ${{ inputs.max_node_major }}
            lts_only_matrix: ${{ inputs.lts_only_matrix }}
            package_manager: ${{ inputs.package_manager }}
            test_command: ${{ inputs.test_command }}
            build_command: ${{ inputs.build_command }}
            skip_performance_tests: ${{ inputs.skip_performance_tests }}
            skip_matrix_tests: ${{ inputs.skip_matrix_tests }}
            test_environment: ${{ inputs.test_environment }}

    release:
        name: "🚀 Release Management"
        if: needs.check-existing-pr.outputs.should-skip == 'false' && needs.detect-release.outputs.should-release == 'true'
        needs: [check-existing-pr, detect-release, build-and-test]
        uses: CLDMV/.github/.github/workflows/reusable-release-management.yml@v4
        with:
            package_name: ${{ inputs.package_name }}
            debug: ${{ inputs.debug }}
            dry_run: ${{ inputs.dry_run }}
            # Job control flags - only run create release PR since we already detected
            run_detect_release: false
            run_create_release_pr: true
            # Build parameters
            node_version: ${{ inputs.node_version }}
            package_manager: ${{ inputs.package_manager }}
            build_command: ${{ inputs.build_command }}
            version_bump: ${{ needs.detect-release.outputs.version-bump }}
            version: ${{ inputs.version }}
        secrets:
            BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

    summary:
        name: "📋 Release Summary"
        needs:
            [
                check-existing-pr,
                detect-release,
                update-existing-pr,
                build-and-test,
                release,
            ]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Generate Release Summary
              uses: CLDMV/.github/.github/actions/workflows/release-summary@v4
              with:
                  dry-run: ${{ inputs.dry_run }}
                  package-name: ${{ inputs.package_name }}
                  update-existing-pr-result: ${{ needs.update-existing-pr.result }}
                  existing-pr-number: ${{ needs.check-existing-pr.outputs.pr-number }}
                  should-release: ${{ needs.detect-release.outputs.should-release }}
                  release-result: ${{ needs.release.result }}
                  release-pr-created: ${{ needs.release.outputs.pr-created }}
                  release-new-version: ${{ needs.release.outputs.new-version }}
                  release-pr-number: ${{ needs.release.outputs.pr-number }}
                  server-url: ${{ github.server_url }}
                  repository: ${{ github.repository }}
