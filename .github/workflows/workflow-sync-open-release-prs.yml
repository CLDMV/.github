# Sync open release PRs (org-level, reusable).
#
# Triggered by consumer repos on `pull_request: closed && merged == true`
# against the default branch. Enumerates open release PRs and re-runs the
# update-release-pr action against each so they reflect the latest master
# state — re-calculating the version bump, regenerating the changelog, and
# force-pushing the new version-bump commit.
#
# Companion to P3.1 (calculate-version uses current master, not merge-base).
# Without this fan-out, a release PR that gets no new pushes between sibling
# merges still carries stale data; this closes that gap.
name: 🔄 Sync Open Release PRs (Org-Level)

on:
    workflow_call:
        inputs:
            package_name:
                required: true
                type: string
                description: "NPM package name (e.g., @cldmv/slothlet)"
            package_manager:
                required: false
                type: string
                default: "npm"
                description: "Package manager (npm or yarn)"
            build_command:
                required: false
                type: string
                default: "npm run build:ci"
                description: "Command to build the package"
            node_version:
                required: false
                type: string
                default: "lts/*"
                description: "Node.js version to use"
            pr_title_pattern:
                required: false
                type: string
                # Match both the bare form and the suffixed form:
                #   release: v3.2.1
                #   release: v3.2.1 - <descriptive subject from check-release-commit>
                # The original anchored '$' broke discovery after title-suffix
                # landed — every release PR now carries the ' - <subject>' tail,
                # so the strict pattern matched zero PRs and sync-fan-out
                # silently did nothing.
                default: '^release: v\d+\.\d+\.\d+(?:$| - )'
                description: "Regex matching titles of PRs eligible for auto-sync. Accepts either 'release: vX.Y.Z' or 'release: vX.Y.Z - <subject>'."
            debug:
                required: false
                type: boolean
                default: false
                description: "Enable debug logging"
        secrets:
            BOT_APP_CLIENT_ID:
                required: true
                description: "GitHub App Client ID for CLDMV bot"
            BOT_APP_PRIVATE_KEY:
                required: true
                description: "GitHub App private key for CLDMV bot"

permissions:
    contents: write
    pull-requests: write

# Multiple rapid master merges should queue sync runs, not race or cancel
# each other. Each run re-enumerates the current set of open release PRs,
# so a queued run picks up any PRs that were created mid-flight.
concurrency:
    group: sync-release-prs-${{ github.repository }}
    cancel-in-progress: false

jobs:
    wait-for-tags:
        # Both enumerate and refresh resolve their `uses: ...@v3` refs at job
        # start. When THIS workflow fires from a release-PR merge, the
        # `🏷️ Update Major Version Tags` workflow fires in parallel. If our
        # downstream jobs resolve @v3 first, they pull the previous release's
        # action code — missing whatever fixes were just merged. (Direct
        # symptom seen Nov 2026: checkout-code's `ref:` input wasn't on @v3
        # yet, so update-release-pr's checkout fell through to github.ref =
        # master, found 0 commits in range, and silently never refreshed the
        # PR.) This gate polls @v3 until it points at the merge commit, then
        # releases the rest of the pipeline. If the merge wasn't a release
        # publish (no tag update fires), the poll times out and downstream
        # jobs proceed against whatever @v3 currently is — which is fine
        # because @v3 wouldn't have moved anyway.
        name: "⏳ Wait for @v3 to roll forward"
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Poll refs/tags/v3 until it matches the merge commit
              shell: bash
              env:
                  TARGET_SHA: ${{ github.sha }}
                  REPO: ${{ github.repository }}
              run: |
                  echo "🔍 Merge commit: $TARGET_SHA"
                  max_attempts=24   # 24 * 5s = 120s
                  sleep_seconds=5
                  for attempt in $(seq 1 $max_attempts); do
                      # Prefer the dereferenced ('^{}') line — annotated tags expose
                      # both their tag-object SHA and the underlying commit SHA.
                      v3_sha=$(git ls-remote "https://github.com/${REPO}.git" 'refs/tags/v3^{}' 2>/dev/null | awk '{print $1}')
                      if [ -z "$v3_sha" ]; then
                          # Lightweight tag: only one line, points straight to a commit.
                          v3_sha=$(git ls-remote "https://github.com/${REPO}.git" 'refs/tags/v3' 2>/dev/null | awk '{print $1}')
                      fi
                      echo "Attempt $attempt/$max_attempts: @v3 → ${v3_sha:-<not found>}"
                      if [ "$v3_sha" = "$TARGET_SHA" ]; then
                          echo "✅ @v3 matches the merge commit — safe to proceed"
                          exit 0
                      fi
                      [ "$attempt" -lt "$max_attempts" ] && sleep "$sleep_seconds"
                  done
                  # Non-release-PR merges never advance @v3. Don't fail — just
                  # log and proceed with whatever @v3 currently points at.
                  echo "⚠️ Timed out waiting for @v3 to roll forward (currently → ${v3_sha:-<not found>})"
                  echo "ℹ️ Proceeding anyway. If this merge isn't a release publish, that's expected;"
                  echo "   if it IS a release, Update Major Version Tags may still be running and"
                  echo "   downstream jobs may pick up stale action code."

    enumerate:
        name: "🔍 Find Open Release PRs"
        needs: wait-for-tags
        runs-on: ubuntu-latest
        outputs:
            release_prs: ${{ steps.list.outputs.prs }}
            count: ${{ steps.list.outputs.count }}
        steps:
            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v3
              with:
                  client_id: ${{ secrets.BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            - name: List open release PRs
              id: list
              uses: CLDMV/.github/.github/actions/github/api/list-release-prs@v3
              with:
                  title-pattern: ${{ inputs.pr_title_pattern }}
                  github-token: ${{ steps.app-token.outputs.token }}

    refresh:
        name: "🔄 Refresh PR #${{ matrix.pr.number }} (${{ matrix.pr.head_ref }})"
        needs: enumerate
        if: needs.enumerate.outputs.count != '0'
        runs-on: ubuntu-latest
        strategy:
            # One PR's refresh failing shouldn't block the others.
            fail-fast: false
            matrix:
                pr: ${{ fromJson(needs.enumerate.outputs.release_prs) }}
        steps:
            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v3
              with:
                  client_id: ${{ secrets.BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            - name: Refresh release PR
              uses: CLDMV/.github/.github/actions/github/jobs/update-release-pr@v3
              with:
                  head-ref: ${{ matrix.pr.head_ref }}
                  pr-number: ${{ matrix.pr.number }}
                  package-name: ${{ inputs.package_name }}
                  package-manager: ${{ inputs.package_manager }}
                  build-command: ${{ inputs.build_command }}
                  node-version: ${{ inputs.node_version }}
                  github-token: ${{ steps.app-token.outputs.token }}
                  debug: ${{ inputs.debug }}
