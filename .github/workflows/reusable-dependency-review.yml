# Dependency Review (org-level, reusable).
#
# At PR-time, flags new/changed deps + CVE matches from the GitHub Advisory
# Database. Comments a summary on the PR. Optional license-policy enforcement.
#
# Batch 2.2 from tmp/plan-future-workflows.md.
name: 🔒 Dependency Review (Org-Level)

on:
    workflow_call:
        inputs:
            fail_on_severity:
                description: "low | moderate | high | critical | none (informational)"
                required: false
                type: string
                default: "moderate"
            comment_summary:
                description: "Post a summary comment on the PR"
                required: false
                type: boolean
                default: true
            base_ref:
                description: "Base ref override; defaults to PR base"
                required: false
                type: string
                default: ""
            head_ref:
                description: "Head ref override; defaults to PR head"
                required: false
                type: string
                default: ""
            allow_licenses:
                description: "Comma-sep SPDX allowlist (mutually exclusive with deny_licenses)"
                required: false
                type: string
                default: ""
            deny_licenses:
                description: "Comma-sep SPDX denylist. Empty default since CLDMV is mixed-license."
                required: false
                type: string
                default: ""
            warn_on_openssf_scorecard_level:
                description: "Warn if a new dep has an OpenSSF Scorecard score below this. 0 = disable."
                required: false
                type: number
                default: 3
        secrets:
            # Optional. When provided, the PR-comment summary is attributed to
            # the consumer's bot App instead of github-actions[bot]. Falls back
            # to GITHUB_TOKEN via create-app-token's auto-detect.
            BOT_APP_CLIENT_ID:
                required: false
            BOT_APP_PRIVATE_KEY:
                required: false

permissions:
    contents: read
    pull-requests: write

jobs:
    review:
        name: "🔒 Dependency Review"
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v4

            # App token so the dependency-review comment is posted as the
            # consumer's bot instead of github-actions[bot]. Auto-falls back
            # to GITHUB_TOKEN when bot secrets are absent, preserving the
            # previous behavior for repos that haven't wired the App yet.
            - name: Create App token (falls back to GITHUB_TOKEN)
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            - name: Review dependencies
              uses: actions/dependency-review-action@v4.9.0
              with:
                  repo-token: ${{ steps.app-token.outputs.token }}
                  fail-on-severity: ${{ inputs.fail_on_severity }}
                  comment-summary-in-pr: ${{ inputs.comment_summary && 'always' || 'never' }}
                  base-ref: ${{ inputs.base_ref }}
                  head-ref: ${{ inputs.head_ref }}
                  allow-licenses: ${{ inputs.allow_licenses }}
                  deny-licenses: ${{ inputs.deny_licenses }}
                  warn-on-openssf-scorecard-level: ${{ inputs.warn_on_openssf_scorecard_level }}
