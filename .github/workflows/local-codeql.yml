# CodeQL SAST on THIS repo's Node-action code.
#
# This repo is JavaScript/TypeScript only, no build step, no native langs;
# we call github/codeql-action directly rather than going through the
# reusable-codeql.yml + parse-csv-list dance. Avoids the chicken-and-egg
# where the reusable would reference the org's own actions at a major tag
# that isn't published yet during a cut.
name: 🔍 Local CodeQL

on:
    push:
        branches: [master, main]
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]
        # Include the v4 integration branches so feature/hotfix PRs (which
        # target `next` or `hotfixes`, not master) actually trigger CodeQL.
        # Without `next`/`hotfixes` here, rulesets that require the CodeQL
        # check on those branches will sit on "waiting for results" forever.
        branches: [master, main, next, hotfixes]
    schedule:
        - cron: "37 14 * * 1" # weekly Monday 14:37 UTC
    workflow_dispatch:

permissions:
    security-events: write
    contents: read
    actions: read

# Opt in early to Node 24 for github/codeql-action/*@v3 (which still runs on
# Node 20). Silences the Node-20-deprecation warning until codeql-action v4
# ships in December 2026.
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
    group: local-codeql-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

jobs:
    analyze:
        name: "🔍 Analyze javascript-typescript"
        runs-on: ubuntu-latest
        # Run for:
        #   - non-PR events (push to master/main, schedule, workflow_dispatch)
        #   - fork PRs (SARIF upload fails with read-only token but workflow
        #     status reflects the analysis result; original optimization)
        #   - same-repo feature PRs targeting v4 integration branches
        #     (base_ref = next/hotfixes) — without this, rulesets that
        #     require the CodeQL check on those branches sit on "waiting
        #     for results" forever.
        #   - same-repo release PRs FROM v4 integration branches to master
        #     (head_ref = next/hotfixes, base_ref = master) — the persistent
        #     next/hotfixes → master PR's required-check needs CodeQL run
        #     on the release-PR head; without head_ref check it would also
        #     hang "waiting for results".
        if: >-
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.fork == true ||
            github.base_ref == 'next' ||
            github.base_ref == 'hotfixes' ||
            github.head_ref == 'next' ||
            github.head_ref == 'hotfixes'
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            # CodeQL init requires `config-file:` to point at a path INSIDE the
            # workspace (checked-out tree). Use the checked-in config file under
            # `.github/codeql/`.
            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                  languages: javascript-typescript
                  queries: security-extended,security-and-quality
                  config-file: .github/codeql/codeql-config.yml

            - name: Analyze
              uses: github/codeql-action/analyze@v3
              with:
                  category: "/language:javascript-typescript"
