# Local CI for THIS repo (CLDMV/.github) — validates that the Node-action
# code parses, YAML files load, and workflow expressions are well-formed.
# Catches the class of bugs we shipped in the v3 prep work (e.g. the
# nonexistent `split()` expression in reusable-codeql.yml).
#
# This is NOT a reusable; it runs on push/PR against this repo only.
#
# Failure surfacing:
# Each check writes a section to $GITHUB_STEP_SUMMARY so every failure is
# rendered on the run's summary page — no drill-into-step-logs required.
# Checks use `continue-on-error: true` so a single run reports ALL failures,
# and the final Summary step exits 1 if any check failed.
name: 🧪 Local CI

on:
    # Note: we deliberately do NOT use `paths:` / `paths-ignore:` at the trigger
    # level. Trigger-level filtering causes GitHub to skip the workflow entirely
    # for docs-only changes, which means the `Required PR Check` status never
    # posts and branch protection blocks the merge. Instead we always fire the
    # workflow and let the `paths-gate` job below decide whether the heavy
    # `validate` job runs — Required PR Check still posts green on docs-only
    # changes via the gate's `docs_only` output.
    push:
        branches-ignore: [badges, gh-pages]
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]
        # Include the v4 integration branches so:
        #   - feature PRs targeting next/hotfixes trigger CI
        #   - release PRs from next/hotfixes → master also trigger CI
        # (the latter's head SHA is a bot chore-bump that gets commit-gated
        # out on the push path; without pull_request coverage the required
        # check never posts.)
        branches: [master, main, next, hotfixes]
    workflow_dispatch:

permissions:
    contents: read
    pull-requests: read

concurrency:
    group: local-ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

jobs:
    # Decide whether this change is entirely covered by the docs-only ignore
    # list. Required PR Check uses the output to green-light docs PRs without
    # firing the heavy validate job. See `.github/actions/common/steps/paths-gate`.
    paths-gate:
        name: "🧭 Paths gate"
        runs-on: ubuntu-latest
        # Mirror the validate job's gating: skip on in-repo non-release PRs
        # (push on the head branch already ran for that SHA, so no Required
        # PR Check needs posting here).
        if: |
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.fork == true ||
            github.event.pull_request.head.ref == 'next' ||
            github.event.pull_request.head.ref == 'hotfixes'
        permissions:
            contents: read
            pull-requests: read
        outputs:
            docs_only: ${{ steps.gate.outputs.docs_only }}
        steps:
            # Required so `uses: ./...` below can resolve the action source —
            # without checkout the runner's workspace is empty and the step
            # fails with "Can't find 'action.yml'".
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 1
            - name: Decide docs-only
              id: gate
              # Relative path — the action is in this same repo and isn't on
              # the v4 tag yet during the PR that adds it. Once cut, external
              # callers via workflow-ci.yml use the v4 pin.
              uses: ./.github/actions/common/steps/paths-gate
              with:
                  paths_ignore: |
                      **.md
                      docs/**
                      *.md
                      LICENSE
                      .gitignore

    validate:
        name: "🧪 Validate workflows + actions"
        needs: paths-gate
        runs-on: ubuntu-latest
        # Run on pull_request when:
        #   - the PR is from a fork (push doesn't fire upstream)
        #   - the PR is a v4 release PR — head is next/hotfixes targeting
        #     master/main. Push-event CI on the head SHA is unreliable
        #     here because the bot's chore-bump commit gets gated out, so
        #     without this fallback the required check never posts.
        # Other (in-repo, non-release) PRs skip — push on the head branch
        # already ran CI for that SHA.
        # Skip when `paths-gate` says the change is docs-only — required-check
        # still posts green via its own docs_only check below.
        if: |
            needs.paths-gate.outputs.docs_only != 'true' && (
                github.event_name != 'pull_request' ||
                github.event.pull_request.head.repo.fork == true ||
                github.event.pull_request.head.ref == 'next' ||
                github.event.pull_request.head.ref == 'hotfixes'
            )
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 1

            - name: "Setup Node.js (matches `using: node24` runtime)"
              uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"

            - name: Node syntax check (every .mjs)
              id: node
              if: always()
              continue-on-error: true
              shell: bash
              run: |
                  fails=/tmp/node-fails.md
                  : > "$fails"
                  count=0
                  while IFS= read -r f; do
                      out=$(node --check "$f" 2>&1)
                      rc=$?
                      if [ $rc -ne 0 ]; then
                          echo "::error file=$f::Node syntax check failed"
                          echo "$out"
                          {
                              echo
                              echo "**\`$f\`**"
                              echo '```'
                              echo "$out"
                              echo '```'
                          } >> "$fails"
                          count=$((count + 1))
                      fi
                  done < <(find .github/actions scripts -name "*.mjs" 2>/dev/null)
                  if [ "$count" -eq 0 ]; then
                      echo "### ✅ Node syntax (\`node --check\`) — all .mjs files clean" >> "$GITHUB_STEP_SUMMARY"
                  else
                      {
                          echo "### ❌ Node syntax (\`node --check\`) — $count file(s) failed"
                          cat "$fails"
                      } >> "$GITHUB_STEP_SUMMARY"
                  fi
                  echo "count=$count" >> "$GITHUB_OUTPUT"
                  exit "$count"

            - name: YAML parse (every workflow + action.yml + config)
              id: yaml
              if: always()
              continue-on-error: true
              shell: bash
              run: |
                  python3 - <<'PY'
                  import os, sys, glob, yaml
                  patterns = [
                      ".github/workflows/*.yml",
                      ".github/actions/**/*.yml",
                      ".github/labeler.default.yml",
                      ".github/labeler.yml",
                      "examples/individual-repo-workflows/**/*.yml",
                  ]
                  fails = []
                  for pat in patterns:
                      for f in glob.glob(pat, recursive=True):
                          try:
                              yaml.safe_load(open(f))
                          except Exception as e:
                              print(f"::error file={f}::{e}")
                              fails.append((f, str(e)))
                  with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as s:
                      if not fails:
                          s.write("### ✅ YAML parse — every workflow + action.yml + config parsed cleanly\n")
                      else:
                          s.write(f"### ❌ YAML parse — {len(fails)} file(s) failed to parse\n")
                          for f, err in fails:
                              s.write(f"\n**`{f}`**\n```\n{err}\n```\n")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as o:
                      o.write(f"count={len(fails)}\n")
                  sys.exit(0 if not fails else 1)
                  PY

            - name: actionlint (catches split()-style expression bugs)
              id: actionlint
              if: always()
              continue-on-error: true
              shell: bash
              # Run actionlint as a downloaded binary (pinned to 1.7.7, matching
              # the previous docker action) so we can capture stdout into the
              # job summary. Annotations are still parsed by GitHub from the
              # default `file:line:col:` output format.
              run: |
                  set -e
                  # 1.7.12 is the first release to recognize `using: node24`.
                  url='https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz'
                  curl -sSL "$url" | tar -xzC /tmp actionlint
                  set +e
                  # Ignores:
                  #   SC2002: shellcheck UUOC noise; not a real issue.
                  #   create-github-app-token: actionlint 1.7.12's bundled metadata
                  #     for actions/create-github-app-token@v3 is stale — it treats
                  #     `app-id` as required and `client-id` as undefined, but the
                  #     upstream action.yml (https://github.com/actions/create-github-app-token/blob/v3/action.yml)
                  #     marks `app-id` deprecated and uses `client-id` as canonical.
                  out=$(/tmp/actionlint -no-color \
                      -ignore 'SC2002' \
                      -ignore 'actions/create-github-app-token@v3' \
                      2>&1)
                  rc=$?
                  echo "$out"
                  if [ "$rc" -eq 0 ]; then
                      echo "### ✅ actionlint — no findings" >> "$GITHUB_STEP_SUMMARY"
                      echo "count=0" >> "$GITHUB_OUTPUT"
                  else
                      lines=$(printf '%s\n' "$out" | grep -c '^[^[:space:]]')
                      {
                          echo "### ❌ actionlint — $lines line(s) of findings"
                          echo
                          echo '```'
                          printf '%s\n' "$out"
                          echo '```'
                      } >> "$GITHUB_STEP_SUMMARY"
                      echo "count=$lines" >> "$GITHUB_OUTPUT"
                      exit 1
                  fi

            - name: Validate action refs (input names + remote versions)
              id: actionrefs
              if: always()
              continue-on-error: true
              shell: bash
              # Custom validator (scripts/validate-action-refs.mjs) catches two
              # classes of bug that actionlint and YAML parse miss:
              #   1. Invalid input names passed to local composite actions
              #      (e.g. passing `ref:` to a wrapper that only accepts
              #      `fetch-depth`).
              #   2. Nonexistent remote action versions (e.g. pinning
              #      `aquasecurity/trivy-action@0.28.0` when no such tag
              #      exists). Also verifies 40-char SHA pins resolve to a
              #      real object on the remote.
              # Each finding is emitted as `::error file=...,line=...::` AND
              # appended to $GITHUB_STEP_SUMMARY by the script itself.
              run: |
                  node scripts/validate-action-refs.mjs
                  rc=$?
                  echo "count=$rc" >> "$GITHUB_OUTPUT"
                  exit "$rc"

            - name: Verify no stale internal @v2/@v3 refs remain
              id: stalerefs
              if: always()
              continue-on-error: true
              shell: bash
              run: |
                  # After the v4 cut, every INTERNAL ref to this org's own
                  # workflows/actions must be @v4. Flag anything still pinned at
                  # @v2 or @v3. Two internal ref shapes are matched:
                  #   - full:  uses: CLDMV/.github/.github/{workflows,actions}/…@vN
                  #   - short: <workflow|reusable|local>-NAME.yml@vN  (docs / guides)
                  # Third-party actions (github/*, actions/*, ossf/*, …) keep their
                  # own @v3 and are deliberately NOT matched — the patterns target
                  # CLDMV-internal refs only, so bare prose like "@v3 (legacy,
                  # frozen)" in the README / design docs is fine too.
                  # Exclusions (pathspec — historical or literal):
                  #   tmp/                            — gitignored planning material
                  #   .archive/                       — frozen pre-refactor workflow snapshots
                  #   docs/migration/, docs/changelogs/, CHANGELOG*  — historical refs
                  #   .github/workflows/local-ci.yml  — this file (holds the literal patterns)
                  # `|| true` is load-bearing: git grep exits 1 on no-matches
                  # (the success case), and bash's `set -eo pipefail` (Actions
                  # default) propagates that exit code through the assignment,
                  # killing the script before the if-check. Squash to 0 so the
                  # absence-of-matches doesn't masquerade as a failure.
                  out=$(git grep -nIE \
                      -e 'uses:[[:space:]]*CLDMV/\.github/[^[:space:]]*@v[23]\b' \
                      -e '(workflow|reusable|local)-[a-z0-9-]+\.yml@v[23]\b' \
                      -- ':!tmp/**' ':!.archive/**' ':!docs/migration/**' ':!docs/changelogs/**' \
                      ':!CHANGELOG*' ':!.github/workflows/local-ci.yml' \
                      || true)
                  if [ -z "$out" ]; then
                      echo "### ✅ No stale internal @v2/@v3 refs" >> "$GITHUB_STEP_SUMMARY"
                      echo "count=0" >> "$GITHUB_OUTPUT"
                  else
                      lines=$(printf '%s\n' "$out" | wc -l | tr -d ' ')
                      echo "$out"
                      echo "::error::Found stale internal @v2/@v3 refs. Update them to @v4."
                      {
                          echo "### ❌ Stale internal @v2/@v3 refs — $lines line(s)"
                          echo
                          echo '```'
                          printf '%s\n' "$out"
                          echo '```'
                      } >> "$GITHUB_STEP_SUMMARY"
                      echo "count=$lines" >> "$GITHUB_OUTPUT"
                      exit 1
                  fi

            - name: 🧪 Summary
              if: always()
              shell: bash
              # Render the overall pass/fail table at the top of $GITHUB_STEP_SUMMARY
              # and fail the job if any check failed. A "?" means the step never
              # produced an output — usually because checkout/setup failed.
              run: |
                  node="${{ steps.node.outputs.count }}"
                  yaml="${{ steps.yaml.outputs.count }}"
                  al="${{ steps.actionlint.outputs.count }}"
                  ar="${{ steps.actionrefs.outputs.count }}"
                  stale="${{ steps.stalerefs.outputs.count }}"
                  node="${node:-?}"
                  yaml="${yaml:-?}"
                  al="${al:-?}"
                  ar="${ar:-?}"
                  stale="${stale:-?}"
                  total_failed=0
                  for n in "$node" "$yaml" "$al" "$ar" "$stale"; do
                      case "$n" in
                          0|"?") ;;
                          *) total_failed=$((total_failed + 1));;
                      esac
                  done
                  status_for() {
                      case "$1" in
                          "0") echo "✅ pass";;
                          "?") echo "⚠️ skipped (prior step failed)";;
                          *) echo "❌ fail ($1)";;
                      esac
                  }
                  {
                      echo
                      if [ "$total_failed" -eq 0 ]; then
                          echo "## 🧪 Local CI — ✅ all checks passed"
                      else
                          echo "## 🧪 Local CI — ❌ $total_failed check(s) failed"
                          echo
                          echo "Failure details are in the per-check sections below."
                      fi
                      echo
                      echo "| Check | Result |"
                      echo "|---|---|"
                      echo "| Node syntax (\`node --check\`) | $(status_for "$node") |"
                      echo "| YAML parse | $(status_for "$yaml") |"
                      echo "| actionlint | $(status_for "$al") |"
                      echo "| Action refs (inputs + remote versions) | $(status_for "$ar") |"
                      echo "| Stale internal @v2/@v3 refs | $(status_for "$stale") |"
                  } >> "$GITHUB_STEP_SUMMARY"
                  if [ "$total_failed" -gt 0 ]; then
                      exit 1
                  fi

    required-check:
        name: ✅ Required PR Check
        needs: [paths-gate, validate]
        # Mirror the validate job's gating exactly so the status is posted
        # on the SHA that branch protection actually inspects. Includes
        # `always()` so the docs-only path (where validate is skipped) still
        # posts a green status.
        if: |
            always() && (
                github.event_name != 'pull_request' ||
                github.event.pull_request.head.repo.fork == true ||
                github.event.pull_request.head.ref == 'next' ||
                github.event.pull_request.head.ref == 'hotfixes'
            )
        runs-on: ubuntu-latest
        steps:
            - name: Mirror validate result
              shell: bash
              env:
                  DOCS_ONLY: ${{ needs.paths-gate.outputs.docs_only }}
                  VALIDATE_RESULT: ${{ needs.validate.result }}
              run: |
                  if [ "$DOCS_ONLY" = "true" ]; then
                      echo "Docs-only change — Required PR Check passes without running validate."
                      exit 0
                  fi
                  if [ "$VALIDATE_RESULT" = "success" ]; then
                      echo "validate passed"
                      exit 0
                  fi
                  echo "validate did not pass (result=$VALIDATE_RESULT)"
                  exit 1
