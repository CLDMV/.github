# CLDMV/.github/.github/workflows/reusable-coverage-badge.yml
name: "\U0001F4CA Coverage Badge (Reusable)"

# Reusable workflow: type-checks, runs coverage, computes a Shields.io-compatible
# badge JSON, then pushes it to a dedicated `badges` branch (signed commit via bot GPG).
# Optionally uploads the full coverage report as a workflow artifact.
#
# Callers pass their CLDMV_BOT_* (or equivalent) secrets to the matching
# BOT_* secret inputs below.

on:
    workflow_call:
        inputs:
            # ── Node / package manager ──────────────────────────────────────────
            node_version:
                description: "Node.js version to use (default: lts/*)"
                required: false
                type: string
                default: "lts/*"

            package_manager:
                description: "Package manager (npm or yarn)"
                required: false
                type: string
                default: "npm"

            # ── Commands ────────────────────────────────────────────────────────
            build_command:
                description: "Command to build the package before type-checking. The
                    Build step is a sibling matrix job, so its `dist/` is invisible
                    here — repos whose `test:types` reads from compiled `dist/` (e.g.
                    via a `./typegen` export) need this. Set `skip_build: true` to
                    drop the step for repos with no build (the Install step alone
                    is sufficient)."
                required: false
                type: string
                default: "npm run build:ci"

            type_check_command:
                description: "Command to run type checking (e.g. npm run types:check)"
                required: false
                type: string
                default: "npm run types:check"

            coverage_command:
                description: "Command to run tests and generate coverage (e.g. npm run ci:coverage)"
                required: false
                type: string
                default: "npm run ci:coverage"

            # ── Build / type-check control ──────────────────────────────────────
            skip_build:
                description: "Set to true to skip the build step (for repos that don't
                    need `dist/` for `test:types` or coverage)."
                required: false
                type: boolean
                default: false

            skip_type_check:
                description: "Set to true to skip the type-check step"
                required: false
                type: boolean
                default: false

            # ── Coverage badge options ──────────────────────────────────────────
            coverage_summary_path:
                description: "Repo-relative path to the coverage-summary.json produced by Jest / c8"
                required: false
                type: string
                default: "coverage/coverage-summary.json"

            badges_branch:
                description: "Branch where the badge JSON is published"
                required: false
                type: string
                default: "badges"

            badge_filename:
                description: "Filename for the badge JSON committed to the badges branch"
                required: false
                type: string
                default: "coverage.json"

            # ── Artifact upload ─────────────────────────────────────────────────
            upload_coverage_artifact:
                description: "Upload the full coverage/ directory as a workflow artifact"
                required: false
                type: boolean
                default: true

            # ── Debug ───────────────────────────────────────────────────────────
            debug:
                description: "Enable debug logging"
                required: false
                type: boolean
                default: false

        secrets:
            # Bot App credentials — used to mint a short-lived token with write access.
            # If omitted the push step will fail; both are required for badge publishing.
            BOT_APP_CLIENT_ID:
                description: "GitHub App Client ID for the CLDMV bot (e.g. secrets.CLDMV_BOT_APP_CLIENT_ID)"
                required: true
            BOT_APP_PRIVATE_KEY:
                description: "GitHub App private key for the CLDMV bot"
                required: true

            # Bot git identity — used in the signed badge commit.
            BOT_NAME:
                description: "Git user.name for the badge commit (e.g. secrets.CLDMV_BOT_NAME)"
                required: true
            BOT_EMAIL:
                description: "Git user.email for the badge commit (e.g. secrets.CLDMV_BOT_EMAIL)"
                required: true

            # Bot GPG credentials — used to sign the badge commit.
            BOT_GPG_PRIVATE_KEY:
                description: "Armored GPG private key for commit signing"
                required: true
            BOT_GPG_PASSPHRASE:
                description: "Passphrase for the GPG key"
                required: true

# Workflow-level: needs to push the computed badge JSON onto the `badges`
# branch. The push uses the bot App token (minted in the job), but the
# GITHUB_TOKEN still needs `contents: write` for actions/checkout's full
# fetch + the post-job permission cap on git operations.
permissions:
    contents: write

jobs:
    coverage-badge:
        name: "📊 Coverage & Badge Push"
        runs-on: ubuntu-latest

        steps:
            # ── 1. Source ────────────────────────────────────────────────────────
            - name: Checkout
              uses: actions/checkout@v6

            # ── 2. Runtime ──────────────────────────────────────────────────────
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ inputs.node_version }}
                  cache: ${{ inputs.package_manager }}

            # ── 3. Dependencies ─────────────────────────────────────────────────
            - name: Install dependencies
              uses: CLDMV/.github/.github/actions/npm/steps/install-dependencies@v4
              with:
                  package-manager: ${{ inputs.package_manager }}

            # ── 4. Build ────────────────────────────────────────────────────────
            # The matrix `Build` step in reusable-build-and-test.yml runs on a
            # sibling runner with no shared filesystem, so its `dist/` is
            # invisible here. Build locally before type-check / coverage so
            # consumers whose `test:types` resolves against compiled output
            # (e.g. via a `./typegen` package export pointing at `dist/`)
            # don't fail with TS2307. Pass `skip_build: true` for repos with
            # no build step.
            - name: Build
              if: ${{ !inputs.skip_build }}
              run: ${{ inputs.build_command }}

            # ── 5. Type check ───────────────────────────────────────────────────
            - name: Type check
              if: ${{ !inputs.skip_type_check }}
              run: ${{ inputs.type_check_command }}

            # ── 6. Tests + coverage ─────────────────────────────────────────────
            - name: Tests + coverage
              run: ${{ inputs.coverage_command }}

            # ── 7. Compute badge JSON ───────────────────────────────────────────
            - name: Compute coverage badge JSON
              id: badge
              uses: CLDMV/.github/.github/actions/coverage/steps/compute-badge@v4
              with:
                  coverage-summary-path: ${{ inputs.coverage_summary_path }}

            # ── 8. Mint short-lived bot token ───────────────────────────────────
            - name: Generate bot token
              id: bot-token
              uses: actions/create-github-app-token@v3
              with:
                  client-id: ${{ secrets.BOT_APP_CLIENT_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

            # ── 9. Import GPG key for signed commit ─────────────────────────────
            - name: Import bot GPG key
              uses: crazy-max/ghaction-import-gpg@v6
              with:
                  gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
                  passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
                  git_user_signingkey: true
                  git_commit_gpgsign: true

            # ── 10. Push badge to badges branch ─────────────────────────────────
            - name: Push coverage badge to badges branch
              uses: CLDMV/.github/.github/actions/coverage/steps/push-badge@v4
              env:
                  BOT_TOKEN: ${{ steps.bot-token.outputs.token }}
              with:
                  badges-branch: ${{ inputs.badges_branch }}
                  badge-filename: ${{ inputs.badge_filename }}
                  bot-name: ${{ secrets.BOT_NAME }}
                  bot-email: ${{ secrets.BOT_EMAIL }}
                  repository: ${{ github.repository }}

            # ── 11. Upload full coverage report ─────────────────────────────────
            - name: Upload coverage artifact
              if: ${{ inputs.upload_coverage_artifact }}
              uses: actions/upload-artifact@v6
              with:
                  name: coverage
                  path: coverage/
