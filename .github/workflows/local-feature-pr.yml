# Local dogfood for THIS repo (CLDMV/.github) — auto-opens a PR from a
# feature/fix branch to the right v4 integration branch on first push.
#
# Mapping:
#   feat/*, feature/*, fix/*, release/*, chore/*, refactor/*  → next
#   hotfix/*                                                   → hotfixes
#
# Idempotent: if a PR already exists with the matching head + base, the
# workflow no-ops. PR title is taken from the head commit's first line
# (preserves conventional-commit style). PR body is a stub the human
# fills in.
#
# Skipped automatically: bot pushes (cldmv-bot[bot] / github-actions[bot])
# and any push whose head commit starts with 'chore: bump version'
# (the v4 release-PR machinery's auto-bump).

name: 🔀 Local Feature PR (v4)

on:
    push:
        branches:
            - 'feat/**'
            - 'feature/**'
            - 'fix/**'
            - 'release/**'
            - 'chore/**'
            - 'refactor/**'
            - 'hotfix/**'

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: feature-pr-${{ github.repository }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    open-pr:
        if: |
            github.actor != 'cldmv-bot[bot]' &&
            github.actor != 'github-actions[bot]' &&
            !startsWith(github.event.head_commit.message, 'chore: bump version')
        runs-on: ubuntu-latest
        steps:
            - name: Determine target branch
              id: target
              shell: bash
              run: |
                  branch="${GITHUB_REF#refs/heads/}"
                  echo "branch=$branch" >> "$GITHUB_OUTPUT"
                  case "$branch" in
                      hotfix/*)
                          target="hotfixes"
                          ;;
                      feat/*|feature/*|fix/*|release/*|chore/*|refactor/*)
                          target="next"
                          ;;
                      *)
                          target=""
                          echo "::notice::Branch '$branch' does not match any auto-PR pattern; skipping."
                          ;;
                  esac
                  echo "target=$target" >> "$GITHUB_OUTPUT"

            - name: Create App token
              id: app-token
              if: steps.target.outputs.target != ''
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            - name: Check for existing PR
              id: existing
              if: steps.target.outputs.target != ''
              shell: bash
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  pr=$(gh pr list --repo "$GITHUB_REPOSITORY" \
                       --head "${{ steps.target.outputs.branch }}" \
                       --base "${{ steps.target.outputs.target }}" \
                       --state open \
                       --json number --jq '.[0].number // ""')
                  echo "number=$pr" >> "$GITHUB_OUTPUT"
                  if [ -n "$pr" ]; then
                      echo "::notice::PR #$pr already exists for ${{ steps.target.outputs.branch }} → ${{ steps.target.outputs.target }}; no action."
                  fi

            - name: Build PR body from compare API
              id: body
              if: steps.target.outputs.target != '' && steps.existing.outputs.number == ''
              shell: bash
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  HEAD_BRANCH: ${{ steps.target.outputs.branch }}
                  BASE_BRANCH: ${{ steps.target.outputs.target }}
              run: |
                  # Pull commits + files from the compare API and render a
                  # populated body. Caps lists so a long-running branch
                  # doesn't produce an unreadable wall of text.
                  COMMIT_CAP=50
                  FILE_CAP=30

                  compare=$(gh api "repos/$GITHUB_REPOSITORY/compare/$BASE_BRANCH...$HEAD_BRANCH")

                  commit_count=$(jq -r '.total_commits' <<< "$compare")
                  file_count=$(jq -r '.files // [] | length' <<< "$compare")
                  additions=$(jq -r '.files // [] | map(.additions) | add // 0' <<< "$compare")
                  deletions=$(jq -r '.files // [] | map(.deletions) | add // 0' <<< "$compare")

                  # Newest commits first; cap to COMMIT_CAP.
                  commits=$(jq -r --argjson cap "$COMMIT_CAP" \
                      '.commits | reverse | .[:$cap] | .[] | "- `\(.sha[0:8])` \(.commit.message | split("\n") | .[0])"' \
                      <<< "$compare")
                  commit_more=""
                  if [ "$commit_count" -gt "$COMMIT_CAP" ]; then
                      commit_more=$'\n\n_… and '$((commit_count - COMMIT_CAP))' earlier commits_'
                  fi

                  files=$(jq -r --argjson cap "$FILE_CAP" \
                      '.files // [] | .[:$cap] | .[] | "- `\(.status[0:1] | ascii_upcase)` `\(.filename)` _(+\(.additions) / -\(.deletions))_"' \
                      <<< "$compare")
                  file_more=""
                  if [ "$file_count" -gt "$FILE_CAP" ]; then
                      file_more=$'\n\n_… and '$((file_count - FILE_CAP))' more files_'
                  fi

                  # Write to a file — cleaner than passing multiline through
                  # $GITHUB_OUTPUT, and `gh pr create --body-file` is built for this.
                  {
                      echo "_Auto-opened by local-feature-pr.yml on first push to \`$HEAD_BRANCH\` → \`$BASE_BRANCH\`._"
                      echo ""
                      echo "## Commits ($commit_count)"
                      echo ""
                      echo "$commits"
                      echo "$commit_more"
                      echo ""
                      echo "## Files changed ($file_count, +$additions / -$deletions)"
                      echo ""
                      echo "$files"
                      echo "$file_more"
                      echo ""
                      echo "## Test plan"
                      echo ""
                      echo "- [ ] _Replace this section with the actual test steps for this branch_"
                  } > /tmp/pr-body.md

                  echo "body_file=/tmp/pr-body.md" >> "$GITHUB_OUTPUT"

            - name: Open PR
              if: steps.target.outputs.target != '' && steps.existing.outputs.number == ''
              shell: bash
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
                  HEAD_BRANCH: ${{ steps.target.outputs.branch }}
                  BASE_BRANCH: ${{ steps.target.outputs.target }}
              run: |
                  # Title = head commit's first line — preserves the
                  # conventional-commit prefix the release-PR title-normalizer
                  # and commit-type aggregator expect.
                  title=$(printf '%s\n' "$HEAD_COMMIT_MSG" | head -1)
                  pr_url=$(gh pr create \
                      --repo "$GITHUB_REPOSITORY" \
                      --base "$BASE_BRANCH" \
                      --head "$HEAD_BRANCH" \
                      --title "$title" \
                      --body-file "${{ steps.body.outputs.body_file }}")
                  echo "::notice::Opened $pr_url"
                  # Single-block redirect to keep shellcheck SC2129 quiet.
                  {
                      echo "### 🔀 Auto-opened PR"
                      echo ""
                      echo "$pr_url"
                  } >> "$GITHUB_STEP_SUMMARY"
