# Individual repo: .github/workflows/v4-bootstrap.yml
#
# Per-repo v4 bootstrap — thin wrapper around the shared
# `org-bootstrap-repo@v4` action. Run once per repo from the Actions tab
# (or, for org-wide rollout, prefer `local-org-onboarding.yml` in
# CLDMV/.github which fans out across many repos in parallel).
#
# What gets applied (overwrite-with-warn — divergences are surfaced in the
# run summary):
#   - `next` + `hotfixes` branches created from master HEAD if missing
#   - repo settings: allow_auto_merge=true, delete_branch_on_merge=false,
#     allow_squash_merge=true, allow_merge_commit=true,
#     allow_rebase_merge=false, allow_update_branch=true
#   - security toggles: dependabot alerts + security updates, secret
#     scanning + push protection, private vulnerability reporting
#   - rulesets: replaces the three rulesets (Protect Master/Next/Hotfixes)
#     with the org canonical defaults
#
# Idempotent — re-running is safe. Default `dry_run: true` previews
# everything before applying.
#
# Full design: CLDMV/.github docs/conventions/release-flow-v4.md
# Migration checklist: CLDMV/.github docs/migration/v3-to-v4.md
name: 🚀 v4 Bootstrap

on:
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Dry-run: preview every mutation without firing it. Default `true` — set to `false` to actually apply changes."
                type: boolean
                required: false
                default: true
            steps:
                description: "Subset of phases to run, comma-separated."
                required: false
                default: "branches,settings,security,rulesets"

permissions:
    contents: read

jobs:
    bootstrap:
        name: "🚀 Bootstrap v4 (this repo)"
        runs-on: ubuntu-latest
        steps:
            - name: Create App token
              id: app-token
              # Full-permission App token — bootstrap needs administration:write
              # for security toggles + ruleset import, plus contents:write for
              # branch creation.
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            - name: Bootstrap
              uses: CLDMV/.github/.github/actions/github/jobs/org-bootstrap-repo@v4
              with:
                  # target_repo defaults to GITHUB_REPOSITORY (this repo).
                  github_token: ${{ steps.app-token.outputs.token }}
                  dry_run: ${{ github.event.inputs.dry_run }}
                  steps: ${{ github.event.inputs.steps }}
