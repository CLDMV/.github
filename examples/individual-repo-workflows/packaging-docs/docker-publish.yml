# Individual repo: .github/workflows/docker-publish.yml
name: 🐳 Build and Publish Docker Image

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug logging"
        type: boolean
        required: false
        default: false
      image_namespace:
        description: "Optional image namespace override (defaults to repo owner)"
        type: string
        required: false
        default: "cldmv"
      pre_publish_command:
        description: "Optional command to run before Docker build/push"
        type: string
        required: false
        default: "npm test"

# Workflow-level: GHCR push needs `packages:write`. `contents:read` for
# the build context checkout. `id-token:write` for cosign OIDC-attested
# image provenance.
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  docker-publish:
    uses: CLDMV/.github/.github/workflows/workflow-docker-publish.yml@v4
    with:
      debug: ${{ github.event.inputs.debug == 'true' }}
      registry: ghcr.io
      image_namespace: ${{ github.event.inputs.image_namespace || 'cldmv' }}
      package_json_path: package.json
      docker_context: .
      dockerfile: ./Dockerfile
      pre_publish_command: ${{ github.event.inputs.pre_publish_command || 'npm test' }}
      push_latest: true
      # CUSTOMIZE: opt-in to Trivy vuln scan as a pre-push gate. Requires
      # single-platform build (don't set `platforms:` to a multi-value list).
      # Findings stream to the Security tab via SARIF; push only fires when
      # scan passes. Set scan_fail_on_severity: false for report-only mode.
      # enable_container_scan: true
      # scan_severity: "CRITICAL,HIGH"
      # scan_fail_on_severity: true
      # scan_ignore_unfixed: true
      # scan_sarif_upload: true
    secrets:
      BOT_APP_ID: ${{ secrets.CLDMV_BOT_APP_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
