# Individual repo: .github/workflows/sync-release-prs.yml
#
# When any PR merges to master/main, fan out and refresh every open
# release PR so its version bump and changelog stay in sync with the new
# master state. Prevents the silent version-regression bug that happens
# when parallel release PRs merge out of order.
#
# Companion to the version-base fix in P3.1 (calculate-version reads from
# current master, not the merge-base). Without this fan-out, a release PR
# that gets no new pushes between sibling merges still carries stale data.
name: 🔄 Sync Open Release PRs

on:
    pull_request:
        types: [closed]
        branches: [master, main]

permissions:
    contents: write
    pull-requests: write

jobs:
    sync:
        # Only fire on actual merges (not on closed-without-merge).
        # Skip bot-authored merges to avoid recursion when the sync itself
        # ends up merging something later.
        if: |
            github.event.pull_request.merged == true &&
            github.event.pull_request.user.login != 'cldmv-bot[bot]' &&
            github.event.pull_request.user.login != 'github-actions[bot]'
        uses: CLDMV/.github/.github/workflows/workflow-sync-open-release-prs.yml@v3
        with:
            package_name: "@cldmv/slothlet" # Required: your NPM package name
            # Optional overrides:
            # package_manager: "npm"
            # build_command: "npm run build:ci"
            # node_version: "lts/*"
            # pr_title_pattern: '^release: v\d+\.\d+\.\d+$'
        secrets:
            BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
